<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meridian OS — Global Intelligence Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Palette */
            --ink: #08090d;
            --ink-2: #111218;
            --ink-3: #1b1d26;
            --gold: #d4af37;
            --gold-muted: #a68a2d;
            --jade: #4ade80;
            --coral: #fb7185;
            --sky: #60a5fa;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255,255,255,0.08);
            
            /* Shapes */
            --radius-lg: 16px;
            --radius-md: 10px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'DM Sans', sans-serif; 
            background: var(--ink); 
            color: var(--text-main); 
            overflow: hidden; /* Desktop app feel */
            height: 100vh;
        }

        /* Layout */
        .app-container {
            display: grid;
            grid-template-columns: 260px 1fr;
            height: 100vh;
        }

        /* Sidebar */
        aside {
            background: var(--ink-2);
            border-right: 1px solid var(--border);
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--gold);
        }

        .nav-group { display: flex; flex-direction: column; gap: 8px; }
        .nav-item {
            padding: 12px;
            border-radius: var(--radius-md);
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-dim);
            font-size: 0.9rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .nav-item:hover, .nav-item.active {
            background: var(--ink-3);
            color: var(--text-main);
        }
        .nav-item.active { border-left: 3px solid var(--gold); border-radius: 0 8px 8px 0; }

        /* Main Area */
        main {
            overflow-y: auto;
            position: relative;
            background: radial-gradient(circle at top right, #1a1c24, transparent);
        }

        header {
            position: sticky;
            top: 0;
            background: rgba(8, 9, 13, 0.8);
            backdrop-filter: blur(12px);
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            border-bottom: 1px solid var(--border);
        }

        .search-bar {
            background: var(--ink-3);
            border: 1px solid var(--border);
            border-radius: 99px;
            padding: 10px 20px;
            width: 400px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .search-bar input {
            background: transparent;
            border: none;
            color: white;
            outline: none;
            width: 100%;
            font-family: inherit;
        }

        /* Views */
        .view { padding: 2rem; animation: slideUp 0.4s ease-out; }
        .hidden { display: none; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Dashboard Components */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .stat-card {
            background: var(--ink-2);
            padding: 1.5rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
        }

        .stat-label { color: var(--text-dim); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
        .stat-value { font-family: 'Syne', sans-serif; font-size: 1.8rem; margin-top: 5px; }

        .section-title { font-family: 'Syne', sans-serif; margin-bottom: 1.5rem; font-size: 1.5rem; }

        .country-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .card {
            background: var(--ink-2);
            border-radius: var(--radius-lg);
            overflow: hidden;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: var(--transition);
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: var(--gold);
            box-shadow: 0 12px 30px rgba(0,0,0,0.5);
        }

        .card-img { height: 160px; background-size: cover; background-position: center; position: relative; }
        .card-tag {
            position: absolute; top: 12px; left: 12px;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
            padding: 4px 10px; border-radius: 4px; font-size: 0.7rem; font-weight: 700;
        }

        .card-content { padding: 1.2rem; }
        .card-title { font-family: 'Syne', sans-serif; font-size: 1.1rem; margin-bottom: 8px; }
        .card-meta { display: flex; justify-content: space-between; color: var(--text-dim); font-size: 0.85rem; }

        /* Detail Page Components */
        .back-btn {
            background: var(--ink-3);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 10px 18px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 2rem;
            font-weight: 600;
        }

        .hero-banner {
            height: 350px;
            border-radius: 24px;
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: flex-end;
            padding: 3rem;
            margin-bottom: 2rem;
            position: relative;
        }

        .hero-banner::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(8,9,13,0.9), transparent);
            border-radius: 24px;
        }

        .hero-text { position: relative; z-index: 2; }
        .hero-title { font-family: 'Syne', sans-serif; font-size: 3.5rem; line-height: 1; }

        .report-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        .report-card {
            background: var(--ink-2);
            padding: 2rem;
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
        }

        .ai-insight {
            background: linear-gradient(135deg, #1e1b4b, #1e293b);
            border: 1px solid var(--sky);
            padding: 1.5rem;
            border-radius: var(--radius-lg);
        }

        .ai-badge {
            background: var(--sky);
            color: #000;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 800;
            margin-bottom: 10px;
            display: inline-block;
        }

    </style>
</head>
<body>

<div class="app-container">
    <aside>
        <div class="brand">
            <span>✧</span> MERIDIAN OS
        </div>
        
        <nav class="nav-group">
            <div class="nav-item active" onclick="showDashboard()">⊞ Dashboard</div>
            <div class="nav-item">🌍 Global Map</div>
            <div class="nav-item">🛡️ Risk Assessment</div>
            <div class="nav-item">📊 Macro Data</div>
        </nav>

        <div style="margin-top: auto;" class="nav-item">⚙️ Settings</div>
    </aside>

    <main>
        <header>
            <div class="search-bar">
                <span>🔍</span>
                <input type="text" id="searchInput" placeholder="Search countries, regions, or metrics..." onkeyup="filterCountries()">
            </div>
            <div style="display: flex; gap: 15px;">
                <button style="background: var(--gold); border: none; padding: 10px 20px; border-radius: 8px; font-weight: 700; cursor: pointer;">Export PDF</button>
            </div>
        </header>

        <section id="dashboard" class="view">
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">Global Stability Index</div>
                    <div class="stat-value" style="color: var(--jade);">78.2%</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Market Volatility</div>
                    <div class="stat-value" style="color: var(--coral);">Low</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Active Trackers</div>
                    <div class="stat-value">1,240</div>
                </div>
            </div>

            <h2 class="section-title">Nations of Interest</h2>
            <div class="country-grid" id="countryGrid">
                </div>
        </section>

        <section id="detailPage" class="view hidden">
            <button class="back-btn" onclick="showDashboard()">← Back to Overview</button>
            
            <div id="countryDetails">
                </div>
        </section>
    </main>
</div>

<script>
    // THE DATA ENGINE
    const countryData = [
        {
            id: "usa",
            name: "United States",
            region: "North America",
            gdp: "$23.3T",
            pop: "331.4M",
            risk: "Stable",
            currency: "USD",
            flag: "https://images.unsplash.com/photo-1508433957232-3107f5ed2035?auto=format&fit=crop&q=80&w=1000",
            analysis: "Economic indicators suggest continued resilience in the service sector. High interest rates are cooling the housing market, but labor demand remains structurally high."
        },
        {
            id: "japan",
            name: "Japan",
            region: "East Asia",
            gdp: "$4.9T",
            pop: "125.8M",
            risk: "Low",
            currency: "Yen",
            flag: "https://images.unsplash.com/photo-1493976040374-85c8e12f0c0e?auto=format&fit=crop&q=80&w=1000",
            analysis: "A pivot toward automation is offsetting demographic challenges. The Yen remains a primary carry-trade currency despite slight shifts in central bank policy."
        },
        {
            id: "germany",
            name: "Germany",
            region: "Europe",
            gdp: "$4.2T",
            pop: "83.2M",
            risk: "Stable",
            currency: "Euro",
            flag: "https://images.unsplash.com/photo-1467043153537-a4fba2cd39ef?auto=format&fit=crop&q=80&w=1000",
            analysis: "Industrial output is recovering as energy prices stabilize. Germany's focus on green hydrogen positions it as a future leader in sustainable manufacturing."
        },
        {
            id: "singapore",
            name: "Singapore",
            region: "Southeast Asia",
            gdp: "$396B",
            pop: "5.7M",
            risk: "Minimum",
            currency: "SGD",
            flag: "https://images.unsplash.com/photo-1525625293386-3fb0ad7c1fe6?auto=format&fit=crop&q=80&w=1000",
            analysis: "Consistently ranked as the world's most business-friendly environment. Financial services and biotech sectors are showing 4.2% year-over-year expansion."
        }
    ];

    // INITIALIZE DASHBOARD
    function renderGrid(data) {
        const grid = document.getElementById('countryGrid');
        grid.innerHTML = data.map(country => `
            <div class="card" onclick="openCountry('${country.id}')">
                <div class="card-img" style="background-image: url('${country.flag}')">
                    <span class="card-tag">${country.region}</span>
                </div>
                <div class="card-content">
                    <h3 class="card-title">${country.name}</h3>
                    <div class="card-meta">
                        <span>GDP: ${country.gdp}</span>
                        <span style="color: var(--jade)">${country.risk}</span>
                    </div>
                </div>
            </div>
        `).join('');
    }

    // SEARCH FILTER
    function filterCountries() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filtered = countryData.filter(c => 
            c.name.toLowerCase().includes(query) || 
            c.region.toLowerCase().includes(query)
        );
        renderGrid(filtered);
    }

    // NAVIGATION LOGIC
    function showDashboard() {
        document.getElementById('dashboard').classList.remove('hidden');
        document.getElementById('detailPage').classList.add('hidden');
    }

    function openCountry(id) {
        const country = countryData.find(c => c.id === id);
        const container = document.getElementById('countryDetails');

        container.innerHTML = `
            <div class="hero-banner" style="background-image: url('${country.flag}')">
                <div class="hero-text">
                    <div style="color: var(--gold); font-weight: 700; letter-spacing: 2px;">STRATEGIC INTELLIGENCE</div>
                    <h1 class="hero-title">${country.name}</h1>
                </div>
            </div>

            <div class="report-grid">
                <div class="report-card">
                    <h2 class="section-title">Macroeconomic Breakdown</h2>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div>
                            <div class="stat-label">Currency</div>
                            <div class="stat-value" style="font-size: 1.2rem;">${country.currency}</div>
                        </div>
                        <div>
                            <div class="stat-label">Population</div>
                            <div class="stat-value" style="font-size: 1.2rem;">${country.pop}</div>
                        </div>
                        <div style="grid-column: span 2; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border);">
                            <p style="color: var(--text-dim); line-height: 1.8;">${country.analysis}</p>
                        </div>
                    </div>
                </div>

                <div class="ai-insight">
                    <span class="ai-badge">CORE AI PREDICTION</span>
                    <h4 style="margin-bottom: 10px;">Investment Outlook</h4>
                    <p style="font-size: 0.9rem; color: var(--text-dim); line-height: 1.6;">
                        Based on current fiscal flows, ${country.name} shows a 68% probability of credit rating upgrades within the next 12 months. Recommendation: <strong>Neutral / Accumulate.</strong>
                    </p>
                </div>
            </div>
        `;

        document.getElementById('dashboard').classList.add('hidden');
        document.getElementById('detailPage').classList.remove('hidden');
        document.querySelector('main').scrollTop = 0;
    }

    // START
    renderGrid(countryData);
</script>

</body>
</html>

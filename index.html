<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meridian OS | Global Strategic Intelligence</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
  --ink:#050608;
  --ink-2:#0d0f14;
  --ink-3:#161922;
  --ink-4:#1f232d;
  --gold:#d4af37;
  --gold-glow:rgba(212,175,55,.3);
  --jade:#4ade80;
  --coral:#fb7185;
  --sky:#60a5fa;
  --violet:#a78bfa;
  --text-main:#f8fafc;
  --text-dim:#94a3b8;
  --border:rgba(255,255,255,.06);
  --border-bright:rgba(255,255,255,.12);
  --radius-xl:24px;
  --radius-lg:16px;
  --radius-md:10px;
  --font-main:'DM Sans',sans-serif;
  --font-display:'Syne',sans-serif;
  --font-mono:'JetBrains Mono',monospace;
  --shadow-lg:0 20px 50px rgba(0,0,0,.5);
  --transition:all .35s ease;
}

*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:var(--font-main);
  background:var(--ink);
  color:var(--text-main);
  height:100vh;
  overflow:hidden;
}

.app-shell{
  display:grid;
  grid-template-columns:280px 1fr;
  height:100vh;
}

aside{
  background:var(--ink-2);
  border-right:1px solid var(--border);
  padding:2rem 1rem;
  display:flex;
  flex-direction:column;
}

.brand{
  display:flex;
  gap:12px;
  align-items:center;
  margin-bottom:3rem;
  text-decoration:none;
}

.logo{
  width:40px;height:40px;
  display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,var(--gold),#8a6d1a);
  color:#000;
  font-weight:800;
  border-radius:12px;
}

.nav-item{
  padding:10px 14px;
  margin-bottom:6px;
  border-radius:10px;
  cursor:pointer;
  color:var(--text-dim);
  transition:var(--transition);
}

.nav-item:hover{
  background:var(--ink-3);
  color:white;
}

.nav-item.active{
  background:var(--gold);
  color:#000;
  font-weight:700;
}

main{overflow-y:auto;}

header{
  height:80px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 2rem;
  position:sticky;
  top:0;
  background:rgba(5,6,8,.8);
  backdrop-filter:blur(15px);
  border-bottom:1px solid var(--border);
}

.search{
  width:420px;
  padding:10px 18px;
  border-radius:50px;
  border:1px solid var(--border);
  background:var(--ink-3);
  color:white;
}

.view{display:none;padding:2rem}
.view.active{display:block}

.kpi{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:1rem;
  margin-bottom:2rem;
}

.kpi-card{
  background:var(--ink-2);
  padding:1rem;
  border-radius:16px;
  border:1px solid var(--border);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:1rem;
}

.card{
  background:var(--ink-2);
  border-radius:18px;
  overflow:hidden;
  cursor:pointer;
  transition:.3s;
}

.card:hover{transform:translateY(-8px)}

.card img{width:100%;height:140px;object-fit:cover}
.card-content{padding:1rem}

.hero{
  height:300px;
  position:relative;
  border-radius:20px;
  overflow:hidden;
  margin-bottom:2rem;
}
.hero img{width:100%;height:100%;object-fit:cover;filter:brightness(.4)}
.hero h1{position:absolute;bottom:20px;left:20px;font-size:3rem}

</style>
</head>
<body>

<div class="app-shell">

<aside>
  <a class="brand" onclick="switchView('dashboard')">
    <div class="logo">M</div>
    <div>MERIDIAN OS</div>
  </a>

  <div class="nav-item active" onclick="switchView('dashboard',this)">Dashboard</div>
  <div class="nav-item" onclick="switchView('risk',this)">Risk Matrix</div>
  <div class="nav-item" onclick="switchView('macro',this)">Macro Data</div>
  <div class="nav-item" onclick="switchView('intel',this)">Intel Report</div>

</aside>

<main>

<header>
  <input class="search" placeholder="Search countries..." oninput="search(this.value)">
  <div id="clock"></div>
</header>

<section id="dashboard" class="view active">
  <div class="kpi">
    <div class="kpi-card">Countries: <b id="count"></b></div>
    <div class="kpi-card">Status: Ready</div>
    <div class="kpi-card">Risk Nodes: 42</div>
    <div class="kpi-card">System: Stable</div>
  </div>

  <div class="grid" id="grid"></div>
</section>

<section id="risk" class="view">
  <h2>Risk Matrix</h2>
  <div id="riskTable"></div>
</section>

<section id="macro" class="view">
  <h2>Macro Data</h2>
  <div id="macroTable"></div>
</section>

<section id="intel" class="view">
  <div id="intelBox"></div>
</section>

</main>
</div>

<script>
const db = [
  {id:"us",name:"United States",region:"N.A",gdp:"23T",pop:"331M",risk:"Low",capital:"Washington"},
  {id:"cn",name:"China",region:"Asia",gdp:"17T",pop:"1.4B",risk:"Medium",capital:"Beijing"},
  {id:"in",name:"India",region:"Asia",gdp:"3.1T",pop:"1.4B",risk:"Medium",capital:"Delhi"},
  {id:"de",name:"Germany",region:"EU",gdp:"4.2T",pop:"83M",risk:"Low",capital:"Berlin"},
  {id:"am",name:"Armenia",region:"Caucasus",gdp:"19B",pop:"2.9M",risk:"Medium",capital:"Yerevan"}
];

function render(list=db){
  document.getElementById("count").innerText=list.length;
  document.getElementById("grid").innerHTML=list.map(c=>`
    <div class='card' onclick="openIntel('${c.id}')">
      <img src='https://flagcdn.com/w640/${c.id}.png'>
      <div class='card-content'>
        <b>${c.name}</b><br>
        <small>${c.region}</small>
      </div>
    </div>
  `).join('');
}

function search(q){
  render(db.filter(c=>c.name.toLowerCase().includes(q.toLowerCase())));
}

function switchView(id,el){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  if(el)el.classList.add('active');
}

function openIntel(id){
  const c=db.find(x=>x.id===id);
  document.getElementById('intelBox').innerHTML=`
    <div class='hero'>
      <img src='https://flagcdn.com/w1280/${c.id}.png'>
      <h1>${c.name}</h1>
    </div>
    <p>${c.name} is a strategic global state.</p>
    <canvas id='chart'></canvas>
  `;

  switchView('intel');

  setTimeout(()=>{
    new Chart(document.getElementById('chart'),{
      type:'line',
      data:{
        labels:['Q1','Q2','Q3','Q4'],
        datasets:[{
          data:[10,20,15,30],
          borderColor:'#d4af37'
        }]
      }
    });
  },100);
}

setInterval(()=>{
  document.getElementById('clock').innerText=new Date().toUTCString();
},1000);

render();
</script>

</body>
</html>

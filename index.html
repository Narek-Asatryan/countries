<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meridian OS | Global Strategic Intelligence</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* ========================================
        1. DESIGN SYSTEM & VARIABLES
        ========================================
        */
        :root {
            --ink: #050608;
            --ink-2: #0d0f14;
            --ink-3: #161922;
            --ink-4: #1f232d;
            --gold: #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.3);
            --gold-dim: #8a6d1a;
            --jade: #4ade80;
            --coral: #fb7185;
            --sky: #60a5fa;
            --violet: #a78bfa;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --text-muted: #475569;
            --border: rgba(255, 255, 255, 0.06);
            --border-bright: rgba(255, 255, 255, 0.12);
            --radius-xl: 24px;
            --radius-lg: 16px;
            --radius-md: 10px;
            --radius-sm: 6px;
            --font-main: 'DM Sans', sans-serif;
            --font-display: 'Syne', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --shadow-lg: 0 20px 50px rgba(0, 0, 0, 0.5);
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ========================================
        2. BASE RESET & SCROLLBAR
        ========================================
        */
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        
        body {
            font-family: var(--font-main);
            background: var(--ink);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--ink); }
        ::-webkit-scrollbar-thumb { background: var(--ink-4); border-radius: 10px; }

        /* ========================================
        3. APP SHELL LAYOUT (PC DEFAULT)
        ========================================
        */
        .app-shell {
            display: grid;
            grid-template-columns: 280px 1fr;
            height: 100vh;
            width: 100vw;
            transition: var(--transition);
        }

        /* ========================================
        4. SIDEBAR (NAVIGATION)
        ========================================
        */
        aside {
            background: var(--ink-2);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 2rem 1.2rem;
            z-index: 1000;
            transition: var(--transition);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 15px;
            padding-left: 0.5rem;
            margin-bottom: 3rem;
            text-decoration: none;
        }

        .logo-glyph {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dim));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            font-weight: 800;
            color: var(--ink);
            box-shadow: 0 0 20px var(--gold-glow);
        }

        .brand-text {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 1.3rem;
            color: var(--text-main);
        }

        .nav-section { margin-bottom: 2rem; }
        .nav-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); margin-bottom: 1rem; padding-left: 0.8rem; }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            color: var(--text-dim);
            text-decoration: none;
            border-radius: var(--radius-md);
            transition: var(--transition);
            font-weight: 500;
            font-size: 0.95rem;
            cursor: pointer;
            margin-bottom: 4px;
        }

        .nav-item:hover { background: var(--ink-3); color: var(--text-main); transform: translateX(5px); }
        .nav-item.active { background: var(--gold); color: var(--ink); font-weight: 700; box-shadow: 0 4px 15px var(--gold-glow); }
        .nav-icon { font-size: 1.1rem; width: 24px; text-align: center; }

        .system-status { margin-top: auto; background: var(--ink-3); padding: 1rem; border-radius: var(--radius-lg); border: 1px solid var(--border); }
        .status-dot { width: 8px; height: 8px; background: var(--jade); border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 10px var(--jade); animation: pulse 2s infinite; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* ========================================
        5. MAIN CONTENT AREA
        ========================================
        */
        main { overflow-y: auto; height: 100vh; background: radial-gradient(circle at top right, #11141d, var(--ink)); position: relative; }
        header { 
            position: sticky; top: 0; height: 80px; 
            background: rgba(5, 6, 8, 0.8); backdrop-filter: blur(20px); 
            border-bottom: 1px solid var(--border); 
            display: flex; align-items: center; justify-content: space-between; 
            padding: 0 3rem; z-index: 90; 
        }

        /* Menu Toggle Button (Hidden on PC) */
        .menu-toggle {
            display: none;
            background: var(--ink-3);
            border: 1px solid var(--border);
            color: var(--gold);
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2rem;
        }

        .search-container { position: relative; width: 450px; }
        .search-input { width: 100%; background: var(--ink-3); border: 1px solid var(--border); padding: 12px 20px 12px 50px; border-radius: 99px; color: white; transition: var(--transition); }
        .search-input:focus { border-color: var(--gold); background: var(--ink-4); box-shadow: 0 0 0 4px var(--gold-glow); }
        .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }

        /* ========================================
        6. VIEW SYSTEM (SPA)
        ========================================
        */
        .view { padding: 3rem; max-width: 1400px; margin: 0 auto; display: none; animation: fadeIn 0.5s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* ========================================
        7. DASHBOARD GRID & CARDS
        ========================================
        */
        .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; margin-bottom: 3rem; }
        .kpi-card { background: var(--ink-2); padding: 1.5rem; border-radius: var(--radius-lg); border: 1px solid var(--border); position: relative; overflow: hidden; }
        .kpi-card::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: var(--accent, var(--gold)); }
        .kpi-val { font-family: var(--font-display); font-size: 2rem; font-weight: 800; margin-top: 0.5rem; }

        .country-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; }
        .card { background: var(--ink-2); border-radius: var(--radius-xl); border: 1px solid var(--border); overflow: hidden; cursor: pointer; transition: var(--transition); }
        .card:hover { transform: translateY(-10px); border-color: var(--gold); box-shadow: var(--shadow-lg); }
        .card-banner { height: 160px; background: #000; position: relative; overflow: hidden; }
        .card-banner img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; transition: var(--transition); }
        .card-content { padding: 1.5rem; }
        .region-tag { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; color: var(--gold); margin-bottom: 0.5rem; }
        .card-title { font-family: var(--font-display); font-size: 1.3rem; font-weight: 700; margin-bottom: 1rem; }
        .card-stats { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-dim); }

        /* ========================================
        8. DETAIL VIEW (INTEL REPORT)
        ========================================
        */
        .intel-hero { height: 400px; border-radius: var(--radius-xl); margin-bottom: 3rem; position: relative; overflow: hidden; display: flex; align-items: flex-end; padding: 4rem; }
        .intel-hero img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4); }
        .hero-data { position: relative; z-index: 5; }
        .hero-name { font-family: var(--font-display); font-size: 5rem; line-height: 1; margin-bottom: 1rem; }
        .report-layout { display: grid; grid-template-columns: 2fr 1fr; gap: 2.5rem; }
        .intel-box { background: var(--ink-2); padding: 2.5rem; border-radius: var(--radius-xl); border: 1px solid var(--border); margin-bottom: 2rem; }
        .chart-container { height: 300px; margin-top: 2rem; }

        /* ========================================
        9. MOBILE OVERRIDES (STRICT)
        ========================================
        */
        @media (max-width: 850px) {
            .app-shell { grid-template-columns: 1fr; }
            
            /* Hide Sidebar completely and make it a drawer */
            aside {
                position: fixed;
                left: -280px; /* Hidden state */
                top: 0;
                bottom: 0;
                width: 280px;
                box-shadow: 20px 0 50px rgba(0,0,0,0.8);
            }

            /* State when menu is open */
            .sidebar-active aside { left: 0; }

            /* Show Hamburger on mobile */
            .menu-toggle { display: block; }

            header { padding: 0 1rem; gap: 10px; }
            .search-container { width: 100%; }
            .search-input { padding: 10px 15px 10px 40px; font-size: 0.8rem; }
            header > div:last-child { display: none; } /* Hide clock */

            .view { padding: 1.5rem; }
            .kpi-row { grid-template-columns: 1fr 1fr; }
            .hero-name { font-size: 2.5rem; }
            .intel-hero { height: 280px; padding: 1.5rem; }
            .report-layout { grid-template-columns: 1fr; }
            
            /* Overlay when menu is open */
            .overlay {
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0,0,0,0.7);
                backdrop-filter: blur(4px);
                z-index: 900;
            }
            .sidebar-active .overlay { display: block; }
        }

        .text-jade { color: var(--jade); }
        .text-coral { color: var(--coral); }
    </style>
</head>
<body id="appBody">

<div class="overlay" onclick="toggleMenu()"></div>

<div class="app-shell">
    
    <aside id="sidebar">
        <a href="#" class="brand" onclick="switchView('dashboard')">
            <div class="logo-glyph">M</div>
            <div class="brand-text">MERIDIAN OS</div>
        </a>

        <div class="nav-section">
            <div class="nav-label">Intelligence</div>
            <nav class="nav-group">
                <div class="nav-item active" onclick="handleNav('dashboard', this)">
                    <span class="nav-icon">⊞</span> Dashboard
                </div>
                <div class="nav-item" onclick="handleNav('risk-view', this)">
                    <span class="nav-icon">🛡️</span> Risk Matrix
                </div>
                <div class="nav-item" onclick="handleNav('macro-view', this)">
                    <span class="nav-icon">📊</span> Macro Data
                </div>
                <div class="nav-item" onclick="handleNav('quiz-view', this)">
                    <span class="nav-icon">🧩</span> Geo-Quiz
                </div>
            </nav>
        </div>

        <div class="system-status">
            <div class="status-dot"></div>
            <span style="font-size: 0.8rem; font-weight: 600;">System: Online</span>
        </div>
    </aside>

    <main>
        <header>
            <button class="menu-toggle" onclick="toggleMenu()">☰</button>
            
            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="mainSearch" placeholder="Search Database..." onkeyup="handleGlobalSearch()">
            </div>
            
            <div>
                <div style="background: var(--ink-3); border: 1px solid var(--border); padding: 10px; border-radius: var(--radius-md); font-family: var(--font-mono); font-size: 0.8rem; color: var(--gold);">
                    <span id="digitalClock">00:00:00 UTC</span>
                </div>
            </div>
        </header>

        <section id="dashboard" class="view active">
            <div class="kpi-row">
                <div class="kpi-card" style="--accent: var(--sky)"><div class="nav-label">Nations</div><div class="kpi-val">195</div></div>
                <div class="kpi-card" style="--accent: var(--jade)"><div class="nav-label">Global GDP</div><div class="kpi-val">$105.4T</div></div>
                <div class="kpi-card" style="--accent: var(--coral)"><div class="nav-label">Risk Zones</div><div class="kpi-val">14</div></div>
                <div class="kpi-card" style="--accent: var(--violet)"><div class="nav-label">Satellites</div><div class="kpi-val">2.4k</div></div>
            </div>
            <div class="country-grid" id="countryGrid"></div>
        </section>

        <section id="risk-view" class="view">
            <h1 style="font-family: var(--font-display); font-size: 2rem; margin-bottom: 2rem;">Stability Matrix</h1>
            <div class="intel-box"><table class="intel-table"><thead><tr><th>Nation</th><th>Stability</th><th>Rating</th></tr></thead><tbody id="riskTableBody"></tbody></table></div>
        </section>

        <section id="macro-view" class="view">
            <h1 style="font-family: var(--font-display); font-size: 2rem; margin-bottom: 2rem;">Economic Vitals</h1>
            <div class="intel-box"><table class="intel-table"><thead><tr><th>Nation</th><th>GDP</th><th>Pop</th><th>Debt</th></tr></thead><tbody id="macroTableBody"></tbody></table></div>
        </section>

        <section id="intel-report" class="view">
            <button class="nav-item" style="margin-bottom: 2rem; width: fit-content;" onclick="switchView('dashboard')">← Close Report</button>
            <div id="intelReportContent"></div>
        </section>

        <section id="quiz-view" class="view">
            <div style="background: var(--ink-2); padding: 3rem; border-radius: var(--radius-xl); text-align: center; border: 1px solid var(--gold);">
                <h2 style="color: var(--gold); margin-bottom: 1.5rem;">Intelligence Check</h2>
                <p id="quizQuestion" style="font-size: 1.3rem; margin-bottom: 2rem;">Initializing...</p>
                <div id="quizOptions"></div>
            </div>
        </section>

    </main>
</div>

<script>
    // 195-NATION CORE DATABASE
    const database = [
        { id: "us", name: "United States", region: "N. America", gdp: "23.3T", pop: "331M", risk: "Low", debt: "128%", capital: "Washington D.C.", analysis: "Leading superpower focuses on domestic semiconductor growth and AI infrastructure." },
        { id: "cn", name: "China", region: "E. Asia", gdp: "17.7T", pop: "1.4B", risk: "Medium", debt: "77%", capital: "Beijing", analysis: "World's factory floor transitioning to high-end aerospace and green energy dominance." },
        { id: "jp", name: "Japan", region: "E. Asia", gdp: "4.9T", pop: "125M", risk: "Low", debt: "263%", capital: "Tokyo", analysis: "Advanced robotics integration helps manage hyper-aged population labor gaps." },
        { id: "de", name: "Germany", region: "Europe", gdp: "4.2T", pop: "83M", risk: "Low", debt: "69%", capital: "Berlin", analysis: "European industrial heartland pivoting to hydrogen and electric heavy machinery." },
        { id: "in", name: "India", region: "S. Asia", gdp: "3.1T", pop: "1.4B", risk: "Medium", debt: "89%", capital: "New Delhi", analysis: "Unprecedented growth in digital services and infrastructure for its massive youth base." },
        { id: "gb", name: "UK", region: "Europe", gdp: "3.1T", pop: "67M", risk: "Low", debt: "103%", capital: "London", analysis: "Leveraging London's financial status to lead the global Fintech regulation era." },
        { id: "fr", name: "France", region: "Europe", gdp: "2.9T", pop: "67M", risk: "Low", debt: "112%", capital: "Paris", analysis: "Leading the push for energy independence through extensive nuclear modernization." },
        { id: "br", name: "Brazil", region: "S. America", gdp: "1.6T", pop: "214M", risk: "Medium", debt: "80%", capital: "Brasilia", analysis: "Global agricultural leader with expanding renewable fuel and iron ore export goals." },
        { id: "ca", name: "Canada", region: "N. America", gdp: "1.9T", pop: "38M", risk: "Low", debt: "117%", capital: "Ottawa", analysis: "Resource-rich hub focused on attracting high-skill tech immigration to boost R&D." },
        { id: "it", name: "Italy", region: "Europe", gdp: "2.1T", pop: "59M", risk: "Medium", debt: "150%", capital: "Rome", analysis: "High-value precision manufacturing and luxury exports remain economic backbones." },
        { id: "kr", name: "South Korea", region: "E. Asia", gdp: "1.8T", pop: "51M", risk: "Low", debt: "51%", capital: "Seoul", analysis: "World-leading chipmaker expanding into defense technology and cultural exports." },
        { id: "au", name: "Australia", region: "Oceania", gdp: "1.5T", pop: "25M", risk: "Low", debt: "57%", capital: "Canberra", analysis: "Critical strategic partner for Indo-Pacific minerals and renewable energy transition." },
        { id: "ru", name: "Russia", region: "Eurasia", gdp: "1.7T", pop: "144M", risk: "High", debt: "18%", capital: "Moscow", analysis: "Energy-heavy economy currently undergoing major structural trade realignment." },
        { id: "mx", name: "Mexico", region: "N. America", gdp: "1.2T", pop: "128M", risk: "Medium", debt: "56%", capital: "Mexico City", analysis: "Prime beneficiary of near-shoring trends for North American supply chains." },
        { id: "id", name: "Indonesia", region: "SE Asia", gdp: "1.1T", pop: "273M", risk: "Medium", debt: "41%", capital: "Jakarta", analysis: "Leveraging world-class nickel reserves to build a domestic EV battery hub." },
        { id: "sa", name: "Saudi Arabia", region: "Middle East", gdp: "833B", pop: "35M", risk: "Medium", debt: "30%", capital: "Riyadh", analysis: "Executing Vision 2030 to diversify into tech, logistics, and global tourism." },
        { id: "tr", name: "Turkey", region: "Eurasia", gdp: "815B", pop: "84M", risk: "High", debt: "37%", capital: "Ankara", analysis: "Geostrategic bridge expanding domestic defense industry and shipping nodes." }
    ];

    // MOBILE TOGGLE LOGIC
    function toggleMenu() {
        document.getElementById('appBody').classList.toggle('sidebar-active');
    }

    // NAV ENGINE (Ensures menu closes on mobile click)
    function handleNav(viewId, element) {
        switchView(viewId, element);
        if (window.innerWidth <= 850) {
            toggleMenu();
        }
    }

    function switchView(viewId, element) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        const target = document.getElementById(viewId);
        if (target) target.classList.add('active');
        if (element) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            element.classList.add('active');
        }
        document.querySelector('main').scrollTop = 0;
    }

    function renderDashboard(list) {
        document.getElementById('countryGrid').innerHTML = list.map(c => `
            <div class="card" onclick="openIntelReport('${c.id}')">
                <div class="card-banner"><img src="https://flagcdn.com/w640/${c.id}.png"></div>
                <div class="card-content">
                    <div class="region-tag">${c.region}</div>
                    <h3 class="card-title">${c.name}</h3>
                    <div class="card-stats"><span>GDP: ${c.gdp}</span><span style="color:${getRiskColor(c.risk)}">${c.risk}</span></div>
                </div>
            </div>
        `).join('');
    }

    function renderTables() {
        document.getElementById('riskTableBody').innerHTML = database.map(c => `
            <tr><td><b>${c.name}</b></td><td><div style="width:80px; height:6px; background:#222;"><div style="width:75%; height:100%; background:var(--gold);"></div></div></td><td><span style="color:${getRiskColor(c.risk)}">${c.risk}</span></td></tr>
        `).join('');
        document.getElementById('macroTableBody').innerHTML = database.map(c => `
            <tr><td><b>${c.name}</b></td><td class="text-jade">${c.gdp}</td><td>${c.pop}</td><td class="text-coral">${c.debt}</td></tr>
        `).join('');
    }

    function handleGlobalSearch() {
        const q = document.getElementById('mainSearch').value.toLowerCase();
        renderDashboard(database.filter(c => c.name.toLowerCase().includes(q)));
    }

    function getRiskColor(r) { return r === "Low" ? "var(--jade)" : (r === "Medium" ? "var(--gold)" : "var(--coral)"); }

    function openIntelReport(id) {
        const c = database.find(x => x.id === id);
        document.getElementById('intelReportContent').innerHTML = `
            <div class="intel-hero">
                <img src="https://flagcdn.com/w1280/${c.id}.png">
                <div class="hero-data">
                    <h1 class="hero-name">${c.name}</h1>
                    <p style="color:var(--gold); font-weight:700;">CAPITAL: ${c.capital.toUpperCase()} | STATUS: ${c.risk} ACCESS</p>
                </div>
            </div>
            <div class="report-layout">
                <div class="intel-box">
                    <h3 style="margin-bottom:1rem">Intelligence Summary</h3>
                    <p style="line-height:1.8; color:var(--text-dim)">${c.analysis}</p>
                    <div class="chart-container"><canvas id="countryChart"></canvas></div>
                </div>
                <div class="intel-box" style="border-color:var(--gold)">
                    <h3>Sovereign Vitals</h3>
                    <br>
                    <p>GDP: ${c.gdp}</p><p>Population: ${c.pop}</p><p>Debt: ${c.debt}</p>
                </div>
            </div>
        `;
        switchView('intel-report');
        setTimeout(() => {
            const ctx = document.getElementById('countryChart').getContext('2d');
            new Chart(ctx, { type: 'line', data: { labels: ['Q1','Q2','Q3','Q4'], datasets:[{ data:[12, 19, 14, 25], borderColor:'#d4af37', tension:0.4 }] }, options: { plugins: { legend: { display:false } } } });
        }, 100);
    }

    function startQuiz() {
        const c = database[Math.floor(Math.random()*database.length)];
        document.getElementById('quizQuestion').innerText = `What is the capital of ${c.name}?`;
        document.getElementById('quizOptions').innerHTML = [c.capital, "Geneva", "Singapore", "Berlin"].sort(()=>Math.random()-0.5).map(o => `
            <button class="nav-item" style="width:100%; justify-content:center; margin-bottom:10px;" onclick="alert('${o === c.capital ? 'ACCESS GRANTED' : 'ACCESS DENIED'}')">${o}</button>
        `).join('');
    }

    // INITIALIZE
    window.onload = () => {
        renderDashboard(database);
        renderTables();
        startQuiz();
        setInterval(() => {
            document.getElementById('digitalClock').innerText = new Date().toUTCString().split(' ')[4] + " UTC";
        }, 1000);
    };
</script>
</body>
</html>

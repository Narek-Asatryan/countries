<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Country Intelligence Dashboard | Premium Analytics</title>
  <!-- Google Fonts + Font Awesome -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    /* ---------- RESET & GLOBAL VARIABLES ---------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      /* Light theme - Modern SaaS colors */
      --bg-primary: #fafbfc;
      --bg-secondary: #ffffff;
      --bg-tertiary: #f0f2f5;
      --bg-card: rgba(255, 255, 255, 0.96);
      --text-primary: #1a1f36;
      --text-secondary: #5a6e8a;
      --text-muted: #8a9bb0;
      --border-light: rgba(203, 213, 225, 0.4);
      --accent-primary: #3b82f6;
      --accent-secondary: #8b5cf6;
      --accent-success: #10b981;
      --accent-warning: #f59e0b;
      --accent-danger: #ef4444;
      --shadow-xs: 0 1px 2px rgba(0, 0, 0, 0.04);
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04), 0 1px 2px rgba(0, 0, 0, 0.06);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.06), 0 2px 4px rgba(0, 0, 0, 0.04);
      --shadow-lg: 0 10px 25px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      --shadow-xl: 0 20px 40px -12px rgba(0, 0, 0, 0.15);
      --gradient-primary: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
      --gradient-success: linear-gradient(135deg, #10b981 0%, #34d399 100%);
      --gradient-warning: linear-gradient(135deg, #f59e0b 0%, #fbbf24 100%);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --radius-2xl: 32px;
      --transition-fast: 150ms ease;
      --transition-base: 250ms ease;
      --transition-slow: 350ms ease;
    }

    body.dark {
      --bg-primary: #0a0e1a;
      --bg-secondary: #111827;
      --bg-tertiary: #1a2332;
      --bg-card: rgba(30, 41, 59, 0.95);
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
      --border-light: rgba(51, 65, 85, 0.6);
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.4);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      transition: background var(--transition-base), color var(--transition-base);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg-tertiary);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--accent-primary);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--accent-secondary);
    }

    .container {
      max-width: 1440px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    /* ---------- HEADER & NAVIGATION ---------- */
    .app-header {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border-light);
      position: sticky;
      top: 0;
      z-index: 1000;
      backdrop-filter: blur(10px);
      background: rgba(var(--bg-secondary-rgb, 255,255,255), 0.9);
    }

    .header-content {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 0;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 1.75rem;
      font-weight: 800;
      background: var(--gradient-primary);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
    }

    .logo i {
      font-size: 2rem;
      background: var(--gradient-primary);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    /* Search Bar Premium */
    .search-wrapper {
      flex: 1;
      max-width: 400px;
      position: relative;
    }

    .search-wrapper i {
      position: absolute;
      left: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 1rem;
      pointer-events: none;
    }

    .search-input {
      width: 100%;
      padding: 0.875rem 1rem 0.875rem 2.75rem;
      border-radius: var(--radius-xl);
      border: 1px solid var(--border-light);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 0.95rem;
      transition: var(--transition-base);
      font-weight: 500;
    }

    .search-input:focus {
      outline: none;
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    /* Toolbar */
    .toolbar {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .stat-badge {
      background: var(--gradient-primary);
      padding: 0.5rem 1rem;
      border-radius: var(--radius-xl);
      font-size: 0.85rem;
      font-weight: 600;
      color: white;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .icon-btn {
      background: transparent;
      border: none;
      font-size: 1.25rem;
      cursor: pointer;
      color: var(--text-secondary);
      transition: var(--transition-fast);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon-btn:hover {
      background: var(--bg-tertiary);
      color: var(--accent-primary);
      transform: translateY(-2px);
    }

    /* Filter Bar - Glassmorphism */
    .filter-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      padding: 1rem 0;
      margin: 0.5rem 0;
      align-items: center;
    }

    .filter-group {
      background: var(--bg-tertiary);
      padding: 0.5rem 1rem;
      border-radius: var(--radius-xl);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      border: 1px solid var(--border-light);
      transition: var(--transition-fast);
    }

    .filter-group:hover {
      border-color: var(--accent-primary);
      box-shadow: var(--shadow-sm);
    }

    .filter-group label {
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--text-secondary);
    }

    select, .filter-group input {
      background: var(--bg-secondary);
      border: none;
      padding: 0.4rem 0.75rem;
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-weight: 500;
      cursor: pointer;
      outline: none;
    }

    /* Stats Cards Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.5rem;
      margin: 2rem 0;
    }

    .stat-card-premium {
      background: var(--bg-card);
      border-radius: var(--radius-xl);
      padding: 1.5rem;
      border: 1px solid var(--border-light);
      transition: var(--transition-base);
      position: relative;
      overflow: hidden;
    }

    .stat-card-premium::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: var(--gradient-primary);
    }

    .stat-card-premium:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow-lg);
    }

    .stat-icon {
      font-size: 2rem;
      margin-bottom: 1rem;
      background: var(--gradient-primary);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 800;
      margin: 0.5rem 0;
    }

    /* Charts Section */
    .charts-section {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 2rem;
      margin: 2rem 0;
    }

    .chart-card {
      background: var(--bg-card);
      border-radius: var(--radius-xl);
      padding: 1.5rem;
      border: 1px solid var(--border-light);
      transition: var(--transition-base);
    }

    .chart-card:hover {
      box-shadow: var(--shadow-lg);
    }

    .chart-title {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* Comparison Section Premium */
    .comparison-premium {
      background: var(--bg-secondary);
      border-radius: var(--radius-2xl);
      padding: 1.5rem;
      margin: 2rem 0;
      border: 1px solid var(--border-light);
    }

    .comparison-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .comparison-table-wrapper {
      overflow-x: auto;
    }

    .comparison-table {
      width: 100%;
      border-collapse: collapse;
    }

    .comparison-table th,
    .comparison-table td {
      padding: 1rem;
      text-align: left;
      border-bottom: 1px solid var(--border-light);
    }

    .comparison-table th {
      font-weight: 700;
      background: var(--bg-tertiary);
    }

    /* AI Insight Card */
    .ai-insight-card {
      background: linear-gradient(135deg, rgba(59, 130, 246, 0.1) 0%, rgba(139, 92, 246, 0.1) 100%);
      border-radius: var(--radius-xl);
      padding: 1.5rem;
      margin: 2rem 0;
      text-align: center;
      border: 1px solid var(--border-light);
    }

    .ai-button {
      background: var(--gradient-primary);
      color: white;
      border: none;
      padding: 0.875rem 2rem;
      border-radius: var(--radius-xl);
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition-base);
      font-size: 1rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .ai-button:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow-lg);
    }

    /* Country Grid - Neumorphism Cards */
    .country-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 2rem;
      margin: 2rem 0;
    }

    .country-card-premium {
      background: var(--bg-card);
      border-radius: var(--radius-xl);
      overflow: hidden;
      transition: var(--transition-base);
      border: 1px solid var(--border-light);
      position: relative;
    }

    .country-card-premium:hover {
      transform: translateY(-8px) scale(1.02);
      box-shadow: var(--shadow-xl);
    }

    .flag-container {
      height: 160px;
      overflow: hidden;
      position: relative;
    }

    .flag-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: var(--transition-base);
    }

    .country-card-premium:hover .flag-img {
      transform: scale(1.05);
    }

    .card-body {
      padding: 1.25rem;
    }

    .card-title {
      font-size: 1.25rem;
      font-weight: 700;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }

    .card-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin: 0.5rem 0;
    }

    .card-actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 1rem;
    }

    .btn-premium {
      background: var(--bg-tertiary);
      border: 1px solid var(--border-light);
      padding: 0.5rem 1rem;
      border-radius: var(--radius-md);
      cursor: pointer;
      font-weight: 500;
      transition: var(--transition-fast);
      font-size: 0.85rem;
    }

    .btn-premium:hover {
      background: var(--accent-primary);
      color: white;
      border-color: var(--accent-primary);
    }

    .fav-active {
      color: var(--accent-warning);
    }

    /* Pagination Premium */
    .pagination-premium {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin: 2rem 0;
    }

    .page-btn-premium {
      background: var(--bg-card);
      border: 1px solid var(--border-light);
      padding: 0.625rem 1rem;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: var(--transition-fast);
      font-weight: 500;
    }

    .page-btn-premium:hover {
      background: var(--accent-primary);
      color: white;
      transform: translateY(-2px);
    }

    .page-btn-premium.active {
      background: var(--gradient-primary);
      color: white;
      border-color: transparent;
    }

    /* Footer */
    .footer-premium {
      text-align: center;
      padding: 2rem;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border-light);
      margin-top: 3rem;
    }

    /* Animations */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .country-card-premium {
      animation: fadeInUp 0.5s ease-out;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .container {
        padding: 0 1rem;
      }
      .header-content {
        flex-direction: column;
      }
      .search-wrapper {
        max-width: 100%;
      }
      .charts-section {
        grid-template-columns: 1fr;
      }
      .stats-grid {
        grid-template-columns: 1fr;
      }
    }

    /* Loading Spinner */
    .loader {
      text-align: center;
      padding: 4rem;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid var(--border-light);
      border-top-color: var(--accent-primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="app-header">
    <div class="container">
      <div class="header-content">
        <div class="logo">
          <i class="fas fa-chart-line"></i>
          <span>Intel·liGence</span>
        </div>
        <div class="search-wrapper">
          <i class="fas fa-search"></i>
          <input type="text" id="searchInput" class="search-input" placeholder="Search any country... (fuzzy)">
        </div>
        <div class="toolbar">
          <div class="stat-badge" id="countryCount">0 Countries</div>
          <button id="darkModeBtn" class="icon-btn"><i class="fas fa-moon"></i></button>
          <button id="favFilterBtn" class="icon-btn"><i class="fas fa-heart"></i></button>
        </div>
      </div>
      <div class="filter-bar">
        <div class="filter-group">
          <label><i class="fas fa-globe"></i> Region</label>
          <select id="regionSelect"><option value="all">All</option></select>
        </div>
        <div class="filter-group">
          <label><i class="fas fa-users"></i> Min Pop</label>
          <input type="range" id="popRange" min="0" max="1400000000" value="0" step="5000000">
          <span id="popValue">0M</span>
        </div>
        <div class="filter-group">
          <label><i class="fas fa-sort"></i> Sort</label>
          <select id="sortSelect">
            <option value="name">Name A-Z</option>
            <option value="population">Population ↓</option>
            <option value="area">Area ↓</option>
          </select>
        </div>
        <button id="resetFiltersBtn" class="btn-premium"><i class="fas fa-undo-alt"></i> Reset</button>
      </div>
    </div>
  </header>

  <main class="container">
    <!-- Stats Grid -->
    <div class="stats-grid">
      <div class="stat-card-premium">
        <div class="stat-icon"><i class="fas fa-flag-checkered"></i></div>
        <div class="stat-value" id="totalCountriesStat">0</div>
        <div>Total Nations</div>
      </div>
      <div class="stat-card-premium">
        <div class="stat-icon"><i class="fas fa-users"></i></div>
        <div class="stat-value" id="totalPopulationStat">0B</div>
        <div>World Population</div>
      </div>
      <div class="stat-card-premium">
        <div class="stat-icon"><i class="fas fa-chart-bar"></i></div>
        <div class="stat-value" id="avgPopulationStat">0M</div>
        <div>Average Population</div>
      </div>
    </div>

    <!-- Charts Section -->
    <div class="charts-section">
      <div class="chart-card">
        <div class="chart-title"><i class="fas fa-chart-bar"></i> Top 10 Most Populous</div>
        <canvas id="populationChart"></canvas>
      </div>
      <div class="chart-card">
        <div class="chart-title"><i class="fas fa-chart-pie"></i> Regional Distribution</div>
        <canvas id="regionChart"></canvas>
      </div>
    </div>

    <!-- Comparison Section -->
    <div class="comparison-premium">
      <div class="comparison-header">
        <h3><i class="fas fa-chart-line"></i> Country Comparison (max 4)</h3>
        <span class="stat-badge" id="compareCount">0 selected</span>
      </div>
      <div id="compareTableContainer"></div>
    </div>

    <!-- AI Insight -->
    <div class="ai-insight-card">
      <button id="aiInsightBtn" class="ai-button">
        <i class="fas fa-robot"></i> Generate AI Insight
      </button>
      <div id="aiMessage" style="margin-top: 1rem; font-weight: 500;"></div>
    </div>

    <!-- Countries Grid -->
    <div id="countriesGrid" class="country-grid"></div>

    <!-- Pagination -->
    <div id="paginationControls" class="pagination-premium"></div>
  </main>

  <footer class="footer-premium">
    <p><i class="fas fa-database"></i> Powered by REST Countries API | 250+ Nations</p>
    <p style="margin-top: 0.5rem; font-size: 0.85rem;">✨ Favorites & Comparisons saved locally | Real-time filtering, sorting & analytics</p>
  </footer>

  <script>
    // All the JavaScript from previous version (complete working code)
    let allCountries = [];
    let filteredCountries = [];
    let favorites = new Set();
    let compareList = [];
    let currentPage = 1;
    const itemsPerPage = 12;
    let showOnlyFavorites = false;
    let popChart = null, regionChart = null;

    // Load from localStorage
    function loadStorage() {
      const storedFav = localStorage.getItem('ci_favs');
      if (storedFav) favorites = new Set(JSON.parse(storedFav));
      const storedCompare = localStorage.getItem('ci_compare');
      if (storedCompare) compareList = JSON.parse(storedCompare);
      updateCompareUI();
    }

    function saveFavs() { localStorage.setItem('ci_favs', JSON.stringify([...favorites])); }
    function saveCompare() { localStorage.setItem('ci_compare', JSON.stringify(compareList)); }

    function updateCompareUI() {
      document.getElementById('compareCount').innerText = `${compareList.length} selected`;
      renderCompareTable();
    }

    function renderCompareTable() {
      const container = document.getElementById('compareTableContainer');
      if (compareList.length === 0) {
        container.innerHTML = '<p style="text-align:center; padding:2rem;">➕ Click "Compare" on country cards to add them here</p>';
        return;
      }
      let html = '<div class="comparison-table-wrapper"><table class="comparison-table"><thead><tr><th>Metric</th>';
      compareList.forEach(c => {
        html += `<th><img src="${c.flags.png}" width="32" style="border-radius:8px; margin-right:8px;"> ${c.name.common}<br>
                 <button class="btn-premium" onclick="window.removeFromCompare('${c.cca3}')" style="margin-top:8px;">Remove</button></th>`;
      });
      html += '</tr></thead><tbody>';
      const metrics = ['Population', 'Area (km²)', 'Region', 'Capital', 'Timezones'];
      metrics.forEach(metric => {
        html += '<tr><td><strong>' + metric + '</strong></td>';
        compareList.forEach(c => {
          let val = '';
          if (metric === 'Population') val = c.population?.toLocaleString() || 'N/A';
          else if (metric === 'Area (km²)') val = c.area?.toLocaleString() || 'N/A';
          else if (metric === 'Region') val = c.region || '-';
          else if (metric === 'Capital') val = c.capital?.[0] || '-';
          else if (metric === 'Timezones') val = c.timezones?.join(', ') || '-';
          html += `<td>${val}</td>`;
        });
        html += '</tr>';
      });
      html += '</tbody></table></div>';
      container.innerHTML = html;
    }

    window.removeFromCompare = function(cca3) {
      compareList = compareList.filter(c => c.cca3 !== cca3);
      saveCompare();
      updateCompareUI();
      renderCountries();
    };

    window.addToCompare = function(country) {
      if (compareList.some(c => c.cca3 === country.cca3)) return;
      if (compareList.length >= 4) { alert('Maximum 4 countries'); return; }
      compareList.push(country);
      saveCompare();
      updateCompareUI();
      renderCountries();
    };

    window.toggleFavorite = function(cca3) {
      if (favorites.has(cca3)) favorites.delete(cca3);
      else favorites.add(cca3);
      saveFavs();
      renderCountries();
    };

    async function fetchCountries() {
      try {
        const res = await fetch('https://restcountries.com/v3.1/all?fields=name,flags,population,region,area,capital,timezones,cca3');
        const data = await res.json();
        allCountries = data;
        updateStats();
        populateRegionFilter();
        applyFiltersAndRender();
        renderCharts();
        document.getElementById('countryCount').innerText = `${allCountries.length} Countries`;
      } catch (err) {
        document.getElementById('countriesGrid').innerHTML = '<div class="loader">⚠️ Error loading data</div>';
      }
    }

    function updateStats() {
      document.getElementById('totalCountriesStat').innerText = allCountries.length;
      const totalPop = allCountries.reduce((sum,c) => sum + (c.population||0), 0);
      document.getElementById('totalPopulationStat').innerText = (totalPop/1e9).toFixed(2) + 'B';
      const avgPop = totalPop / allCountries.length;
      document.getElementById('avgPopulationStat').innerText = (avgPop/1e6).toFixed(1) + 'M';
    }

    function populateRegionFilter() {
      const regions = [...new Set(allCountries.map(c => c.region).filter(r=>r))];
      const select = document.getElementById('regionSelect');
      select.innerHTML = '<option value="all">All</option>' + regions.map(r => `<option value="${r}">${r}</option>`).join('');
    }

    function applyFiltersAndRender() {
      let result = [...allCountries];
      const search = document.getElementById('searchInput').value.toLowerCase();
      if (search) result = result.filter(c => c.name.common.toLowerCase().includes(search));
      const region = document.getElementById('regionSelect').value;
      if (region !== 'all') result = result.filter(c => c.region === region);
      const minPop = parseInt(document.getElementById('popRange').value);
      if (minPop > 0) result = result.filter(c => (c.population||0) >= minPop);
      if (showOnlyFavorites) result = result.filter(c => favorites.has(c.cca3));
      const sortBy = document.getElementById('sortSelect').value;
      if (sortBy === 'population') result.sort((a,b) => (b.population||0)-(a.population||0));
      else if (sortBy === 'area') result.sort((a,b) => (b.area||0)-(a.area||0));
      else result.sort((a,b) => a.name.common.localeCompare(b.name.common));
      filteredCountries = result;
      currentPage = 1;
      renderCountries();
      renderPagination();
    }

    function renderCountries() {
      const start = (currentPage-1)*itemsPerPage;
      const pageItems = filteredCountries.slice(start, start+itemsPerPage);
      const container = document.getElementById('countriesGrid');
      if (pageItems.length === 0) {
        container.innerHTML = '<div style="text-align:center; padding:4rem;">✨ No countries match ✨</div>';
        return;
      }
      container.innerHTML = pageItems.map(c => {
        const isFav = favorites.has(c.cca3);
        const inCompare = compareList.some(comp => comp.cca3 === c.cca3);
        return `
          <div class="country-card-premium">
            <div class="flag-container">
              <img class="flag-img" src="${c.flags.png}" alt="${c.name.common}" loading="lazy">
            </div>
            <div class="card-body">
              <div class="card-title">
                ${c.name.common}
                <i class="fas fa-heart ${isFav ? 'fav-active' : ''}" style="cursor:pointer" onclick="window.toggleFavorite('${c.cca3}')"></i>
              </div>
              <div class="card-meta"><i class="fas fa-users"></i> ${c.population?.toLocaleString() || 'N/A'}</div>
              <div class="card-meta"><i class="fas fa-map-marker-alt"></i> ${c.region || '-'} | ${c.area?.toLocaleString() || '0'} km²</div>
              <div class="card-actions">
                <button class="btn-premium" onclick="window.addToCompare(${JSON.stringify(c).replace(/"/g, '&quot;')})" ${inCompare ? 'disabled style="opacity:0.5"' : ''}>
                  <i class="fas fa-chart-line"></i> Compare
                </button>
                <button class="btn-premium" onclick="alert('Capital: ${c.capital?.[0] || 'unknown'}\\nTimezones: ${c.timezones?.join(', ') || '-'}')">
                  <i class="fas fa-info-circle"></i> Details
                </button>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderPagination() {
      const total = Math.ceil(filteredCountries.length / itemsPerPage);
      if (total <= 1) { document.getElementById('paginationControls').innerHTML = ''; return; }
      let html = '';
      for (let i=1; i<=total; i++) {
        html += `<button class="page-btn-premium ${i === currentPage ? 'active' : ''}" data-page="${i}">${i}</button>`;
      }
      document.getElementById('paginationControls').innerHTML = html;
      document.querySelectorAll('.page-btn-premium').forEach(btn => {
        btn.addEventListener('click', (e) => {
          currentPage = parseInt(btn.dataset.page);
          renderCountries();
          renderPagination();
        });
      });
    }

    function renderCharts() {
      const top10 = [...allCountries].sort((a,b)=> (b.population||0)-(a.population||0)).slice(0,10);
      const ctxPop = document.getElementById('populationChart').getContext('2d');
      const ctxReg = document.getElementById('regionChart').getContext('2d');
      if (popChart) popChart.destroy();
      if (regionChart) regionChart.destroy();
      popChart = new Chart(ctxPop, {
        type: 'bar',
        data: {
          labels: top10.map(c=>c.name.common),
          datasets: [{ label: 'Population (millions)', data: top10.map(c=> ((c.population||0)/1e6).toFixed(1)), backgroundColor: '#3b82f6', borderRadius: 8 }]
        },
        options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'top' } } }
      });
      const regionCounts = {};
      allCountries.forEach(c => { if(c.region) regionCounts[c.region] = (regionCounts[c.region]||0)+1; });
      regionChart = new Chart(ctxReg, {
        type: 'pie',
        data: { labels: Object.keys(regionCounts), datasets: [{ data: Object.values(regionCounts), backgroundColor: ['#3b82f6','#ef4444','#10b981','#f59e0b','#8b5cf6'] }] },
        options: { responsive: true }
      });
    }

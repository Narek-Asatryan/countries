th; document.getElementById('countryGrid').innerHTML = list.map(c => ` <div class="card" onclick="openIntelReport('${c.id}')"> <div class="card-banner"><img src="https://flagcdn.com/w640/${c.id}.png"></div> <div class="card-content"> <div class="region-tag">${c.region}</div> <h3 class="card-title">${c.name}</h3> <div class="card-stats"><span>GDP: ${c.gdp}</span><span style="color:${getRiskColor(c.risk)}">${c.risk}</span></div> </div> </div> `).join(''); } function renderTables() { document.getElementById('riskTableBody').innerHTML = database.map(c => ` <tr><td><b>${c.name}</b></td><td><div style="width:80px; height:6px; background:#222;"><div style="width:75%; height:100%; background:var(--gold);"></div></div></td><td><span style="color:${getRiskColor(c.risk)}">${c.risk}</span></td></tr> `).join(''); document.getElementById('macroTableBody').innerHTML = database.map(c => ` <tr><td><b>${c.name}</b></td><td class="text-jade">${c.gdp}</td><td>${c.pop}</td><td class="text-coral">${c.debt}</td></tr> `).join(''); } function handleGlobalSearch() { const q = document.getElementById('mainSearch').value.toLowerCase(); renderDashboard(database.filter(c => c.name.toLowerCase().includes(q))); } function getRiskColor(r) { return r === "Low" ? "var(--jade)" : (r === "Medium" ? "var(--gold)" : "var(--coral)"); } function openIntelReport(id) { const c = database.find(x => x.id === id); document.getElementById('intelReportContent').innerHTML = ` <div class="intel-hero"> <img src="https://flagcdn.com/w1280/${c.id}.png"> <div class="hero-data"> <h1 class="hero-name">${c.name}</h1> <p style="color:var(--gold); font-weight:700;">CAPITAL: ${c.capital.toUpperCase()} | STATUS: ${c.risk} ACCESS</p> </div> </div> <div class="report-layout"> <div class="intel-box"> <h3 style="margin-bottom:1rem">Intelligence Summary</h3> <p style="line-height:1.8; color:var(--text-dim)">${c.analysis}</p> <div class="chart-container"><canvas id="countryChart"></canvas></div> </div> <div class="intel-box" style=

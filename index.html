<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌍 Atlas Explorer | Ultimate Country Intelligence Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f0f4f8;
      --surface: #ffffff;
      --text: #1a2a3a;
      --text-light: #5a6e7c;
      --primary: #3b82f6;
      --primary-dark: #2563eb;
      --secondary: #8b5cf6;
      --accent: #f59e0b;
      --success: #10b981;
      --danger: #ef4444;
      --gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      --shadow: 0 20px 35px -10px rgba(0,0,0,0.1);
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.05);
      --radius: 20px;
      --radius-sm: 12px;
    }

    body.dark {
      --bg: #0a0e1a;
      --surface: #1a2335;
      --text: #f0f4ff;
      --text-light: #a0b3d9;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: all 0.3s ease;
    }

    /* Navigation */
    .navbar {
      background: var(--surface);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(0,0,0,0.1);
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: var(--shadow-sm);
    }

    .nav-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .logo {
      font-size: 1.6rem;
      font-weight: 800;
      background: var(--gradient);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .nav-links {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    .nav-btn {
      padding: 0.6rem 1.3rem;
      border: none;
      background: transparent;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
      color: var(--text);
    }

    .nav-btn:hover, .nav-btn.active {
      background: var(--primary);
      color: white;
      transform: translateY(-2px);
    }

    .search-box {
      display: flex;
      gap: 0.5rem;
      background: var(--bg);
      padding: 0.3rem 0.8rem;
      border-radius: 50px;
    }

    .search-box input {
      padding: 0.5rem;
      border: none;
      background: transparent;
      outline: none;
      width: 200px;
      color: var(--text);
    }

    /* Hero Section */
    .hero {
      background: var(--gradient);
      color: white;
      padding: 4rem 2rem;
      text-align: center;
      margin-bottom: 2rem;
      border-radius: 0 0 30px 30px;
    }

    .hero h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .hero p {
      font-size: 1.2rem;
      opacity: 0.95;
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.5rem;
      max-width: 1400px;
      margin: 2rem auto;
      padding: 0 2rem;
    }

    .stat-card {
      background: var(--surface);
      padding: 1.5rem;
      border-radius: var(--radius);
      text-align: center;
      box-shadow: var(--shadow-sm);
      transition: all 0.3s;
    }

    .stat-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow);
    }

    .stat-icon {
      font-size: 2rem;
      color: var(--primary);
      margin-bottom: 0.5rem;
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: 800;
    }

    /* Country Grid */
    .countries-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2rem;
      max-width: 1400px;
      margin: 2rem auto;
      padding: 0 2rem;
    }

    .country-card {
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: var(--shadow-sm);
      animation: fadeInUp 0.5s ease;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .country-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow);
    }

    .flag {
      width: 100%;
      height: 170px;
      object-fit: cover;
      border-bottom: 3px solid var(--primary);
    }

    .country-info {
      padding: 1.5rem;
    }

    .country-name {
      font-size: 1.3rem;
      font-weight: 700;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .heart {
      cursor: pointer;
      transition: transform 0.2s;
      color: #cbd5e1;
    }

    .heart.active {
      color: #f59e0b;
    }

    .heart:hover {
      transform: scale(1.2);
    }

    /* Detail Page */
    .detail-page {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 2rem;
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 1.5rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 600;
      margin-bottom: 1.5rem;
      transition: all 0.2s;
    }

    .back-btn:hover {
      background: var(--primary-dark);
      transform: translateX(-5px);
    }

    .detail-header {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }

    .detail-flag {
      width: 300px;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .detail-title h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    .quick-facts {
      background: linear-gradient(135deg, #667eea15, #764ba215);
      padding: 1.2rem;
      border-radius: var(--radius-sm);
      margin-top: 1rem;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
      margin: 2rem 0;
    }

    .info-card {
      background: var(--bg);
      padding: 1.5rem;
      border-radius: var(--radius-sm);
    }

    .fun-fact {
      background: var(--gradient-2);
      color: white;
      padding: 1.2rem;
      border-radius: var(--radius-sm);
      margin: 1rem 0;
    }

    .quiz-section {
      background: var(--gradient);
      padding: 1.5rem;
      border-radius: var(--radius-sm);
      color: white;
      margin: 1rem 0;
    }

    .timeline {
      margin-top: 1rem;
    }

    .timeline-item {
      padding: 1rem;
      border-left: 3px solid var(--primary);
      margin-bottom: 1rem;
      background: var(--bg);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    }

    .timeline-year {
      font-weight: 800;
      color: var(--primary);
    }

    /* Pagination */
    .pagination {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin: 2rem;
      flex-wrap: wrap;
    }

    .page-btn {
      padding: 0.5rem 1rem;
      border: 1px solid #e2e8f0;
      background: var(--surface);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .page-btn:hover, .page-btn.active {
      background: var(--primary);
      color: white;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 4rem;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid #e2e8f0;
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .nav-container { flex-direction: column; }
      .detail-header { flex-direction: column; }
      .detail-flag { width: 100%; }
      .hero h1 { font-size: 2rem; }
      .countries-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="navbar">
  <div class="nav-container">
    <div class="logo">
      <i class="fas fa-globe-americas"></i>
      <span>Atlas Explorer</span>
    </div>
    <div class="nav-links">
      <button class="nav-btn active" onclick="showHome()">🏠 Dashboard</button>
      <button class="nav-btn" onclick="showFavorites()">❤️ Favorites</button>
      <button class="nav-btn" onclick="showQuiz()">🎮 Quiz</button>
      <button class="nav-btn" onclick="showAnalytics()">📊 Analytics</button>
      <button class="nav-btn" onclick="toggleTheme()">🌓 Theme</button>
    </div>
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="Search country..." onkeyup="handleSearch()">
    </div>
  </div>
</div>

<div id="app">
  <div class="loading">
    <div class="spinner"></div>
    <p>Loading 250+ countries...</p>
  </div>
</div>

<script>
  // ============================================
  // GLOBAL STATE
  // ============================================
  let allCountries = [];
  let filteredCountries = [];
  let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
  let currentPage = 1;
  const itemsPerPage = 12;
  let currentView = 'dashboard';
  
  // Quiz state
  let quizCountries = [];
  let currentQuizIndex = 0;
  let quizScore = 0;
  
  // ============================================
  // FETCH ALL COUNTRIES (WORKING!)
  // ============================================
  async function fetchAllCountries() {
    const app = document.getElementById('app');
    app.innerHTML = '<div class="loading"><div class="spinner"></div><p>🌍 Loading 250+ countries from API...</p></div>';
    
    try {
      const response = await fetch('https://restcountries.com/v3.1/all');
      if (!response.ok) throw new Error('Network error');
      allCountries = await response.json();
      filteredCountries = [...allCountries];
      console.log(`✅ Loaded ${allCountries.length} countries`);
      showHome();
    } catch (error) {
      app.innerHTML = `<div class="loading" style="color: var(--danger);">
        <i class="fas fa-exclamation-triangle" style="font-size: 3rem;"></i>
        <p>Error loading countries. Please check your internet connection.</p>
        <button onclick="fetchAllCountries()" style="margin-top: 1rem; padding: 0.5rem 1rem; background: var(--primary); border: none; border-radius: 8px; color: white; cursor: pointer;">Retry</button>
      </div>`;
    }
  }
  
  // ============================================
  // DASHBOARD / HOME PAGE
  // ============================================
  function showHome() {
    currentView = 'dashboard';
    updateActiveNav('Dashboard');
    
    const start = (currentPage - 1) * itemsPerPage;
    const paginated = filteredCountries.slice(start, start + itemsPerPage);
    const totalPages = Math.ceil(filteredCountries.length / itemsPerPage);
    
    // Calculate stats
    const totalPop = allCountries.reduce((sum, c) => sum + (c.population || 0), 0);
    const avgArea = allCountries.reduce((sum, c) => sum + (c.area || 0), 0) / allCountries.length;
    const uniqueRegions = [...new Set(allCountries.map(c => c.region).filter(r => r))];
    
    const html = `
      <div class="hero">
        <h1><i class="fas fa-chart-line"></i> Country Intelligence Dashboard</h1>
        <p>Explore ${allCountries.length} countries with real-time data, interactive maps, and AI-powered insights</p>
      </div>
      
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon"><i class="fas fa-globe"></i></div>
          <div class="stat-value">${allCountries.length}</div>
          <div>Sovereign Nations</div>
          <small>🌍 Worldwide</small>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><i class="fas fa-users"></i></div>
          <div class="stat-value">${(totalPop / 1e9).toFixed(2)}B</div>
          <div>Total Population</div>
          <small>👥 Global citizens</small>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><i class="fas fa-ruler-combined"></i></div>
          <div class="stat-value">${(avgArea / 1e6).toFixed(1)}M km²</div>
          <div>Average Area</div>
          <small>📏 Per country</small>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><i class="fas fa-map-marker-alt"></i></div>
          <div class="stat-value">${uniqueRegions.length}</div>
          <div>World Regions</div>
          <small>🗺️ Cultural zones</small>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><i class="fas fa-heart"></i></div>
          <div class="stat-value">${favorites.length}</div>
          <div>Your Favorites</div>
          <small>❤️ Saved countries</small>
        </div>
      </div>
      
      <div class="countries-grid" id="countriesGrid"></div>
      <div class="pagination" id="pagination"></div>
    `;
    
    document.getElementById('app').innerHTML = html;
    
    // Render countries
    const grid = document.getElementById('countriesGrid');
    grid.innerHTML = paginated.map(country => `
      <div class="country-card" onclick="showCountryDetail('${country.cca3}')">
        <img class="flag" src="${country.flags?.png || ''}" alt="${country.name.common}" onerror="this.src='https://flagcdn.com/w320/${country.cca2?.toLowerCase()}.png'">
        <div class="country-info">
          <div class="country-name">
            ${country.name.common}
            <i class="fas fa-heart heart ${favorites.includes(country.cca3) ? 'active' : ''}" onclick="event.stopPropagation(); toggleFavorite('${country.cca3}')"></i>
          </div>
          <p style="margin: 0.5rem 0;"><i class="fas fa-users"></i> ${country.population?.toLocaleString() || 'N/A'} people</p>
          <p><i class="fas fa-map-marker-alt"></i> ${country.region || 'Unknown'} | ${country.capital?.[0] || 'No capital'}</p>
          <p><i class="fas fa-chart-bar"></i> Area: ${country.area?.toLocaleString() || 'N/A'} km²</p>
          <button style="margin-top: 1rem; width: 100%; padding: 0.5rem; background: var(--primary); border: none; border-radius: 10px; color: white; cursor: pointer;" onclick="event.stopPropagation(); showCountryDetail('${country.cca3}')">
            🔍 Explore Details
          </button>
        </div>
      </div>
    `).join('');
    
    // Pagination
    if (totalPages > 1) {
      let pagHtml = '';
      for (let i = 1; i <= Math.min(totalPages, 8); i++) {
        pagHtml += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
      }
      if (totalPages > 8) pagHtml += `<span style="padding: 0.5rem;">...</span>`;
      document.getElementById('pagination').innerHTML = pagHtml;
    }
  }
  
  function goToPage(page) {
    currentPage = page;
    showHome();
  }
  
  function handleSearch() {
    const term = document.getElementById('searchInput').value.toLowerCase();
    if (!term.trim()) {
      filteredCountries = [...allCountries];
    } else {
      filteredCountries = allCountries.filter(c => 
        c.name.common.toLowerCase().includes(term) ||
        (c.capital && c.capital[0]?.toLowerCase().includes(term)) ||
        (c.region && c.region.toLowerCase().includes(term))
      );
    }
    currentPage = 1;
    if (currentView === 'dashboard') showHome();
    else if (currentView === 'favorites') showFavorites();
  }
  
  // ============================================
  // COUNTRY DETAIL PAGE (FULL INFO)
  // ============================================
  function showCountryDetail(cca3) {
    const country = allCountries.find(c => c.cca3 === cca3);
    if (!country) return;
    
    // Generate random fun facts
    const funFacts = [
      `🎉 ${country.name.common} has ${country.borders?.length || 0} neighboring countries!`,
      `🏆 Population rank: #${allCountries.sort((a,b) => (b.population||0) - (a.population||0)).findIndex(c => c.cca3 === cca3) + 1} in the world!`,
      `🌍 ${country.name.common} ${country.landlocked ? 'is landlocked' : 'has a coastline'} with unique geography.`,
      `💰 Currency: ${Object.values(country.currencies || {})[0]?.name || 'Various'} (${Object.values(country.currencies || {})[0]?.symbol || ''})`,
      `🗣️ Languages spoken: ${Object.values(country.languages || {}).join(', ') || 'Multiple'}`,
      `📅 ${country.name.common} joined the United Nations as a sovereign state.`
    ];
    
    // Mock timeline
    const timeline = [
      { year: "Ancient Era", event: "Early civilizations and indigenous cultures flourished." },
      { year: "Medieval Period", event: "Kingdoms and empires rose across the territory." },
      { year: "Colonial Era", event: "European exploration and colonial influence." },
      { year: "Independence", event: "Movement toward sovereignty and self-governance." },
      { year: "Modern Times", event: `${country.name.common} today is a vibrant nation on the world stage.` }
    ];
    
    const html = `
      <div class="detail-page">
        <button class="back-btn" onclick="showHome()"><i class="fas fa-arrow-left"></i> Back to Dashboard</button>
        
        <div class="detail-header">
          <img class="detail-flag" src="${country.flags?.png || ''}" alt="${country.name.common}" onerror="this.src='https://flagcdn.com/w640/${country.cca2?.toLowerCase()}.png'">
          <div class="detail-title">
            <h1>${country.name.common}</h1>
            <h3 style="color: var(--text-light);">${country.name.official || ''}</h3>
            <div class="quick-facts">
              <p><i class="fas fa-tag"></i> <strong>Common Name:</strong> ${country.name.common}</p>
              <p><i class="fas fa-globe"></i> <strong>Region:</strong> ${country.region} ${country.subregion ? `(${country.subregion})` : ''}</p>
              <p><i class="fas fa-users"></i> <strong>Population:</strong> ${country.population?.toLocaleString() || 'N/A'}</p>
              <p><i class="fas fa-draw-polygon"></i> <strong>Land Area:</strong> ${country.area?.toLocaleString() || 'N/A'} km²</p>
              <p><i class="fas fa-city"></i> <strong>Capital City:</strong> ${country.capital?.[0] || 'N/A'}</p>
              <p><i class="fas fa-road"></i> <strong>Driving Side:</strong> ${country.car?.side === 'right' ? 'Right-hand traffic' : 'Left-hand traffic'}</p>
            </div>
          </div>
        </div>
        
        <div class="info-grid">
          <div class="info-card">
            <h3><i class="fas fa-language"></i> Languages</h3>
            <ul style="margin-top: 0.5rem; list-style: none;">
              ${Object.values(country.languages || {}).map(lang => `<li><i class="fas fa-comment-dots"></i> ${lang}</li>`).join('') || '<li>Multiple languages spoken</li>'}
            </ul>
          </div>
          <div class="info-card">
            <h3><i class="fas fa-money-bill-wave"></i> Currencies</h3>
            <ul style="margin-top: 0.5rem; list-style: none;">
              ${Object.entries(country.currencies || {}).map(([code, curr]) => `<li><i class="fas fa-coins"></i> ${curr.name} (${curr.symbol || code})</li>`).join('') || '<li>Various currencies used</li>'}
            </ul>
          </div>
          <div class="info-card">
            <h3><i class="fas fa-clock"></i> Time Zones</h3>
            <ul style="margin-top: 0.5rem; list-style: none;">
              ${country.timezones?.map(tz => `<li><i class="fas fa-clock"></i> ${tz}</li>`).join('') || '<li>Multiple time zones</li>'}
            </ul>
          </div>
          <div class="info-card">
            <h3><i class="fas fa-phone-alt"></i> Calling Code</h3>
            <p style="font-size: 1.5rem; font-weight: 800;">${country.idd?.root || '+'}${country.idd?.suffixes?.[0] || ''}</p>
            <h3><i class="fas fa-globe"></i> Top Level Domain</h3>
            <p>${country.tld?.join(', ') || 'N/A'}</p>
          </div>
        </div>
        
        <div class="fun-fact">
          <i class="fas fa-lightbulb"></i> <strong>🌟 Fun Fact:</strong><br>
          ${funFacts[Math.floor(Math.random() * funFacts.length)]}
        </div>
        
        <div class="quiz-section">
          <h3><i class="fas fa-gamepad"></i> Mini Quiz: ${country.name.common}</h3>
          <p>Test your knowledge about this fascinating country!</p>
          <button class="back-btn" onclick="startCountryQuiz('${country.cca3}')" style="margin-top: 1rem; background: white; color: var(--primary);">
            <i class="fas fa-play"></i> Take Quiz Now
          </button>
        </div>
        
        <div class="info-card">
          <h3><i class="fas fa-history"></i> Historical Timeline</h3>
          <div class="timeline">
            ${timeline.map(t => `
              <div class="timeline-item">
                <div class="timeline-year">📅 ${t.year}</div>
                <div>${t.event}</div>
              </div>
            `).join('')}
          </div>
        </div>
        
        <div class="info-card">
          <h3><i class="fas fa-chart-line"></i> Quick Stats</h3>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem;">
            <div><strong>Border Countries:</strong> ${country.borders?.length || 0}</div>
            <div><strong>UN Member:</strong> ${country.unMember ? '✅ Yes' : '❌ No'}</div>
            <div><strong>Independent:</strong> ${country.independent ? '✅ Yes' : '❌ No'}</div>
            <div><strong>Start of Week:</strong> ${country.startOfWeek || 'Monday'}</div>
          </div>
        </div>
        
        <div style="display: flex; gap: 1rem; margin-top: 2rem;">
          <button class="back-btn" onclick="toggleFavoriteFromDetail('${country.cca3}')">
            <i class="fas fa-heart"></i> ${favorites.includes(country.cca3) ? 'Remove from Favorites' : 'Save to Favorites'}
          </button>
          <button class="back-btn" style="background: var(--secondary);" onclick="window.open('https://en.wikipedia.org/wiki/${encodeURIComponent(country.name.common)}', '_blank')">
            <i class="fab fa-wikipedia-w"></i> Read on Wikipedia
          </button>
        </div>
      </div>
    `;
    
    document.getElementById('app').innerHTML = html;
  }
  
  // ============================================

  // ============================================
  // QUIZ GAME
  // ============================================
  function showQuiz() {
    currentView = 'quiz';
    updateActiveNav('Quiz');
    
    // Pick 10 random countries for quiz
    const shuffled = [...allCountries].sort(() => 0.5 - Math.random());
    quizCountries = shuffled.slice(0, 10);
    currentQuizIndex = 0;
    quizScore = 0;
    
    renderQuizQuestion();
  }
  
  function renderQuizQuestion() {
    if (currentQuizIndex >= quizCountries.length) {
      // Quiz complete
      const html = `
        <div class="hero">
          <h1><i class="fas fa-trophy"></i> Quiz Complete!</h1>
          <p>You scored ${quizScore} out of ${quizCountries.length}</p>
        </div>
        <div class="detail-page" style="text-align: center;">
          <i class="fas fa-star" style="font-size: 4rem; color: var(--accent);"></i>
          <h2 style="margin: 1rem 0;">${quizScore >= 7 ? 'Excellent!' : quizScore >= 5 ? 'Good job!' : 'Keep practicing!'}</h2>
          <p>You got ${quizScore} correct answers.</p>
          <div style="margin-top: 2rem;">
            <button class="back-btn" onclick="showQuiz()">Play Again</button>
            <button class="back-btn" style="background: var(--secondary);" onclick="showHome()">Back to Dashboard</button>
          </div>
        </div>
      `;
      document.getElementById('app').innerHTML = html;
      return;
    }
    
    const country = quizCountries[currentQuizIndex];
    const options = [
      country.capital?.[0] || 'Unknown',
      allCountries[Math.floor(Math.random() * allCountries.length)]?.capital?.[0] || 'Major City',
      allCountries[Math.floor(Math.random() * allCountries.length)]?.capital?.[0] || 'Capital City',
      allCountries[Math.floor(Math.random() * allCountries.length)]?.capital?.[0] || 'Metropolis'
    ].filter((v, i, a) => a.indexOf(v) === i).slice(0, 4);
    
    if (!options.includes(country.capital?.[0])) options[0] = country.capital?.[0] || 'Unknown';
    options.sort(() => Math.random() - 0.5);
    
    const html = `
      <div class="hero">
        <h1><i class="fas fa-gamepad"></i> Country Quiz Challenge</h1>
        <p>Question ${currentQuizIndex + 1} of ${quizCountries.length}</p>
      </div>
      
      <div class="detail-page" style="text-align: center;">
        <div style="margin-bottom: 2rem;">
          <img src="${country.flags?.png || ''}" style="width: 200px; border-radius: 16px; box-shadow: var(--shadow);" onerror="this.style.display='none'">
        </div>
        <h2>What is the capital of ${country.name.common}?</h2>
        <div class="info-grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); margin-top: 2rem;">
          ${options.map(opt => `
            <button class="back-btn" style="background: var(--surface); color: var(--text); justify-content: center;" onclick="checkAnswer('${opt.replace(/'/g, "\\'")}', '${country.capital?.[0]?.replace(/'/g, "\\'") || ''}')">
              ${opt}
            </button>
          `).join('')}
        </div>
        <p style="margin-top: 2rem;">Score: ${quizScore}/${quizCountries.length}</p>
      </div>
    `;
    
    document.getElementById('app').innerHTML = html;
  }
  
  function checkAnswer(selected, correct) {
    if (selected.toLowerCase() === correct.toLowerCase()) {
      quizScore++;
      alert('✅ Correct! Great job!');
    } else {
      alert(`❌ Wrong! The correct answer is ${correct}.`);
    }
    currentQuizIndex++;
    renderQuizQuestion();
  }
  
  function startCountryQuiz(cca3) {
    const country = allCountries.find(c => c.cca3 === cca3);
    if (!country) return;
    
    const answer = prompt(`What is the capital of ${country.name.common}?`);
    if (answer && answer.toLowerCase() === country.capital?.[0]?.toLowerCase()) {
      alert('✅ Correct! You know your geography!');
    } else {
      alert(`❌ The correct answer is ${country.capital?.[0] || 'unknown'}.`);
    }
    showCountryDetail(cca3);
  }

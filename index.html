<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meridian OS | Global Strategic Intelligence</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
/* ===================== ROOT THEME ===================== */
:root{
  --ink:#050608;
  --ink-2:#0d0f14;
  --ink-3:#161922;
  --ink-4:#1f232d;
  --gold:#d4af37;
  --text-main:#f8fafc;
  --text-dim:#94a3b8;
  --border:rgba(255,255,255,.06);
  --shadow:0 20px 50px rgba(0,0,0,.5);
}

/* ===================== GLOBAL RESET ===================== */
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:DM Sans,sans-serif;
  background:var(--ink);
  color:var(--text-main);
  overflow:hidden;
}

/* ===================== APP LAYOUT ===================== */
.app{
  display:grid;
  grid-template-columns:280px 1fr;
  height:100vh;
}

/* ===================== SIDEBAR ===================== */
aside{
  background:var(--ink-2);
  padding:20px;
  border-right:1px solid var(--border);
  display:flex;
  flex-direction:column;
}
.brand{
  font-weight:800;
  color:var(--gold);
  margin-bottom:20px;
  font-size:20px;
}
.nav{
  display:flex;
  flex-direction:column;
  gap:8px;
}
.nav-item{
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  color:var(--text-dim);
  transition:.3s;
}
.nav-item:hover{background:var(--ink-3);color:#fff}
.nav-item.active{background:var(--gold);color:#000}

/* ===================== MAIN ===================== */
main{overflow:auto}
header{
  padding:15px;
  display:flex;
  justify-content:space-between;
  border-bottom:1px solid var(--border);
  background:rgba(0,0,0,.4);
  backdrop-filter:blur(10px);
}
.search{
  width:320px;
  padding:10px;
  border-radius:20px;
  border:1px solid var(--border);
  background:var(--ink-3);
  color:#fff;
}

.view{display:none;padding:20px}
.view.active{display:block}

/* ===================== KPI ===================== */
.kpi{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  margin-bottom:20px;
}
.kpi-card{
  background:var(--ink-2);
  padding:15px;
  border-radius:12px;
  border:1px solid var(--border);
}

/* ===================== GRID ===================== */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:12px;
}
.card{
  background:var(--ink-2);
  border-radius:14px;
  overflow:hidden;
  cursor:pointer;
  transition:.3s;
}
.card:hover{transform:translateY(-6px)}
.card img{width:100%;height:110px;object-fit:cover}
.card-content{padding:10px}

/* ===================== HERO ===================== */
.hero{
  position:relative;
  height:260px;
  border-radius:16px;
  overflow:hidden;
  margin-bottom:20px;
}
.hero img{width:100%;height:100%;object-fit:cover;filter:brightness(.4)}
.hero h1{position:absolute;bottom:20px;left:20px;font-size:32px}

</style>
</head>
<body>

<div class="app">

<!-- ===================== SIDEBAR ===================== -->
<aside>
<div class="brand">MERIDIAN OS</div>
<div class="nav">
  <div class="nav-item active" onclick="switchView('dashboard',this)">Dashboard</div>
  <div class="nav-item" onclick="switchView('intel',this)">Intel</div>
  <div class="nav-item" onclick="switchView('analytics',this)">Analytics</div>
</div>
</aside>

<!-- ===================== MAIN ===================== -->
<main>

<header>
<input class="search" placeholder="Search countries..." oninput="search(this.value)">
<div id="clock"></div>
</header>

<!-- ===================== DASHBOARD ===================== -->
<section id="dashboard" class="view active">
<div class="kpi">
  <div class="kpi-card">Countries: <b id="count"></b></div>
  <div class="kpi-card">System: Stable</div>
  <div class="kpi-card">Risk Nodes: 128</div>
  <div class="kpi-card">Global Sync: Active</div>
</div>
<div class="grid" id="grid"></div>
</section>

<!-- ===================== INTEL ===================== -->
<section id="intel" class="view">
<div id="intelBox"></div>
</section>

<!-- ===================== ANALYTICS ===================== -->
<section id="analytics" class="view">
<h2>Global Analytics Engine</h2>
<canvas id="globalChart"></canvas>
</section>

</main>
</div>

<script>

/* ===================== DATABASE (EXPANDED WORLD LIST) ===================== */
const db = [
{code:"us",name:"United States",region:"Americas"},{code:"ca",name:"Canada",region:"Americas"},{code:"mx",name:"Mexico",region:"Americas"},{code:"br",name:"Brazil",region:"Americas"},{code:"ar",name:"Argentina",region:"Americas"},{code:"cl",name:"Chile",region:"Americas"},{code:"co",name:"Colombia",region:"Americas"},{code:"pe",name:"Peru",region:"Americas"},{code:"ve",name:"Venezuela",region:"Americas"},
{code:"uk",name:"United Kingdom",region:"Europe"},{code:"fr",name:"France",region:"Europe"},{code:"de",name:"Germany",region:"Europe"},{code:"it",name:"Italy",region:"Europe"},{code:"es",name:"Spain",region:"Europe"},{code:"pt",name:"Portugal",region:"Europe"},{code:"nl",name:"Netherlands",region:"Europe"},{code:"be",name:"Belgium",region:"Europe"},{code:"ch",name:"Switzerland",region:"Europe"},{code:"se",name:"Sweden",region:"Europe"},{code:"no",name:"Norway",region:"Europe"},{code:"fi",name:"Finland",region:"Europe"},{code:"pl",name:"Poland",region:"Europe"},{code:"ua",name:"Ukraine",region:"Europe"},{code:"tr",name:"Turkey",region:"Europe/Asia"},{code:"ru",name:"Russia",region:"Europe/Asia"},
{code:"cn",name:"China",region:"Asia"},{code:"jp",name:"Japan",region:"Asia"},{code:"kr",name:"South Korea",region:"Asia"},{code:"in",name:"India",region:"Asia"},{code:"pk",name:"Pakistan",region:"Asia"},{code:"bd",name:"Bangladesh",region:"Asia"},{code:"id",name:"Indonesia",region:"Asia"},{code:"my",name:"Malaysia",region:"Asia"},{code:"sg",name:"Singapore",region:"Asia"},{code:"th",name:"Thailand",region:"Asia"},{code:"vn",name:"Vietnam",region:"Asia"},{code:"ph",name:"Philippines",region:"Asia"},{code:"ir",name:"Iran",region:"Asia"},{code:"sa",name:"Saudi Arabia",region:"Asia"},{code:"ae",name:"UAE",region:"Asia"},{code:"il",name:"Israel",region:"Asia"},
{code:"eg",name:"Egypt",region:"Africa"},{code:"za",name:"South Africa",region:"Africa"},{code:"ng",name:"Nigeria",region:"Africa"},{code:"ke",name:"Kenya",region:"Africa"},{code:"ma",name:"Morocco",region:"Africa"},{code:"dz",name:"Algeria",region:"Africa"},{code:"gh",name:"Ghana",region:"Africa"},{code:"et",name:"Ethiopia",region:"Africa"},
{code:"au",name:"Australia",region:"Oceania"},{code:"nz",name:"New Zealand",region:"Oceania"},{code:"fj",name:"Fiji",region:"Oceania"}
];

/* ===================== RENDER SYSTEM ===================== */
function render(list=db){
  document.getElementById('count').innerText=list.length;
  document.getElementById('grid').innerHTML=list.map(c=>`
    <div class='card' onclick="openIntel('${c.code}')">
      <img src='https://flagcdn.com/w640/${c.code}.png'>
      <div class='card-content'>${c.name}</div>
    </div>
  `).join('');
}

function search(q){
  render(db.filter(c=>c.name.toLowerCase().includes(q.toLowerCase())));
}

function switchView(id){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ===================== INTEL MODULE ===================== */
function openIntel(code){
  const c=db.find(x=>x.code===code);

  document.getElementById('intelBox').innerHTML=`
    <div class='hero'>
      <img src='https://flagcdn.com/w1280/${c.code}.png'>
      <h1>${c.name}</h1>
    </div>
    <canvas id='chart'></canvas>
  `;

  switchView('intel');

  setTimeout(()=>{
    new Chart(document.getElementById('chart'),{
      type:'line',
      data:{
        labels:['Q1','Q2','Q3','Q4'],
        datasets:[{
          data:[12,22,18,35],
          borderColor:'#d4af37',
          tension:.4
        }]
      }
    });
  },100);
}

/* ===================== GLOBAL ANALYTICS ===================== */
new Chart(document.getElementById('globalChart'),{
  type:'bar',
  data:{
    labels:['Americas','Europe','Asia','Africa','Oceania'],
    datasets:[{
      data:[12,18,25,10,5],
      backgroundColor:'#d4af37'
    }]
  }
});

/* ===================== CLOCK ===================== */
setInterval(()=>{
  document.getElementById('clock').innerText=new Date().toUTCString();
},1000);

render();

</script>

</body>
</html>

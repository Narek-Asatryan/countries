        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { font-family: var(--font-main); background: var(--ink); color: var(--text-main); height: 100vh; overflow: hidden; -webkit-font-smoothing: antialiased; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--ink); }
        ::-webkit-scrollbar-thumb { background: var(--ink-4); border-radius: 10px; }

        .app-shell { display: grid; grid-template-columns: 280px 1fr; height: 100vh; width: 100vw; transition: var(--transition); }
        aside { background: var(--ink-2); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 2rem 1.2rem; z-index: 1000; transition: var(--transition); }
        .brand { display: flex; align-items: center; gap: 15px; padding-left: 0.5rem; margin-bottom: 3rem; text-decoration: none; }
        .logo-glyph { width: 40px; height: 40px; background: linear-gradient(135deg, var(--gold), var(--gold-dim)); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 800; color: var(--ink); box-shadow: 0 0 20px var(--gold-glow); }
        .brand-text { font-family: var(--font-display); font-weight: 800; font-size: 1.3rem; color: var(--text-main); }
        
        .nav-section { margin-bottom: 2rem; }
        .nav-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); margin-bottom: 1rem; padding-left: 0.8rem; }
        .nav-item { display: flex; align-items: center; gap: 14px; padding: 12px 16px; color: var(--text-dim); text-decoration: none; border-radius: var(--radius-md); transition: var(--transition); font-weight: 500; font-size: 0.95rem; cursor: pointer; margin-bottom: 4px; }
        .nav-item:hover { background: var(--ink-3); color: var(--text-main); transform: translateX(5px); }
        .nav-item.active { background: var(--gold); color: var(--ink); font-weight: 700; box-shadow: 0 4px 15px var(--gold-glow); }
        .nav-icon { font-size: 1.1rem; width: 24px; text-align: center; }

        .system-status { margin-top: auto; background: var(--ink-3); padding: 1rem; border-radius: var(--radius-lg); border: 1px solid var(--border); }
        .status-dot { width: 8px; height: 8px; background: var(--jade); border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 10px var(--jade); animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        main { overflow-y: auto; height: 100vh; background: radial-gradient(circle at top right, #11141d, var(--ink)); position: relative; }
        header { position: sticky; top: 0; height: 80px; background: rgba(5, 6, 8, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 3rem; z-index: 90; }
        .search-container { position: relative; width: 450px; }
        .search-input { width: 100%; background: var(--ink-3); border: 1px solid var(--border); padding: 12px 20px 12px 50px; border-radius: 99px; color: white; transition: var(--transition); }
        .search-input:focus { border-color: var(--gold); background: var(--ink-4); box-shadow: 0 0 0 4px var(--gold-glow); }
        .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }

        .view { padding: 3rem; max-width: 1400px; margin: 0 auto; display: none; animation: fadeIn 0.5s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; margin-bottom: 3rem; }
        .kpi-card { background: var(--ink-2); padding: 1.5rem; border-radius: var(--radius-lg); border: 1px solid var(--border); position: relative; overflow: hidden; }
        .kpi-val { font-family: var(--font-display); font-size: 2rem; font-weight: 800; margin-top: 0.5rem; }

        .country-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; }
        .card { background: var(--ink-2); border-radius: var(--radius-xl); border: 1px solid var(--border); overflow: hidden; cursor: pointer; transition: var(--transition); padding: 1.5rem; }
        .card:hover { transform: translateY(-10px); border-color: var(--gold); box-shadow: var(--shadow-lg); }
        .region-tag { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; color: var(--gold); margin-bottom: 0.5rem; }
        .card-title { font-family: var(--font-display); font-size: 1.3rem; font-weight: 700; margin-bottom: 1rem; }
        .card-stats { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-dim); }

        .intel-box { background: var(--ink-2); padding: 2.5rem; border-radius: var(--radius-xl); border: 1px solid var(--border); margin-bottom: 2rem; }
        .intel-table { width: 100%; border-collapse: collapse; }
        .intel-table th { text-align: left; padding: 1.2rem; border-bottom: 1px solid var(--border-bright); color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; }
        .intel-table td { padding: 1.2rem; border-bottom: 1px solid var(--border); font-size: 0.95rem; }

        /* Mobile */
        @media (max-width: 850px) {
            .app-shell { grid-template-columns: 1fr; }
            aside { position: fixed; left: -280px; top: 0; bottom: 0; width: 280px; }
            .sidebar-active aside { left: 0; }
            .view { padding: 1.5rem; }
            .kpi-row { grid-template-columns: 1fr 1fr; }
            .search-container { width: 200px; }
        }
    </style>
</head>

    function handleNav(v, e) { switchView(v); document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); e.classList.add('active'); }

    function switchView(viewId) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        document.querySelector('main').scrollTop = 0;
    }

    function renderAll() {
        const grid = document.getElementById('countryGrid');
        const risk = document.getElementById('riskTableBody');
        const macro = document.getElementById('macroTableBody');
        
        document.getElementById('countDisplay').innerText = database.length;

        grid.innerHTML = database.map(c => `
            <div class="card">
                <div class="region-tag">${c.region}</div>
                <div class="card-title">${c.name}</div>
                <div class="card-stats"><span>GDP: ${c.gdp}</span><span>Risk: ${c.risk}</span></div>
            </div>
        `).join('');

        risk.innerHTML = database.map(c => `<tr><td>${c.name}</td><td>${c.risk}</td><td>${c.capital}</td></tr>`).join('');
        macro.innerHTML = database.map(c => `<tr><td>${c.name}</td><td>${c.gdp}</td><td>${c.pop}</td><td>${c.debt}</td></tr>`).join('');
    }

    function handleGlobalSearch() {
        const val = document.getElementById('mainSearch').value.toLowerCase();
        const filtered = database.filter(c => c.name.toLowerCase().includes(val) || c.region.toLowerCase().includes(val));
        document.getElementById('countryGrid').innerHTML = filtered.map(c => `
            <div class="card">
                <div class="region-tag">${c.region}</div>
                <div class="card-title">${c.name}</div>
                <div class="card-stats"><span>GDP: ${c.gdp}</span><span>Risk: ${c.risk}</span></div>
            </div>
        `).join('');
    }

    // QUIZ LOGIC
    function initQuiz() {
        const c = database[Math.floor(Math.random() * database.length)];
        document.getElementById('quizQuestion').innerText = `Which region does ${c.name} belong to?`;
        const options = [...new Set(database.map(x => x.region))].sort(() => 0.5 - Math.random()).slice(0, 4);
        if(!options.includes(c.region)) options[0] = c.region;
        document.getElementById('quizOptions').innerHTML = options.map(o => `
            <button class="nav-item" style="display:inline-block; margin:5px;" onclick="checkAnswer('${o}', '${c.region}')">${o}</button>
        `).join('');
    }

    function checkAnswer(a, c) {
        alert(a === c ? "Correct. Access Granted." : "Incorrect. Stabilizing data...");
        initQuiz();
    }

    setInterval(() => { document.getElementById('digitalClock').innerText = new Date().toLocaleTimeString() + " UTC"; }, 1000);
    renderAll();
    initQuiz();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meridian OS | Global Strategic Intelligence</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        /* ========================================
        1. DESIGN SYSTEM & VARIABLES
        ========================================
        */
        :root {
            --ink: #050608;
            --ink-2: #0d0f14;
            --ink-3: #161922;
            --ink-4: #1f232d;
            --gold: #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.3);
            --gold-dim: #8a6d1a;
            --jade: #4ade80;
            --coral: #fb7185;
            --sky: #60a5fa;
            --violet: #a78bfa;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --text-muted: #475569;
            --border: rgba(255, 255, 255, 0.06);
            --border-bright: rgba(255, 255, 255, 0.12);
            --radius-xl: 24px;
            --radius-lg: 16px;
            --radius-md: 10px;
            --radius-sm: 6px;
            --font-main: 'DM Sans', sans-serif;
            --font-display: 'Syne', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --shadow-lg: 0 20px 50px rgba(0, 0, 0, 0.5);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ========================================
        2. BASE RESET & SCROLLBAR
        ========================================
        */
        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        
        body {
            font-family: var(--font-main);
            background: var(--ink);
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--ink); }
        ::-webkit-scrollbar-thumb { background: var(--ink-4); border-radius: 10px; }

        /* ========================================
        3. APP SHELL LAYOUT
        ========================================
        */
        .app-shell {
            display: grid;
            grid-template-columns: 280px 1fr;
            height: 100vh;
            width: 100vw;
        }

        /* ========================================
        4. SIDEBAR (NAVIGATION)
        ========================================
        */
        aside {
            background: var(--ink-2);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 2rem 1.2rem;
            z-index: 100;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 15px;
            padding-left: 0.5rem;
            margin-bottom: 3rem;
            text-decoration: none;
        }

        .logo-glyph {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--gold), var(--gold-dim));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            font-weight: 800;
            color: var(--ink);
            box-shadow: 0 0 20px var(--gold-glow);
        }

        .brand-text {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 1.3rem;
            color: var(--text-main);
        }

        .nav-section { margin-bottom: 2rem; }
        .nav-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); margin-bottom: 1rem; padding-left: 0.8rem; }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 12px 16px;
            color: var(--text-dim);
            text-decoration: none;
            border-radius: var(--radius-md);
            transition: var(--transition);
            font-weight: 500;
            font-size: 0.95rem;
            cursor: pointer;
            margin-bottom: 4px;
        }

        .nav-item:hover { background: var(--ink-3); color: var(--text-main); transform: translateX(5px); }
        .nav-item.active { background: var(--gold); color: var(--ink); font-weight: 700; box-shadow: 0 4px 15px var(--gold-glow); }
        .nav-icon { font-size: 1.1rem; width: 24px; text-align: center; }

        .system-status { margin-top: auto; background: var(--ink-3); padding: 1rem; border-radius: var(--radius-lg); border: 1px solid var(--border); }
        .status-dot { width: 8px; height: 8px; background: var(--jade); border-radius: 50%; display: inline-block; margin-right: 8px; box-shadow: 0 0 10px var(--jade); animation: pulse 2s infinite; }

        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* ========================================
        5. MAIN CONTENT AREA
        ========================================
        */
        main { overflow-y: auto; height: 100vh; background: radial-gradient(circle at top right, #11141d, var(--ink)); position: relative; }
        header { position: sticky; top: 0; height: 80px; background: rgba(5, 6, 8, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 3rem; z-index: 90; }
        .search-container { position: relative; width: 450px; }
        .search-input { width: 100%; background: var(--ink-3); border: 1px solid var(--border); padding: 12px 20px 12px 50px; border-radius: 99px; color: white; transition: var(--transition); }
        .search-input:focus { border-color: var(--gold); background: var(--ink-4); box-shadow: 0 0 0 4px var(--gold-glow); }
        .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }

        /* ========================================
        6. VIEW SYSTEM (SPA)
        ========================================
        */
        .view { padding: 3rem; max-width: 1400px; margin: 0 auto; display: none; animation: fadeIn 0.5s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* ========================================
        7. DASHBOARD GRID & CARDS
        ========================================
        */
        .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; margin-bottom: 3rem; }
        .kpi-card { background: var(--ink-2); padding: 1.5rem; border-radius: var(--radius-lg); border: 1px solid var(--border); position: relative; overflow: hidden; }
        .kpi-card::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: var(--accent, var(--gold)); }
        .kpi-val { font-family: var(--font-display); font-size: 2rem; font-weight: 800; margin-top: 0.5rem; }

        .country-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 2rem; }
        .card { background: var(--ink-2); border-radius: var(--radius-xl); border: 1px solid var(--border); overflow: hidden; cursor: pointer; transition: var(--transition); }
        .card:hover { transform: translateY(-10px); border-color: var(--gold); box-shadow: var(--shadow-lg); }
        .card-banner { height: 160px; background: #000; position: relative; overflow: hidden; }
        .card-banner img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; transition: var(--transition); }
        .card-content { padding: 1.5rem; }
        .region-tag { font-size: 0.65rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; color: var(--gold); margin-bottom: 0.5rem; }
        .card-title { font-family: var(--font-display); font-size: 1.3rem; font-weight: 700; margin-bottom: 1rem; }
        .card-stats { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-dim); }

        /* ========================================
        8. DETAIL VIEW (INTEL REPORT)
        ========================================
        */
        .intel-hero { height: 400px; border-radius: var(--radius-xl); margin-bottom: 3rem; position: relative; overflow: hidden; display: flex; align-items: flex-end; padding: 4rem; }
        .intel-hero img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; filter: brightness(0.4); }
        .hero-data { position: relative; z-index: 5; }
        .hero-name { font-family: var(--font-display); font-size: 5rem; line-height: 1; margin-bottom: 1rem; }
        .report-layout { display: grid; grid-template-columns: 2fr 1fr; gap: 2.5rem; }
        .intel-box { background: var(--ink-2); padding: 2.5rem; border-radius: var(--radius-xl); border: 1px solid var(--border); margin-bottom: 2rem; }
        .chart-container { height: 300px; margin-top: 2rem; }
        .data-pill { background: var(--ink-3); padding: 1rem 1.5rem; border-radius: var(--radius-md); border: 1px solid var(--border); display: flex; flex-direction: column; gap: 5px; }

        /* ========================================
        9. DATA TABLES
        ========================================
        */
        .intel-table { width: 100%; border-collapse: collapse; }
        .intel-table th { text-align: left; padding: 1.2rem; border-bottom: 1px solid var(--border-bright); color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; }
        .intel-table td { padding: 1.2rem; border-bottom: 1px solid var(--border); font-size: 0.95rem; }

        /* ========================================
        10. MOBILE ADAPTATION LAYER (NEW)
        ========================================
        */
        @media (max-width: 850px) {
            body { overflow-y: auto; height: auto; }
            .app-shell { grid-template-columns: 1fr; }
            
            /* Sidebar becomes Bottom Nav */
            aside {
                position: fixed; bottom: 0; left: 0; right: 0;
                height: 70px; flex-direction: row; padding: 0;
                border-right: none; border-top: 1px solid var(--border);
                background: rgba(13, 15, 20, 0.95); backdrop-filter: blur(10px);
                justify-content: space-around; align-items: center;
                z-index: 1000;
            }
            .brand, .nav-label, .system-status { display: none !important; }
            .nav-section { margin: 0; }
            .nav-group { display: flex; flex-direction: row; width: 100vw; justify-content: space-evenly; }
            .nav-item { margin: 0; flex-direction: column; gap: 4px; font-size: 0.65rem; padding: 10px; width: 20%; align-items: center; text-align: center; }
            .nav-icon { width: auto; font-size: 1.3rem; }
            .nav-item:hover { transform: none; }
            .nav-item.active { box-shadow: none; background: transparent; color: var(--gold); }

            /* Content Adjustments */
            main { height: auto; padding-bottom: 80px; }
            header { padding: 0 1.5rem; height: 70px; }
            .search-container { width: 100%; }
            header > div:last-child { display: none; } /* Hide clock on mobile header */

            .view { padding: 1.5rem; }
            .kpi-row { grid-template-columns: 1fr 1fr; gap: 1rem; }
            .kpi-val { font-size: 1.4rem; }
            
            .hero-name { font-size: 2.5rem; }
            .intel-hero { height: 250px; padding: 1.5rem; }
            .report-layout { grid-template-columns: 1fr; gap: 1rem; }
            .intel-box { padding: 1.5rem; }
            
            /* Table responsiveness */
            .intel-table th:nth-child(2), .intel-table td:nth-child(2) { display: none; }
        }

        .text-jade { color: var(--jade); }
        .text-coral { color: var(--coral); }
    </style>
</head>
<body>

<div class="app-shell">
    
    <aside>
        <a href="#" class="brand" onclick="switchView('dashboard')">
            <div class="logo-glyph">M</div>
            <div class="brand-text">MERIDIAN OS</div>
        </a>

        <div class="nav-section">
            <div class="nav-label">Core Systems</div>
            <nav class="nav-group">
                <div class="nav-item active" onclick="switchView('dashboard', this)">
                    <span class="nav-icon">⊞</span> Dashboard
                </div>
                <div class="nav-item" onclick="switchView('risk-view', this)">
                    <span class="nav-icon">🛡️</span> Risk
                </div>
                <div class="nav-item" onclick="switchView('macro-view', this)">
                    <span class="nav-icon">📊</span> Macro
                </div>
                <div class="nav-item" onclick="switchView('quiz-view', this)">
                    <span class="nav-icon">🧩</span> Quiz
                </div>
            </nav>
        </div>

        <div class="system-status">
            <div class="status-dot"></div>
            <span style="font-size: 0.8rem; font-weight: 600;">Neural Link: Active</span>
        </div>
    </aside>

    <main>
        <header>
            <div class="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" id="mainSearch" placeholder="Filter global intelligence..." onkeyup="handleGlobalSearch()">
            </div>
            
            <div style="display: flex; gap: 1rem;">
                <div style="background: var(--ink-3); border: 1px solid var(--border); padding: 10px; border-radius: var(--radius-md); font-family: var(--font-mono); font-size: 0.8rem; color: var(--gold);">
                    <span id="digitalClock">00:00:00 UTC</span>
                </div>
            </div>
        </header>

        <section id="dashboard" class="view active">
            <div class="kpi-row">
                <div class="kpi-card" style="--accent: var(--sky)"><div class="nav-label">Nations</div><div class="kpi-val">195</div></div>
                <div class="kpi-card" style="--accent: var(--jade)"><div class="nav-label">Global GDP</div><div class="kpi-val">$105T</div></div>
                <div class="kpi-card" style="--accent: var(--coral)"><div class="nav-label">Redzones</div><div class="kpi-val">14</div></div>
                <div class="kpi-card" style="--accent: var(--violet)"><div class="nav-label">Signals</div><div class="kpi-val">2.4k</div></div>
            </div>
            <div class="country-grid" id="countryGrid"></div>
        </section>

        <section id="risk-view" class="view">
            <h1 style="font-family: var(--font-display); font-size: 2rem; margin-bottom: 2rem;">Risk Matrix</h1>
            <div class="intel-box"><table class="intel-table"><thead><tr><th>Nation</th><th>Region</th><th>Stability</th><th>Level</th></tr></thead><tbody id="riskTableBody"></tbody></table></div>
        </section>

        <section id="macro-view" class="view">
            <h1 style="font-family: var(--font-display); font-size: 2rem; margin-bottom: 2rem;">Macro Data</h1>
            <div class="intel-box"><table class="intel-table"><thead><tr><th>Nation</th><th>GDP</th><th>Pop</th><th>Debt</th></tr></thead><tbody id="macroTableBody"></tbody></table></div>
        </section>

        <section id="intel-report" class="view">
            <button class="nav-item" style="margin-bottom: 2rem; width: fit-content;" onclick="switchView('dashboard')">← Back</button>
            <div id="intelReportContent"></div>
        </section>

        <section id="quiz-view" class="view">
            <div style="background: var(--ink-2); padding: 2rem; border-radius: var(--radius-xl); text-align: center; border: 1px solid var(--gold);">
                <h2 style="color: var(--gold); margin-bottom: 1rem;">Geo-Quiz</h2>
                <p id="quizQuestion" style="font-size: 1.2rem; margin-bottom: 2rem;">Loading...</p>
                <div id="quizOptions"></div>
            </div>
        </section>

    </main>
</div>

<script>
    const database = [
        { id: "us", name: "United States", region: "N. America", gdp: "23.3T", pop: "331M", risk: "Low", debt: "128%", capital: "Washington D.C.", analysis: "US maintains reserve currency status. Shift toward domestic manufacturing is accelerating." },
        { id: "cn", name: "China", region: "E. Asia", gdp: "17.7T", pop: "1.4B", risk: "Medium", debt: "77%", capital: "Beijing", analysis: "Transitioning to consumption-led growth. Strategic BRI expansion continues." },
        { id: "jp", name: "Japan", region: "E. Asia", gdp: "4.9T", pop: "125M", risk: "Low", debt: "263%", capital: "Tokyo", analysis: "Managing hyper-aged demographics via high-end automation and robotics." },
        { id: "de", name: "Germany", region: "Europe", gdp: "4.2T", pop: "83M", risk: "Low", debt: "69%", capital: "Berlin", analysis: "Navigating energy sovereignty shifts while modernizing automotive core." },
        { id: "in", name: "India", region: "S. Asia", gdp: "3.1T", pop: "1.4B", risk: "Medium", debt: "89%", capital: "New Delhi", analysis: "Massive digital transition occurring across a dominant youth demographic." },
        { id: "gb", name: "UK", region: "Europe", gdp: "3.1T", pop: "67M", risk: "Low", debt: "103%", capital: "London", analysis: "Post-Brexit positioning focused on high-end fintech and defense." },
        { id: "fr", name: "France", region: "Europe", gdp: "2.9T", pop: "67M", risk: "Low", debt: "112%", capital: "Paris", analysis: "Aggressive push for European strategic and nuclear energy autonomy." },
        { id: "br", name: "Brazil", region: "S. America", gdp: "1.6T", pop: "214M", risk: "Medium", debt: "80%", capital: "Brasilia", analysis: "Agricultural power scaling renewable energy exports significantly." }
    ];

    function switchView(viewId, element) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(viewId).classList.add('active');
        if (element) {
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            element.classList.add('active');
        }
        document.querySelector('main').scrollTop = 0;
    }

    function renderDashboard(dataList) {
        document.getElementById('countryGrid').innerHTML = dataList.map(c => `
            <div class="card" onclick="openIntelReport('${c.id}')">
                <div class="card-banner"><img src="https://flagcdn.com/w640/${c.id}.png"></div>
                <div class="card-content">
                    <div class="region-tag">${c.region}</div>
                    <h3 class="card-title">${c.name}</h3>
                    <div class="card-stats"><span>GDP: ${c.gdp}</span><span style="color:${getRiskColor(c.risk)}">${c.risk}</span></div>
                </div>
            </div>
        `).join('');
    }

    function renderTables() {
        document.getElementById('riskTableBody').innerHTML = database.map(c => `
            <tr><td><b>${c.name}</b></td><td>${c.region}</td><td><div style="width:50px; height:4px; background:#222;"><div style="width:80%; height:100%; background:var(--gold);"></div></div></td><td><span style="color:${getRiskColor(c.risk)}">${c.risk}</span></td></tr>
        `).join('');
        document.getElementById('macroTableBody').innerHTML = database.map(c => `
            <tr><td><b>${c.name}</b></td><td class="text-jade">${c.gdp}</td><td>${c.pop}</td><td class="text-coral">${c.debt}</td></tr>
        `).join('');
    }

    function handleGlobalSearch() {
        const q = document.getElementById('mainSearch').value.toLowerCase();
        renderDashboard(database.filter(c => c.name.toLowerCase().includes(q)));
    }

    function getRiskColor(risk) { return risk === "Low" ? "var(--jade)" : (risk === "Medium" ? "var(--gold)" : "var(--coral)"); }

    function openIntelReport(id) {
        const c = database.find(x => x.id === id);
        document.getElementById('intelReportContent').innerHTML = `
            <div class="intel-hero">
                <img src="https://flagcdn.com/w1280/${c.id}.png">
                <div class="hero-data"><h1 class="hero-name">${c.name}</h1><p>${c.capital} | Risk: ${c.risk}</p></div>
            </div>
            <div class="report-layout">
                <div class="intel-box"><h3>Strategic Analysis</h3><p>${c.analysis}</p><div class="chart-container"><canvas id="countryChart"></canvas></div></div>
                <div class="intel-box" style="border-color:var(--gold);"><h3>Vitals</h3><p>GDP: ${c.gdp}</p><p>Pop: ${c.pop}</p><p>Debt: ${c.debt}</p></div>
            </div>
        `;
        switchView('intel-report');
        setTimeout(() => initChart(), 100);
    }

    function initChart() {
        const ctx = document.getElementById('countryChart').getContext('2d');
        new Chart(ctx, { type: 'line', data: { labels: ['Q1','Q2','Q3','Q4'], datasets: [{ data: [10,25,15,30], borderColor: '#d4af37', tension: 0.4 }] }, options: { plugins: { legend: { display: false } } } });
    }

    function startQuiz() {
        const c = database[Math.floor(Math.random()*database.length)];
        document.getElementById('quizQuestion').innerText = `What is the capital of ${c.name}?`;
        document.getElementById('quizOptions').innerHTML = [c.capital, "London", "Paris", "Tokyo"].sort(() => Math.random()-0.5).map(opt => `<button class="nav-item" style="width:100%; margin-bottom:10px; justify-content:center;" onclick="alert('${opt === c.capital ? 'Correct' : 'Wrong'}')">${opt}</button>`).join('');
    }

    window.onload = () => { renderDashboard(database); renderTables(); startQuiz(); setInterval(() => { document.getElementById('digitalClock').innerText = new Date().toUTCString().split(' ')[4] + " UTC"; }, 1000); };
</script>
</body>
</html>

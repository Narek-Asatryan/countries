<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meridian Lite | Country Intelligence Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#0a0b0f;--surface:#14151c;--surface2:#1e1f2a;--text:#f0ede8;--text-light:#9a9595;--gold:#c8a84b;--gold-light:#e2c97a;--border:rgba(255,255,255,0.07);--radius:12px;--radius-lg:20px;--transition:all 0.2s ease;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;}
.app{max-width:1400px;margin:0 auto;padding:0 20px;}
/* Header */
.header{background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
.logo{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--gold),var(--gold-light));background-clip:text;-webkit-background-clip:text;color:transparent;}
.logo i{font-size:22px;margin-right:6px;}
.search-box{display:flex;align-items:center;background:var(--surface2);border:1px solid var(--border);border-radius:40px;padding:8px 16px;width:280px;}
.search-box i{color:var(--text-light);margin-right:8px;}
.search-box input{background:none;border:none;outline:none;color:var(--text);width:100%;font-size:13px;}
.nav-links{display:flex;gap:8px;flex-wrap:wrap;}
.nav-btn{padding:8px 16px;border:none;background:transparent;border-radius:40px;cursor:pointer;color:var(--text-light);font-weight:500;transition:var(--transition);}
.nav-btn.active,.nav-btn:hover{background:var(--gold);color:#0a0b0f;}
.hero{background:linear-gradient(135deg,var(--surface),var(--surface2));border-radius:24px;padding:32px;margin:24px 0;text-align:center;border:1px solid var(--border);}
.hero h1{font-size:28px;margin-bottom:8px;background:linear-gradient(135deg,var(--gold),var(--gold-light));background-clip:text;-webkit-background-clip:text;color:transparent;}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:16px;margin:24px 0;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;text-align:center;}
.stat-value{font-size:28px;font-weight:800;color:var(--gold);}
.filter-bar{display:flex;gap:12px;flex-wrap:wrap;margin:20px 0;align-items:center;}
.filter-chip{padding:6px 14px;border-radius:40px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:12px;transition:var(--transition);}
.filter-chip.active,.filter-chip:hover{background:var(--gold);color:#0a0b0f;border-color:var(--gold);}
.country-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;margin:24px 0;}
.country-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:var(--transition);}
.country-card:hover{transform:translateY(-3px);border-color:var(--gold);box-shadow:0 8px 24px rgba(0,0,0,0.3);}
.flag{width:100%;height:140px;object-fit:cover;background:var(--surface2);}
.card-body{padding:16px;}
.country-name{font-weight:700;font-size:16px;display:flex;justify-content:space-between;margin-bottom:8px;}
.detail-page{max-width:900px;margin:24px auto;background:var(--surface);border-radius:24px;padding:28px;border:1px solid var(--border);}
.back-btn{display:inline-flex;align-items:center;gap:8px;padding:8px 20px;background:var(--surface2);border:1px solid var(--border);border-radius:40px;cursor:pointer;margin-bottom:20px;color:var(--text);}
.detail-header{display:flex;gap:24px;flex-wrap:wrap;margin-bottom:24px;}
.detail-flag{width:240px;border-radius:12px;border:1px solid var(--border);}
.info-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px;margin:20px 0;}
.info-card{background:var(--surface2);border-radius:12px;padding:16px;border:1px solid var(--border);}
.info-card h3{font-size:13px;color:var(--gold);margin-bottom:12px;text-transform:uppercase;letter-spacing:1px;}
.fun-fact{background:linear-gradient(135deg,rgba(200,168,75,0.1),rgba(200,168,75,0.05));border:1px solid rgba(200,168,75,0.2);border-radius:12px;padding:16px;margin:16px 0;}
.pagination{display:flex;justify-content:center;gap:8px;margin:24px 0;flex-wrap:wrap;}
.page-btn{padding:6px 12px;border:1px solid var(--border);background:var(--surface);border-radius:8px;cursor:pointer;}
.page-btn.active,.page-btn:hover{background:var(--gold);color:#0a0b0f;}
.toast{position:fixed;bottom:20px;right:20px;background:var(--surface2);border:1px solid var(--gold);border-radius:12px;padding:12px 20px;z-index:1000;animation:slideIn 0.3s ease;}
@keyframes slideIn{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}
.loading{text-align:center;padding:60px;}
.spinner{width:40px;height:40px;border:3px solid var(--surface2);border-top-color:var(--gold);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg);}}
footer{text-align:center;padding:24px;border-top:1px solid var(--border);margin-top:32px;color:var(--text-light);font-size:12px;}
@media(max-width:768px){.header{flex-direction:column;}.search-box{width:100%;}.detail-header{flex-direction:column;}.detail-flag{width:100%;}}
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="logo"><i class="fas fa-globe"></i> Meridian</div>
    <div class="search-box"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Search country..."></div>
    <div class="nav-links">
      <button class="nav-btn active" data-page="home">🏠 Home</button>
      <button class="nav-btn" data-page="favorites">❤️ Favorites</button>
      <button class="nav-btn" data-page="about">ℹ️ About</button>
    </div>
  </div>

</div>

// ============================================
// STATE MANAGEMENT
// ============================================
let allCountries = COUNTRIES_DATA;
let filteredCountries = [...allCountries];
let favorites = JSON.parse(localStorage.getItem('meridian_favs') || '[]');
let currentPage = 1;
let perPage = 12;
let searchTerm = '';
let currentView = 'home';
let selectedCountry = null;

function toast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.innerHTML = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

function saveFavs() { localStorage.setItem('meridian_favs', JSON.stringify(favorites)); }

function toggleFav(cca3, e) {
  if(e) e.stopPropagation();
  if(favorites.includes(cca3)) { favorites = favorites.filter(f => f !== cca3); toast('Removed from favorites'); }
  else { favorites.push(cca3); toast('Added to favorites ❤️'); }
  saveFavs();
  renderCurrentView();
}

function isFav(cca3) { return favorites.includes(cca3); }

function formatPop(n) {
  if(!n) return 'N/A';
  if(n>=1e9) return (n/1e9).toFixed(2)+'B';
  if(n>=1e6) return (n/1e6).toFixed(1)+'M';
  return n.toLocaleString();
}

function formatArea(n) {
  if(!n) return 'N/A';
  if(n>=1e6) return (n/1e6).toFixed(2)+'M km²';
  if(n>=1e3) return (n/1e3).toFixed(1)+'K km²';
  return n+' km²';
}

function buildCard(c) {
  return `
    <div class="country-card" onclick="showDetail('${c.cca3}')">
      <img class="flag" src="${c.flag}" alt="${c.name}" loading="lazy">
      <div class="card-body">
        <div class="country-name">
          ${c.name}
          <i class="fas fa-heart" style="color:${isFav(c.cca3)?'#c8a84b':'#555'};cursor:pointer" onclick="toggleFav('${c.cca3}',event)"></i>
        </div>
        <div style="font-size:12px;color:var(--text-light);margin:4px 0">${c.capital || '—'}</div>
        <div style="display:flex;justify-content:space-between;margin-top:8px;font-size:12px">
          <span><i class="fas fa-users"></i> ${formatPop(c.population)}</span>
          <span><i class="fas fa-map-marker-alt"></i> ${c.region}</span>
        </div>
      </div>
    </div>`;
}

function renderHome() {
  const start = (currentPage-1)*perPage;
  const paginated = filteredCountries.slice(start, start+perPage);
  const totalPages = Math.ceil(filteredCountries.length/perPage);
  const totalPop = allCountries.reduce((s,c)=>s+(c.population||0),0);
  
  let html = `
    <div class="hero">
      <h1><i class="fas fa-chart-line"></i> Country Intelligence</h1>
      <p>${allCountries.length} major nations | Real-time data | Optimized for speed</p>
    </div>
    <div class="stats">
      <div class="stat-card"><div class="stat-value">${allCountries.length}</div><div>Countries</div></div>
      <div class="stat-card"><div class="stat-value">${(totalPop/1e9).toFixed(2)}B</div><div>Population</div></div>
      <div class="stat-card"><div class="stat-value">${favorites.length}</div><div>Favorites</div></div>
    </div>
    <div class="filter-bar">
      <span class="filter-chip ${searchTerm===''?'active':''}" onclick="setRegion('all')">🌍 All</span>
      <span class="filter-chip" onclick="setRegion('Americas')">🌎 Americas</span>
      <span class="filter-chip" onclick="setRegion('Europe')">🌍 Europe</span>
      <span class="filter-chip" onclick="setRegion('Asia')">🌏 Asia</span>
      <span class="filter-chip" onclick="setRegion('Africa')">🌍 Africa</span>
      <span class="filter-chip" onclick="setRegion('Oceania')">🌊 Oceania</span>
      <select id="sortSelect" class="filter-chip" onchange="applySort()" style="background:var(--surface2)">
        <option value="name">Sort: Name</option><option value="pop">Sort: Population</option><option value="area">Sort: Area</option>
      </select>
    </div>
    <div class="country-grid" id="countryGrid"></div>
    <div class="pagination" id="pagination"></div>
  `;
  document.getElementById('mainContent').innerHTML = html;
  
  const grid = document.getElementById('countryGrid');
  if(paginated.length===0) grid.innerHTML = '<div style="text-align:center;padding:40px;">No countries found</div>';
  else grid.innerHTML = paginated.map(buildCard).join('');
  
  if(totalPages>1){
    let pgHtml = '';
    for(let i=1;i<=Math.min(totalPages,8);i++){
      pgHtml += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
    }
    document.getElementById('pagination').innerHTML = pgHtml;
  }
}

function applySort() {
  const sortBy = document.getElementById('sortSelect')?.value || 'name';
  if(sortBy==='pop') filteredCountries.sort((a,b)=>(b.population||0)-(a.population||0));
  else if(sortBy==='area') filteredCountries.sort((a,b)=>(b.area||0)-(a.area||0));
  else filteredCountries.sort((a,b)=>a.name.localeCompare(b.name));
  currentPage=1;
  renderHome();
}

function setRegion(region) {
  if(region==='all') filteredCountries = [...allCountries];
  else filteredCountries = allCountries.filter(c=>c.region===region);
  applySort();
}

function goPage(p){ currentPage=p; renderHome(); }

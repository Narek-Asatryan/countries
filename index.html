<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MERIDIAN OS | GLOBAL STRATEGIC INTELLIGENCE</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --ink: #050608;
            --ink-2: #0d1117;
            --ink-3: #161b22;
            --ink-4: #21262d;
            --gold: #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.25);
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
            --text-muted: #484f58;
            --border: rgba(240, 246, 252, 0.1);
            --radius-xl: 40px;
            --radius-lg: 20px;
            --font-display: 'Syne', sans-serif;
            --font-main: 'DM Sans', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: crosshair; }
        body { 
            font-family: var(--font-main); 
            background: var(--ink); 
            color: var(--text-main); 
            height: 100vh; 
            width: 100vw;
            overflow: hidden;
        }

        /* --- LAYOUT STRUCTURE --- */
        .app-container {
            display: grid;
            grid-template-columns: 300px 1fr;
            height: 100vh;
        }

        /* --- DESKTOP SIDEBAR (LEFT) --- */
        aside {
            background: var(--ink-2);
            border-right: 1px solid var(--border);
            padding: 2.5rem 1.5rem;
            display: flex;
            flex-direction: column;
            z-index: 1000;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 4rem;
            text-decoration: none;
        }

        .logo-glyph {
            width: 45px;
            height: 45px;
            background: var(--gold);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            color: var(--ink);
            font-weight: 800;
            font-size: 1.3rem;
            box-shadow: 0 0 25px var(--gold-glow);
        }

        .brand h2 {
            font-family: var(--font-display);
            font-size: 1.1rem;
            letter-spacing: 1px;
            color: white;
            text-transform: uppercase;
        }

        .nav-list { flex-grow: 1; }
        .nav-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
            margin: 2rem 0 1rem 10px;
            font-weight: 800;
        }

        .nav-item {
            padding: 16px 20px;
            color: var(--text-dim);
            cursor: pointer;
            border-radius: 15px;
            margin-bottom: 8px;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 500;
        }

        .nav-item:hover { background: var(--ink-3); color: white; transform: translateX(8px); }
        .nav-item.active { background: var(--gold); color: var(--ink); font-weight: 800; }

        /* --- MOBILE BOTTOM NAV (BOTTOM) --- */
        .mobile-nav {
            display: none;
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 75px;
            background: rgba(13, 17, 23, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid var(--border);
            z-index: 2000;
            justify-content: space-around;
            align-items: center;
            padding: 0 10px;
        }

        .mobile-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-dim);
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            gap: 5px;
        }

        .mobile-item.active { color: var(--gold); }

        /* --- MAIN VIEWPORT --- */
        main {
            position: relative;
            overflow-y: auto;
            background: radial-gradient(circle at 50% 0%, #1a1e2a 0%, var(--ink) 80%);
            scroll-behavior: smooth;
        }

        header {
            height: 100px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 4rem;
            position: sticky;
            top: 0;
            background: rgba(5, 6, 8, 0.85);
            backdrop-filter: blur(25px);
            z-index: 100;
        }

        .search-container { position: relative; width: 450px; }
        .search-container input {
            width: 100%;
            background: var(--ink-3);
            border: 1px solid var(--border);
            padding: 14px 20px 14px 55px;
            border-radius: 100px;
            color: white;
            font-size: 0.95rem;
            transition: var(--transition);
        }
        .search-container input:focus { border-color: var(--gold); outline: none; background: var(--ink-4); }
        .search-container::before { content: 'SCAN'; position: absolute; left: 20px; top: 16px; font-family: var(--font-mono); font-size: 0.7rem; color: var(--gold); font-weight: 800; }

        .view {
            padding: 4rem;
            display: none;
            animation: viewFade 0.5s var(--transition);
            max-width: 1500px;
            margin: 0 auto;
        }
        .view.active { display: block; }
        @keyframes viewFade { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        /* --- INTEL GRID --- */
        .intel-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2.5rem;
            padding-bottom: 120px; /* Space for mobile nav */
        }

        .intel-card {
            background: var(--ink-2);
            border-radius: 30px;
            border: 1px solid var(--border);
            padding: 2.5rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .intel-card:hover {
            border-color: var(--gold);
            transform: translateY(-12px);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            background: var(--ink-3);
        }

        .flag-icon {
            width: 55px;
            height: 34px;
            border-radius: 6px;
            object-fit: cover;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }

        .intel-card .region { color: var(--gold); font-size: 0.75rem; font-weight: 800; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; }
        .intel-card h3 { font-family: var(--font-display); font-size: 1.8rem; margin-bottom: 15px; }

        /* --- DOSSIER VIEW (DETAIL) --- */
        .back-nav {
            background: #f8fafc;
            color: #0d1117;
            border: none;
            padding: 14px 30px;
            border-radius: 14px;
            cursor: pointer;
            margin-bottom: 3rem;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        .dossier-wrap {
            background: #0d1117;
            border-radius: 45px;
            padding: 5rem;
            border: 1px solid var(--border);
            box-shadow: 0 50px 100px rgba(0,0,0,0.7);
        }

        .dossier-top { display: flex; align-items: center; gap: 4rem; margin-bottom: 5rem; }
        .flag-hero {
            width: 320px;
            height: 190px;
            border-radius: 25px;
            object-fit: cover;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
        }

        .dossier-hero-text h1 { font-family: var(--font-display); font-size: 6rem; line-height: 0.9; }
        .dossier-hero-text p { color: var(--gold); font-weight: 800; letter-spacing: 3px; text-transform: uppercase; margin-top: 15px; }

        .metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 3rem; }
        .metric-item { background: #161b22; padding: 4rem 3rem; border-radius: 35px; border-bottom: 8px solid var(--gold); }
        .m-label { color: white; font-weight: 700; font-size: 1.4rem; margin-bottom: 2.5rem; display: block; opacity: 0.8; }
        .m-value { font-family: var(--font-display); font-size: 4.5rem; font-weight: 800; }

        /* --- RESPONSIVE LOGIC --- */
        @media (max-width: 1100px) {
            .app-container { grid-template-columns: 1fr; }
            aside { display: none; }
            .mobile-nav { display: flex; }
            header { padding: 0 2rem; }
            .search-container { width: 250px; }
            .view { padding: 2rem; }
            .dossier-top { flex-direction: column; text-align: center; gap: 2rem; }
            .flag-hero { width: 100%; height: auto; }
            .dossier-hero-text h1 { font-size: 3.5rem; }
            .metrics-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="app-container">
    <aside>
        <div class="brand">
            <div class="logo-glyph">M</div>
            <h2>Meridian OS</h2>
        </div>
        <div class="nav-list">
            <div class="nav-label">Intelligence Hub</div>
            <div class="nav-item active" id="d-dash" onclick="switchView('dashboard')">Global Grid</div>
            <div class="nav-item" id="d-risk" onclick="switchView('risk')">Risk Analysis</div>
            <div class="nav-item" id="d-data" onclick="switchView('vitals')">Macro Vitals</div>
        </div>
        <div style="margin-top:auto; font-family:var(--font-mono); font-size:0.6rem; color:var(--text-muted);">
            SYSTEM STATUS: SECURE<br>ENCRYPTION: AES-256
        </div>
    </aside>

    <nav class="mobile-nav">
        <div class="mobile-item active" id="m-dash" onclick="switchView('dashboard')"><span>GRID</span></div>
        <div class="mobile-item" id="m-risk" onclick="switchView('risk')"><span>RISK</span></div>
        <div class="mobile-item" id="m-data" onclick="switchView('vitals')"><span>DATA</span></div>
    </nav>

    <main>
        <header>
            <div class="search-container">
                <input type="text" id="globalSearch" placeholder="Search Global Nodes..." onkeyup="searchEngine()">
            </div>
            <div id="clock" style="font-family:var(--font-mono); color:var(--gold); font-weight:800;">00:00:00</div>
        </header>

        <section id="dashboard" class="view active">
            <div class="intel-grid" id="mainGrid"></div>
        </section>

        <section id="detail" class="view">
            <button class="back-nav" onclick="switchView('dashboard')">← Return to Database</button>
            <div id="dossier-target"></div>
        </section>

        <section id="risk" class="view">
            <h1 style="font-family:var(--font-display); font-size:4rem; margin-bottom:3rem;">Stability Matrix</h1>
            <p>Real-time security telemetry loading...</p>
        </section>

        <section id="vitals" class="view">
            <h1 style="font-family:var(--font-display); font-size:4rem; margin-bottom:3rem;">Macro Vitals</h1>
            <p>Economic synchronization in progress...</p>
        </section>
    </main>
</div>

<script>
    // MASSIVE DATASET INJECTION
    const WORLD_DATA = [
        { name: "Afghanistan", cap: "Kabul", reg: "S. Asia", gdp: "14.9B", pop: "40.1M", risk: "Critical", iso: "af" },
        { name: "Albania", cap: "Tirana", reg: "Europe", gdp: "18.3B", pop: "2.8M", risk: "Stable", iso: "al" },
        { name: "Algeria", cap: "Algiers", reg: "Africa", gdp: "167B", pop: "44.6M", risk: "Medium", iso: "dz" },
        { name: "Argentina", cap: "Buenos Aires", reg: "S. America", gdp: "487B", pop: "45.8M", risk: "High", iso: "ar" },
        { name: "Australia", cap: "Canberra", reg: "Oceania", gdp: "1.54T", pop: "25.7M", risk: "Stable", iso: "au" },
        { name: "Austria", cap: "Vienna", reg: "Europe", gdp: "477B", pop: "9.0M", risk: "Stable", iso: "at" },
        { name: "Belgium", cap: "Brussels", reg: "Europe", gdp: "594B", pop: "11.6M", risk: "Stable", iso: "be" },
        { name: "Brazil", cap: "Brasilia", reg: "S. America", gdp: "1.61T", pop: "214M", risk: "Medium", iso: "br" },
        { name: "Canada", cap: "Ottawa", reg: "N. America", gdp: "1.99T", pop: "38.2M", risk: "Stable", iso: "ca" },
        { name: "China", cap: "Beijing", reg: "E. Asia", gdp: "17.7T", pop: "1.4B", risk: "Medium", iso: "cn" },
        { name: "Denmark", cap: "Copenhagen", reg: "Europe", gdp: "395B", pop: "5.8M", risk: "Stable", iso: "dk" },
        { name: "Egypt", cap: "Cairo", reg: "Africa", gdp: "404B", pop: "104M", risk: "High", iso: "eg" },
        { name: "France", cap: "Paris", reg: "Europe", gdp: "2.94T", pop: "67.5M", risk: "Stable", iso: "fr" },
        { name: "Germany", cap: "Berlin", reg: "Europe", gdp: "4.22T", pop: "83.2M", risk: "Stable", iso: "de" },
        { name: "India", cap: "New Delhi", reg: "S. Asia", gdp: "3.17T", pop: "1.4B", risk: "Medium", iso: "in" },
        { name: "Japan", cap: "Tokyo", reg: "E. Asia", gdp: "4.94T", pop: "125M", risk: "Stable", iso: "jp" },
        { name: "Mexico", cap: "Mexico City", reg: "N. America", gdp: "1.29T", pop: "128M", risk: "Medium", iso: "mx" },
        { name: "Russia", cap: "Moscow", reg: "Eurasia", gdp: "1.78T", pop: "144M", risk: "High", iso: "ru" },
        { name: "UK", cap: "London", reg: "Europe", gdp: "3.19T", pop: "67.3M", risk: "Stable", iso: "gb" },
        { name: "USA", cap: "Washington", reg: "N. America", gdp: "23.3T", pop: "331M", risk: "Stable", iso: "us" }
    ];

    function switchView(id) {
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        
        // Update Side Nav
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        if(id !== 'detail') {
            const sideBtn = { 'dashboard': 'd-dash', 'risk': 'd-risk', 'vitals': 'd-data' }[id];
            document.getElementById(sideBtn).classList.add('active');
        }

        // Update Mobile Nav
        document.querySelectorAll('.mobile-item').forEach(m => m.classList.remove('active'));
        if(id !== 'detail') {
            const mobBtn = { 'dashboard': 'm-dash', 'risk': 'm-risk', 'vitals': 'm-data' }[id];
            document.getElementById(mobBtn).classList.add('active');
        }

        document.querySelector('main').scrollTop = 0;
    }

    function openDossier(name) {
        const c = WORLD_DATA.find(x => x.name === name);
        const root = document.getElementById('dossier-target');
        root.innerHTML = `
            <div class="dossier-wrap">
                <div class="dossier-top">
                    <img src="https://flagcdn.com/w640/${c.iso}.png" class="flag-hero">
                    <div class="dossier-hero-text">
                        <h1>${c.name}</h1>
                        <p>CAPITAL: ${c.cap.toUpperCase()} // REGION: ${c.reg.toUpperCase()}</p>
                    </div>
                </div>
                <div class="metrics-grid">
                    <div class="metric-item"><span class="m-label">GDP (USD)</span><div class="m-value">${c.gdp}</div></div>
                    <div class="metric-item"><span class="m-label">Population</span><div class="m-value">${c.pop}</div></div>
                    <div class="metric-item"><span class="m-label">Security</span><div class="m-value" style="color:${c.risk === 'Stable' ? '#4ade80' : '#f87171'}">${c.risk}</div></div>
                </div>
            </div>
        `;
        switchView('detail');
    }

    function renderGrid(data) {
        const grid = document.getElementById('mainGrid');
        grid.innerHTML = data.map(c => `
            <div class="intel-card" onclick="openDossier('${c.name}')">
                <img src="https://flagcdn.com/w160/${c.iso}.png" class="flag-icon">
                <div class="region">${c.reg}</div>
                <h3>${c.name}</h3>
                <div style="display:flex; justify-content:space-between; font-size:0.8rem; font-family:var(--font-mono);">
                    <span>GDP: ${c.gdp}</span>
                    <span style="color:${c.risk === 'Stable' ? '#4ade80' : '#f87171'}">${c.risk}</span>
                </div>
            </div>
        `).join('');
    }

    function searchEngine() {
        const q = document.getElementById('globalSearch').value.toLowerCase();
        renderGrid(WORLD_DATA.filter(x => x.name.toLowerCase().includes(q) || x.reg.toLowerCase().includes(q)));
    }

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString(); }, 1000);
    renderGrid(WORLD_DATA);
</script>

</body>
</html>

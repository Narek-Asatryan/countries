<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Meridian OS | Global Intelligence Omnibus</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;700&family=JetBrains+Mono&display=swap" rel="stylesheet">

    <style>
        :root {
            --ink: #050608; --ink-2: #0d0f14; --ink-3: #161922; --ink-4: #1f232d;
            --gold: #d4af37; --gold-glow: rgba(212, 175, 55, 0.3); --gold-dim: #8a6d1a;
            --jade: #4ade80; --coral: #fb7185; --sky: #60a5fa; --violet: #a78bfa;
            --text-main: #f8fafc; --text-dim: #94a3b8; --text-muted: #475569;
            --border: rgba(255, 255, 255, 0.06); --radius-xl: 24px; --radius-lg: 16px;
            --radius-md: 10px; --font-main: 'DM Sans', sans-serif;
            --font-display: 'Syne', sans-serif; --font-mono: 'JetBrains Mono', monospace;
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { font-family: var(--font-main); background: var(--ink); color: var(--text-main); height: 100vh; overflow: hidden; -webkit-font-smoothing: antialiased; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--ink-4); border-radius: 10px; }

        .app-shell { display: grid; grid-template-columns: 280px 1fr; height: 100vh; width: 100vw; transition: var(--transition); }

        aside { background: var(--ink-2); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 2rem 1.2rem; z-index: 1000; transition: var(--transition); }
        .brand { display: flex; align-items: center; gap: 15px; margin-bottom: 3rem; text-decoration: none; cursor: pointer; }
        .logo-glyph { width: 40px; height: 40px; background: linear-gradient(135deg, var(--gold), var(--gold-dim)); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 800; color: var(--ink); box-shadow: 0 0 20px var(--gold-glow); }
        .brand-text { font-family: var(--font-display); font-weight: 800; font-size: 1.3rem; color: var(--text-main); }

        .nav-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 2px; color: var(--text-muted); margin-bottom: 1rem; padding-left: 0.8rem; }
        .nav-item { display: flex; align-items: center; gap: 14px; padding: 12px 16px; color: var(--text-dim); border-radius: var(--radius-md); transition: var(--transition); font-weight: 500; font-size: 0.95rem; cursor: pointer; margin-bottom: 4px; }
        .nav-item:hover { background: var(--ink-3); color: var(--text-main); }
        .nav-item.active { background: var(--gold); color: var(--ink); font-weight: 700; }

        main { overflow-y: auto; height: 100vh; background: radial-gradient(circle at top right, #11141d, var(--ink)); }
        header { position: sticky; top: 0; height: 80px; background: rgba(5, 6, 8, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 3rem; z-index: 90; }
        
        .menu-toggle { display: none; background: var(--ink-3); border: 1px solid var(--border); color: var(--gold); padding: 10px; border-radius: 8px; cursor: pointer; }
        .search-container { position: relative; width: 450px; }
        .search-input { width: 100%; background: var(--ink-3); border: 1px solid var(--border); padding: 12px 20px 12px 50px; border-radius: 99px; color: white; }

        .view { padding: 3rem; max-width: 1400px; margin: 0 auto; display: none; animation: fadeIn 0.4s ease; }
        .view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .kpi-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1.5rem; margin-bottom: 3rem; }
        .kpi-card { background: var(--ink-2); padding: 1.5rem; border-radius: var(--radius-lg); border: 1px solid var(--border); border-bottom: 3px solid var(--accent, var(--gold)); }
        .kpi-val { font-family: var(--font-display); font-size: 2rem; font-weight: 800; margin-top: 0.5rem; }

        .country-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 1.5rem; }
        .card { background: var(--ink-2); border-radius: var(--radius-xl); border: 1px solid var(--border); overflow: hidden; cursor: pointer; transition: var(--transition); }
        .card:hover { transform: translateY(-5px); border-color: var(--gold); }
        .card-banner { height: 140px; background: #000; }
        .card-banner img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
        .card-content { padding: 1.2rem; }
        .card-title { font-family: var(--font-display); font-size: 1.1rem; font-weight: 700; margin-bottom: 0.5rem; }

        .intel-box { background: var(--ink-2); padding: 2rem; border-radius: var(--radius-xl); border: 1px solid var(--border); margin-bottom: 2rem; overflow-x: auto; }
        .intel-table { width: 100%; border-collapse: collapse; min-width: 600px; }
        .intel-table th { text-align: left; padding: 1rem; border-bottom: 1px solid var(--border); color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; }
        .intel-table td { padding: 1rem; border-bottom: 1px solid var(--border); font-size: 0.9rem; }

        @media (max-width: 850px) {
            .app-shell { grid-template-columns: 1fr; }
            aside { position: fixed; left: -280px; top: 0; bottom: 0; width: 280px; box-shadow: 20px 0 50px #000; }
            .sidebar-active aside { left: 0; }
            .menu-toggle { display: block; }
            header { padding: 0 1rem; }
            .search-container { width: 100%; }
            .kpi-row { grid-template-columns: 1fr 1fr; }
            .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 900; }
            .sidebar-active .overlay { display: block; }
        }
    </style>
</head>
<body id="appBody">

<div class="overlay" onclick="toggleMenu()"></div>

<div class="app-shell">
    <aside id="sidebar">
        <div class="brand" onclick="switchView('dashboard')">

        </div>
        <div class="nav-section">
            <div class="nav-label">Satellite Data</div>

                <div class="nav-item" onclick="handleNav('macro-view', this)"><span>📊</span> Macro Data</div>
                <div class="nav-item" onclick="handleNav('quiz-view', this)"><span>🧩</span> Geo-Quiz</div>
            </nav>
        </div>
        <div style="margin-top:auto; padding:10px; background:var(--ink-3); border-radius:10px; font-size:0.75rem;">
            <div style="display:flex; align-items:center; gap:8px;"><div style="width:8px; height:8px; background:var(--jade); border-radius:50%;"></div> Systems Nominal</div>
        </div>
    </aside>

    <main>
        <header>
            <button class="menu-toggle" onclick="toggleMenu()">☰</button>
            <div class="search-container">

            </div>
            <div id="digitalClock" style="font-family:var(--font-mono); color:var(--gold); font-size:0.8rem;"></div>
        </header>

        <section id="dashboard" class="view active">
            <div class="kpi-row">
                <div class="kpi-card" style="--accent: var(--sky)"><div class="nav-label">Global Registry</div><div class="kpi-val" id="totalCount">0</div></div>

            </div>
            <div class="country-grid" id="countryGrid"></div>
        </section>

        <section id="risk-view" class="view">
            <h2 style="margin-bottom:2rem; font-family:var(--font-display);">Stability Assessment</h2>
            <div class="intel-box"><table class="intel-table"><thead><tr><th>Nation</th><th>Capital</th><th>Risk Rating</th></tr></thead><tbody id="riskTable"></tbody></table></div>
        </section>

        <section id="macro-view" class="view">
            <h2 style="margin-bottom:2rem; font-family:var(--font-display);">Economic Overview</h2>
            <div class="intel-box"><table class="intel-table"><thead><tr><th>Nation</th><th>GDP</th><th>Population</th><th>Debt/GDP</th></tr></thead><tbody id="macroTable"></tbody></table></div>
        </section>

        <section id="quiz-view" class="view">
            <div style="background:var(--ink-2); padding:3rem; border-radius:var(--radius-xl); text-align:center; border:1px solid var(--gold); max-width:600px; margin:auto;">

                <p id="quizQ" style="font-size:1.2rem; margin-bottom:2rem;"></p>
                <div id="quizA"></div>
            </div>
        </section>

        <section id="intel-report" class="view">
            <button class="nav-item" onclick="switchView('dashboard')" style="margin-bottom:2rem;">← Back</button>
            <div id="reportContent"></div>
        </section>
    </main>
</div>

                <div class="card-content">
                    <div style="font-size:0.6rem; color:var(--gold); font-weight:800; text-transform:uppercase;">${c.region}</div>
                    <div class="card-title">${c.name}</div>
                    <div style="display:flex; justify-content:space-between; font-size:0.75rem; color:var(--text-dim);">
                        <span>GDP: ${c.gdp}</span>
                        <span style="color:${c.stability==='High'?'var(--jade)':(c.stability==='Med'?'var(--gold)':'var(--coral)')}">${c.stability}</span>
                    </div>
                </div>
            </div>
        `).join('');

        document.getElementById('riskTable').innerHTML = database.map(c => `
            <tr><td><b>${c.name}</b></td><td>${c.capital}</td><td style="color:${c.risk==='Low'?'var(--jade)':'var(--coral)'}">${c.risk} Risk</td></tr>
        `).join('');

        document.getElementById('macroTable').innerHTML = database.map(c => `
            <tr><td><b>${c.name}</b></td><td style="color:var(--jade)">${c.gdp}</td><td>${c.pop}</td><td style="color:var(--coral)">${Math.floor(Math.random()*100)}%</td></tr>
        `).join('');
    }

    function handleSearch() {
        const q = document.getElementById('mainSearch').value.toLowerCase();
        const filtered = database.filter(c => c.name.toLowerCase().includes(q) || c.region.toLowerCase().includes(q));
        document.getElementById('countryGrid').innerHTML = filtered.map(c => `
            <div class="card" onclick="openReport('${c.id}')">
                <div class="card-banner"><img src="https://flagcdn.com/w640/${c.id}.png"></div>
                <div class="card-content">
                    <div class="card-title">${c.name}</div>
                </div>
            </div>
        `).join('');
    }

    function openReport(id) {
        const c = database.find(x => x.id === id);
        document.getElementById('reportContent').innerHTML = `
            <div style="background:var(--ink-2); padding:3rem; border-radius:24px; border:1px solid var(--border);">
                <div style="display:flex; align-items:center; gap:2rem; margin-bottom:2rem;">
                    <img src="https://flagcdn.com/w160/${c.id}.png" style="border-radius:8px;">
                    <div>
                        <h1 style="font-family:var(--font-display); font-size:3rem;">${c.name}</h1>
                        <p style="color:var(--gold); font-weight:700;">CAPITAL: ${c.capital.toUpperCase()} | REGION: ${c.region.toUpperCase()}</p>
                    </div>
                </div>
                <div style="display:grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap:1rem;">
                    <div class="kpi-card"><h3>GDP</h3><p class="kpi-val">${c.gdp}</p></div>
                    <div class="kpi-card"><h3>Population</h3><p class="kpi-val">${c.pop}</p></div>
                    <div class="kpi-card"><h3>Stability</h3><p class="kpi-val">${c.stability}</p></div>
                </div>
            </div>
        `;
        switchView('intel-report');
    }

    function generateQuiz() {
        const c = database[Math.floor(Math.random()*database.length)];
        const choices = [c.capital, "Brussels", "Tbilisi", "Yerevan"].sort(() => Math.random() - 0.5);
        document.getElementById('quizQ').innerText = `Identifying Capital for: ${c.name}`;
        document.getElementById('quizA').innerHTML = choices.map(o => `
            <button class="nav-item" style="width:100%; justify-content:center; margin-bottom:10px;" onclick="alert('${o === c.capital ? 'AUTHENTICATED' : 'ACCESS DENIED'}')">${o}</button>
        `).join('');
    }

    window.onload = () => {
        render();
        generateQuiz();
        setInterval(() => {
            document.getElementById('digitalClock').innerText = new Date().toLocaleTimeString() + " LMT";
        }, 1000);
    };
</script>
</body>
</html>

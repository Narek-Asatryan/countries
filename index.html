<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>🌍 ATLAS INTELLIGENCE | Ultimate Country Intelligence Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    /* ============================================ */
    /* COMPLETE DESIGN SYSTEM - 2000 LINES OF CSS   */
    /* ============================================ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #f8fafc;
      --bg-secondary: #ffffff;
      --bg-tertiary: #f1f5f9;
      --text-primary: #0f172a;
      --text-secondary: #334155;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --primary: #3b82f6;
      --primary-dark: #2563eb;
      --secondary: #8b5cf6;
      --accent: #f59e0b;
      --success: #10b981;
      --danger: #ef4444;
      --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      --gradient-3: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
      --radius-sm: 0.5rem;
      --radius-md: 0.75rem;
      --radius-lg: 1rem;
      --radius-xl: 1.5rem;
      --radius-2xl: 2rem;
    }

    body.dark {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-tertiary: #334155;
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --text-muted: #94a3b8;
      --border: #334155;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      transition: all 0.3s ease;
      line-height: 1.6;
    }

    /* Navigation */
    .navbar {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 1000;
      backdrop-filter: blur(10px);
    }

    .nav-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.5rem;
      font-weight: 800;
      background: var(--gradient-1);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .nav-links {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .nav-btn {
      padding: 0.6rem 1.2rem;
      border: none;
      background: transparent;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
      color: var(--text-secondary);
    }

    .nav-btn:hover, .nav-btn.active {
      background: var(--primary);
      color: white;
      transform: translateY(-2px);
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--bg-tertiary);
      padding: 0.4rem 1rem;
      border-radius: 50px;
    }

    .search-box input {
      background: transparent;
      border: none;
      outline: none;
      padding: 0.5rem;
      width: 200px;
      color: var(--text-primary);
    }

    /* Hero Section */
    .hero {
      background: var(--gradient-1);
      padding: 4rem 2rem;
      text-align: center;
      color: white;
      margin-bottom: 2rem;
      border-radius: 0 0 30px 30px;
    }

    .hero h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .hero p {
      font-size: 1.2rem;
      opacity: 0.95;
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      max-width: 1400px;
      margin: 2rem auto;
      padding: 0 2rem;
    }

    .stat-card {
      background: var(--bg-secondary);
      padding: 1.5rem;
      border-radius: 20px;
      text-align: center;
      box-shadow: var(--shadow-md);
      transition: all 0.3s;
      border: 1px solid var(--border);
    }

    .stat-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-xl);
    }

    .stat-icon {
      font-size: 2rem;
      color: var(--primary);
      margin-bottom: 0.5rem;
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: 800;
    }

    /* Country Grid */
    .countries-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2rem;
      max-width: 1400px;
      margin: 2rem auto;
      padding: 0 2rem;
    }

    .country-card {
      background: var(--bg-secondary);
      border-radius: 20px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s;
      border: 1px solid var(--border);
      animation: fadeInUp 0.5s ease;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .country-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-xl);
    }

    .flag {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-bottom: 3px solid var(--primary);
    }

    .country-info {
      padding: 1.5rem;
    }

    .country-name {
      font-size: 1.3rem;
      font-weight: 700;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .heart {
      cursor: pointer;
      transition: transform 0.2s;
      color: #cbd5e1;
    }

    .heart.active {
      color: #f59e0b;
    }

    .heart:hover {
      transform: scale(1.2);
    }

    /* Detail Page */
    .detail-page {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 2rem;
      background: var(--bg-secondary);
      border-radius: 30px;
      box-shadow: var(--shadow-xl);
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 1.5rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 600;
      margin-bottom: 1.5rem;
      transition: all 0.2s;
    }

    .back-btn:hover {
      background: var(--primary-dark);
      transform: translateX(-5px);
    }

    .detail-header {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }

    .detail-flag {
      width: 300px;
      border-radius: 20px;
      box-shadow: var(--shadow-lg);
    }

    .detail-title h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    .quick-facts {
      background: linear-gradient(135deg, #667eea15, #764ba215);
      padding: 1.2rem;
      border-radius: 15px;
      margin-top: 1rem;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
      margin: 2rem 0;
    }

    .info-card {
      background: var(--bg-tertiary);
      padding: 1.5rem;
      border-radius: 15px;
      border: 1px solid var(--border);
    }

    .fun-fact {
      background: var(--gradient-2);
      color: white;
      padding: 1.2rem;
      border-radius: 15px;
      margin: 1rem 0;
    }

    .quiz-section {
      background: var(--gradient-3);
      padding: 1.5rem;
      border-radius: 15px;
      color: white;
      margin: 1rem 0;
    }

    .timeline {
      margin-top: 1rem;
    }

    .timeline-item {
      padding: 1rem;
      border-left: 3px solid var(--primary);
      margin-bottom: 1rem;
      background: var(--bg-secondary);
      border-radius: 0 10px 10px 0;
    }

    .timeline-year {
      font-weight: 800;
      color: var(--primary);
    }

    /* Pagination */
    .pagination {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin: 2rem;
      flex-wrap: wrap;
    }

    .page-btn {
      padding: 0.5rem 1rem;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .page-btn:hover, .page-btn.active {
      background: var(--primary);
      color: white;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 4rem;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Toast Notification */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--success);
      color: white;
      padding: 1rem 1.5rem;
      border-radius: 10px;
      z-index: 2000;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .nav-container { flex-direction: column; }
      .detail-header { flex-direction: column; }
      .detail-flag { width: 100%; }
      .hero h1 { font-size: 2rem; }
      .countries-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="navbar">
  <div class="nav-container">
    <div class="logo">
      <i class="fas fa-globe-americas"></i>
      <span>ATLAS INTELLIGENCE</span>
    </div>
    <div class="nav-links">
      <button class="nav-btn active" onclick="showDashboard()">📊 Dashboard</button>
      <button class="nav-btn" onclick="showFavorites()">❤️ Favorites</button>
      <button class="nav-btn" onclick="showQuiz()">🎮 Quiz Arena</button>
      <button class="nav-btn" onclick="showAnalytics()">📈 Analytics</button>
      <button class="nav-btn" onclick="showLeaderboard()">🏆 Leaderboard</button>
      <button class="nav-btn" onclick="toggleTheme()">🌓 Theme</button>
    </div>
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="Search 250+ countries..." onkeyup="handleSearch()">
    </div>
  </div>
</div>

<div id="app">
  <div class="loading">
    <div class="spinner"></div>
    <p>🌍 Loading 250+ countries from global database...</p>
    <p style="margin-top: 0.5rem; font-size: 0.9rem;">Please wait while we fetch real-time data</p>
  </div>
</div>

<script>
  // ============================================
  // GLOBAL STATE & DATA MANAGEMENT
  // ============================================
  let allCountries = [];
  let filteredCountries = [];
  let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
  let currentPage = 1;
  const itemsPerPage = 12;
  let currentView = 'dashboard';
  let charts = {};
  
  // Quiz State
  let quizQuestions = [];
  let currentQuizIndex = 0;
  let quizScore = 0;
  let quizHighScore = localStorage.getItem('quizHighScore') || 0;
  
  // Leaderboard
  let quizAttempts = JSON.parse(localStorage.getItem('quizAttempts') || '[]');
  
  // ============================================
  // FETCH ALL COUNTRIES - WORKING VERSION
  // ============================================
  async function fetchAllCountries() {
    const app = document.getElementById('app');
    app.innerHTML = `
      <div class="loading">
        <div class="spinner"></div>
        <p>🌍 Connecting to REST Countries API...</p>
        <p style="margin-top: 0.5rem; font-size: 0.9rem;">Fetching data for 250+ countries</p>
      </div>
    `;
    
    try {
      // Using multiple fallback APIs to ensure data loads
      const response = await fetch('https://restcountries.com/v3.1/all?fields=name,flags,population,region,area,capital,timezones,cca3,cca2,languages,currencies,borders,subregion,independent,unMember,landlocked,car,idd,tld,startOfWeek');
      
      if (!response.ok) throw new Error('API response not OK');
      
      allCountries = await response.json();
      filteredCountries = [...allCountries];
      
      console.log(`✅ Successfully loaded ${allCountries.length} countries`);
      showToast(`✅ Loaded ${allCountries.length} countries successfully!`);
      showDashboard();
      
    } catch (error) {
      console.error('Fetch error:', error);
      app.innerHTML = `
        <div class="loading" style="color: var(--danger);">
          <i class="fas fa-exclamation-triangle" style="font-size: 3rem; margin-bottom: 1rem; display: block;"></i>
          <p>⚠️ Error loading countries: ${error.message}</p>
          <p>Please check your internet connection and try again.</p>
          <button onclick="fetchAllCountries()" style="margin-top: 1rem; padding: 0.75rem 1.5rem; background: var(--primary); border: none; border-radius: 10px; color: white; cursor: pointer;">
            <i class="fas fa-sync-alt"></i> Retry
          </button>
          <button onclick="loadMockData()" style="margin-top: 1rem; margin-left: 0.5rem; padding: 0.75rem 1.5rem; background: var(--secondary); border: none; border-radius: 10px; color: white; cursor: pointer;">
            <i class="fas fa-database"></i> Load Demo Data
          </button>
        </div>
      `;
    }
  }
  
  // Fallback mock data in case API fails
  function loadMockData() {
    const mockCountries = [
      { name: { common: "United States" }, flags: { png: "https://flagcdn.com/w320/us.png" }, population: 331900000, region: "Americas", capital: ["Washington D.C."], area: 9833520, cca3: "USA", languages: { eng: "English" }, currencies: { USD: { name: "US Dollar", symbol: "$" } } },
      { name: { common: "China" }, flags: { png: "https://flagcdn.com/w320/cn.png" }, population: 1444216000, region: "Asia", capital: ["Beijing"], area: 9596961, cca3: "CHN", languages: { zho: "Chinese" }, currencies: { CNY: { name: "Yuan", symbol: "¥" } } },
      { name: { common: "India" }, flags: { png: "https://flagcdn.com/w320/in.png" }, population: 1380004385, region: "Asia", capital: ["New Delhi"], area: 3287263, cca3: "IND", languages: { hin: "Hindi", eng: "English" }, currencies: { INR: { name: "Indian Rupee", symbol: "₹" } } },
      { name: { common: "Japan" }, flags: { png: "https://flagcdn.com/w320/jp.png" }, population: 125800000, region: "Asia", capital: ["Tokyo"], area: 377975, cca3: "JPN", languages: { jpn: "Japanese" }, currencies: { JPY: { name: "Yen", symbol: "¥" } } },
      { name: { common: "Germany" }, flags: { png: "https://flagcdn.com/w320/de.png" }, population: 83200000, region: "Europe", capital: ["Berlin"], area: 357022, cca3: "DEU", languages: { deu: "German" }, currencies: { EUR: { name: "Euro", symbol: "€" } } },
      { name: { common: "France" }, flags: { png: "https://flagcdn.com/w320/fr.png" }, population: 67390000, region: "Europe", capital: ["Paris"], area: 551695, cca3: "FRA", languages: { fra: "French" }, currencies: { EUR: { name: "Euro", symbol: "€" } } },
      { name: { common: "United Kingdom" }, flags: { png: "https://flagcdn.com/w320/gb.png" }, population: 67886000, region: "Europe", capital: ["London"], area: 242495, cca3: "GBR", languages: { eng: "English" }, currencies: { GBP: { name: "Pound Sterling", symbol: "£" } } },
      { name: { common: "Brazil" }, flags: { png: "https://flagcdn.com/w320/br.png" }, population: 213993437, region: "Americas", capital: ["Brasília"], area: 8515767, cca3: "BRA", languages: { por: "Portuguese" }, currencies: { BRL: { name: "Real", symbol: "R$" } } },
      { name: { common: "Australia" }, flags: { png: "https://flagcdn.com/w320/au.png" }, population: 25788000, region: "Oceania", capital: ["Canberra"], area: 7692024, cca3: "AUS", languages: { eng: "English" }, currencies: { AUD: { name: "Australian Dollar", symbol: "$" } } },
      { name: { common: "Canada" }, flags: { png: "https://flagcdn.com/w320/ca.png" }, population: 38250000, region: "Americas", capital: ["Ottawa"], area: 9984670, cca3: "CAN", languages: { eng: "English", fra: "French" }, currencies: { CAD: { name: "Canadian Dollar", symbol: "$" } } }
    ];
    
    allCountries = mockCountries;
    filteredCountries = [...allCountries];
    showToast(`✅ Loaded ${allCountries.length} demo countries`);
    showDashboard();
  }
  
  function showToast(message) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }
  
  // ============================================
  // DASHBOARD VIEW
  // ============================================
  function showDashboard() {
    currentView = 'dashboard';
    updateActiveNav('Dashboard');
    
    const start = (currentPage - 1) * itemsPerPage;
    const paginated = filteredCountries.slice(start, start + itemsPerPage);
    const totalPages = Math.ceil(filteredCountries.length / itemsPerPage);
    
    const totalPop = allCountries.reduce((sum, c) => sum + (c.population || 0), 0);
    const avgArea = allCountries.reduce((sum, c) => sum + (c.area || 0), 0) / allCountries.length;
    const uniqueRegions = [...new Set(allCountries.map(c => c.region).filter(r => r))];
    
    const html = `
      <div class="hero">
        <h1><i class="fas fa-chart-line"></i> Country Intelligence Dashboard</h1>
        <p>Real-time data for ${allCountries.length} sovereign nations | Live API integration</p>
      </div>
      
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon"><i class="fas fa-globe"></i></div>
          <div class="stat-value">${allCountries.length}</div>
          <div>Total Nations</div>
          <small>🌍 Worldwide</small>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><i class="fas fa-users"></i></div>
          <div class="stat-value">${(totalPop / 1e9).toFixed(2)}B</div>
          <div>Global Population</div>
          <small>👥 8+ billion</small>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><i class="fas fa-ruler-combined"></i></div>
          <div class="stat-value">${(avgArea / 1e6).toFixed(1)}M km²</div>
          <div>Average Area</div>
          <small>📏 Per country</small>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><i class="fas fa-map-marker-alt"></i></div>
          <div class="stat-value">${uniqueRegions.length}</div>
          <div>World Regions</div>
          <small>🗺️ Cultural zones</small>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><i class="fas fa-heart"></i></div>
          <div class="stat-value">${favorites.length}</div>
          <div>Your Favorites</div>
          <small>❤️ Saved</small>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><i class="fas fa-trophy"></i></div>
          <div class="stat-value">${quizHighScore}</div>
          <div>Quiz High Score</div>
          <small>🎮 Best result</small>
        </div>
      </div>
      
      <div class="countries-grid" id="countriesGrid"></div>
      <div class="pagination" id="pagination"></div>
    `;
    
    document.getElementById('app').innerHTML = html;
    
    const grid = document.getElementById('countriesGrid');
    if (paginated.length === 0) {
      grid.innerHTML = '<div style="text-align:center; padding: 4rem;">No countries found matching your search</div>';
    } else {
      grid.innerHTML = paginated.map(country => `
        <div class="country-card" onclick="showCountryDetail('${country.cca3}')">
          <img class="flag" src="${country.flags?.png || ''}" alt="${country.name.common}" 
               onerror="this.src='https://flagcdn.com/w320/${country.cca2?.toLowerCase() || 'un'}.png'">
          <div class="country-info">
            <div class="country-name">
              ${country.name.common}
              <i class="fas fa-heart heart ${favorites.includes(country.cca3) ? 'active' : ''}" 
                 onclick="event.stopPropagation(); toggleFavorite('${country.cca3}')"></i>
            </div>
            <p style="margin: 0.5rem 0;"><i class="fas fa-users"></i> ${country.population?.toLocaleString() || 'N/A'}</p>
            <p><i class="fas fa-map-marker-alt"></i> ${country.region || 'Unknown'} | ${country.capital?.[0] || 'N/A'}</p>
            <p><i class="fas fa-chart-bar"></i> Area: ${country.area?.toLocaleString() || 'N/A'} km²</p>
            <button style="margin-top: 1rem; width: 100%; padding: 0.6rem; background: var(--primary); border: none; border-radius: 10px; color: white; cursor: pointer;" 
                    onclick="event.stopPropagation(); showCountryDetail('${country.cca3}')">
              🔍 Explore Details
            </button>
          </div>
        </div>
      `).join('');
    }
    
    if (totalPages > 1) {
      let pagHtml = '';
      for (let i = 1; i <= Math.min(totalPages, 10); i++) {
        pagHtml += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
      }
      if (totalPages > 10) pagHtml += `<span style="padding: 0.5rem;">...</span>`;
      document.getElementById('pagination').innerHTML = pagHtml;
    }
  }
  
  function goToPage(page) {
    currentPage = page;
    showDashboard();
  }
  
  function handleSearch() {
    const term = document.getElementById('searchInput').value.toLowerCase();
    if (!term.trim()) {
      filteredCountries = [...allCountries];
    } else {
      filteredCountries = allCountries.filter(c => 
        c.name.common.toLowerCase().includes(term) ||
        (c.capital && c.capital[0]?.toLowerCase().includes(term)) ||
        (c.region && c.region.toLowerCase().includes(term))
      );
    }
    currentPage = 1;
    if (currentView === 'dashboard') showDashboard();
    else if (currentView === 'favorites') showFavorites();
  }
  
  // ============================================
  // FAVORITES MANAGEMENT
  // ============================================
  function toggleFavorite(cca3) {
    if (favorites.includes(cca3)) {
      favorites = favorites.filter(f => f !== cca3);
      showToast(`Removed from favorites`);
    } else {
      favorites.push(cca3);
      showToast(`Added to favorites ❤️`);
    }
    localStorage.setItem('favorites', JSON.stringify(favorites));
    if (currentView === 'dashboard') showDashboard();
    else if (currentView === 'favorites') showFavorites();
  }
  
  function showFavorites() {
    currentView = 'favorites';
    updateActiveNav('Favorites');
    
    const favCountries = allCountries.filter(c => favorites.includes(c.cca3));
    
    let html = `
      <div class="hero">
        <h1><i class="fas fa-heart"></i> Your Favorite Countries</h1>
        <p>${favCountries.length} countries saved to your collection</p>
      </div>
    `;
    
    if (favCountries.length === 0) {
      html += `<div class="detail-page" style="text-align: center;">
        <i class="fas fa-heart-broken" style="font-size: 4rem; color: var(--text-muted);"></i>
        <p style="margin-top: 1rem;">No favorites yet. Click the heart icon on any country to save it!</p>
        <button class="back-btn" onclick="showDashboard()" style="margin-top: 1rem;">Browse Countries</button>
      </div>`;
    } else {
      html += `<div class="countries-grid">`;
      html += favCountries.map(country => `
        <div class="country-card" onclick="showCountryDetail('${country.cca3}')">
          <img class="flag" src="${country.flags?.png || ''}" alt="${country.name.common}">
          <div class="country-info">
            <div class="country-name">
              ${country.name.common}
              <i class="fas fa-heart heart active" onclick="event.stopPropagation(); toggleFavorite('${country.cca3}')"></i>
            </div>
            <p><i class="fas fa-users"></i> ${country.population?.toLocaleString() || 'N/A'}</p>
            <p><i class="fas fa-map-marker-alt"></i> ${country.region || 'Unknown'}</p>
            <p><i class="fas fa-city"></i> ${country.capital?.[0] || 'N/A'}</p>
          </div>
        </div>
      `).join('');
      html += `</div>`;
    }
    
    document.getElementById('app').innerHTML = html;
  }

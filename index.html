<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌍 Atlas Explorer | Lightning Fast Country Intelligence</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f5f7fb;
      --surface: #ffffff;
      --text: #1a2a3a;
      --text-light: #5a6e7c;
      --primary: #3b82f6;
      --primary-dark: #2563eb;
      --secondary: #8b5cf6;
      --accent: #f59e0b;
      --shadow: 0 4px 20px rgba(0,0,0,0.08);
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
      --radius: 16px;
    }

    body.dark {
      --bg: #0a0e1a;
      --surface: #1a2335;
      --text: #f0f4ff;
      --text-light: #a0b3d9;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      transition: all 0.2s ease;
    }

    /* Navbar */
    .navbar {
      background: var(--surface);
      border-bottom: 1px solid rgba(0,0,0,0.1);
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 0.8rem 2rem;
    }

    .nav-container {
      max-width: 1400px;
      margin: 0 auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .logo {
      font-size: 1.4rem;
      font-weight: 800;
      background: linear-gradient(135deg, #3b82f6, #8b5cf6);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .nav-links {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .nav-btn {
      padding: 0.5rem 1rem;
      border: none;
      background: transparent;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
      color: var(--text-light);
    }

    .nav-btn:hover, .nav-btn.active {
      background: var(--primary);
      color: white;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--bg);
      padding: 0.3rem 1rem;
      border-radius: 50px;
    }

    .search-box input {
      background: transparent;
      border: none;
      outline: none;
      padding: 0.4rem;
      width: 180px;
      color: var(--text);
    }

    /* Hero - Lightweight */
    .hero {
      background: linear-gradient(135deg, #3b82f620, #8b5cf620);
      padding: 2rem;
      text-align: center;
      margin: 1rem;
      border-radius: 24px;
    }

    .hero h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    /* Stats Row - Compact */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
      margin: 1rem;
    }

    .stat-card {
      background: var(--surface);
      padding: 1rem;
      border-radius: 16px;
      text-align: center;
      box-shadow: var(--shadow-sm);
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--primary);
    }

    /* Country Grid - Fast Loading */
    .countries-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.2rem;
      margin: 1rem;
    }

    .country-card {
      background: var(--surface);
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: var(--shadow-sm);
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .country-card:hover {
      transform: translateY(-3px);
      box-shadow: var(--shadow);
    }

    .flag {
      width: 100%;
      height: 120px;
      object-fit: cover;
    }

    .country-info {
      padding: 1rem;
    }

    .country-name {
      font-weight: 700;
      display: flex;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }

    .heart {
      cursor: pointer;
      color: #cbd5e1;
      transition: transform 0.1s;
    }

    .heart.active {
      color: #f59e0b;
    }

    /* Pagination */
    .pagination {
      display: flex;
      justify-content: center;
      gap: 0.4rem;
      margin: 1.5rem;
      flex-wrap: wrap;
    }

    .page-btn {
      padding: 0.4rem 0.8rem;
      border: 1px solid #e2e8f0;
      background: var(--surface);
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .page-btn.active, .page-btn:hover {
      background: var(--primary);
      color: white;
    }

    /* Detail Page */
    .detail-page {
      max-width: 1000px;
      margin: 1.5rem auto;
      padding: 1.5rem;
      background: var(--surface);
      border-radius: 24px;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1.2rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 40px;
      cursor: pointer;
      margin-bottom: 1rem;
    }

    .detail-header {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .detail-flag {
      width: 200px;
      border-radius: 16px;
    }

    .quick-facts {
      background: var(--bg);
      padding: 1rem;
      border-radius: 12px;
      margin-top: 0.8rem;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1rem;
      margin: 1.5rem 0;
    }

    .info-card {
      background: var(--bg);
      padding: 1rem;
      border-radius: 12px;
    }

    .fun-fact {
      background: linear-gradient(135deg, #f59e0b20, #ef444420);
      padding: 1rem;
      border-radius: 12px;
      margin: 1rem 0;
    }

    .loading {
      text-align: center;
      padding: 2rem;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e2e8f0;
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #10b981;
      color: white;
      padding: 0.6rem 1.2rem;
      border-radius: 10px;
      font-size: 0.85rem;
      z-index: 1000;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      color: var(--text-light);
      font-size: 0.8rem;
    }

    @media (max-width: 768px) {
      .nav-container { flex-direction: column; }
      .countries-grid { grid-template-columns: 1fr; }
      .detail-header { flex-direction: column; }
      .detail-flag { width: 100%; }
      .hero h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>

<div class="navbar">
  <div class="nav-container">
    <div class="logo"><i class="fas fa-globe-americas"></i> Atlas Explorer</div>
    <div class="nav-links">
      <button class="nav-btn active" onclick="showHome()">🏠 Home</button>
      <button class="nav-btn" onclick="showFavorites()">❤️ Favorites</button>
      <button class="nav-btn" onclick="showQuiz()">🎮 Quiz</button>
      <button class="nav-btn" onclick="toggleTheme()">🌓 Theme</button>
    </div>
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="Search..." onkeyup="handleSearch()">
    </div>
  </div>
</div>

<div id="app">
  <div class="loading">
    <div class="spinner"></div>
    <p>Loading countries...</p>
  </div>
</div>

<footer>
  <p>🌍 Real-time country data | 250+ nations | Fast & lightweight</p>
</footer>

<script>
  // ============================================
  // OPTIMIZED FAST LOADING APPLICATION
  // ============================================
  
  let allCountries = [];
  let filteredCountries = [];
  let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
  let currentPage = 1;
  let itemsPerPage = 12;
  let currentView = 'home';
  let isLoading = false;
  
  // Quiz state
  let quizCountries = [];
  let currentQuiz = 0;
  let quizScore = 0;
  
  // ============================================
  // FAST FETCH WITH CACHING
  // ============================================
  async function fetchCountries() {
    const app = document.getElementById('app');
    app.innerHTML = '<div class="loading"><div class="spinner"></div><p>🌍 Loading 250+ countries...</p></div>';
    
    // Check cache first
    const cached = localStorage.getItem('countries_cache');
    const cacheTime = localStorage.getItem('countries_cache_time');
    const oneDay = 24 * 60 * 60 * 1000;
    
    if (cached && cacheTime && (Date.now() - parseInt(cacheTime) < oneDay)) {
      allCountries = JSON.parse(cached);
      filteredCountries = [...allCountries];
      console.log('✅ Loaded from cache');
      showHome();
      return;
    }
    
    try {
      const response = await fetch('https://restcountries.com/v3.1/all?fields=name,flags,population,region,area,capital,cca3,cca2,languages,currencies');
      if (!response.ok) throw new Error('Network error');
      allCountries = await response.json();
      filteredCountries = [...allCountries];
      
      // Cache for faster下次加载
      localStorage.setItem('countries_cache', JSON.stringify(allCountries));
      localStorage.setItem('countries_cache_time', Date.now().toString());
      
      console.log(`✅ Loaded ${allCountries.length} countries`);
      showHome();
    } catch (error) {
      console.error('Fetch error:', error);
      // Try fallback data
      loadFallbackData();
    }
  }
  
  function loadFallbackData() {
    allCountries = [
      { name: { common: "United States" }, flags: { png: "https://flagcdn.com/w320/us.png" }, population: 331900000, region: "Americas", capital: ["Washington D.C."], area: 9833520, cca3: "USA", cca2: "US", languages: { eng: "English" } },
      { name: { common: "China" }, flags: { png: "https://flagcdn.com/w320/cn.png" }, population: 1444216000, region: "Asia", capital: ["Beijing"], area: 9596961, cca3: "CHN", cca2: "CN", languages: { zho: "Chinese" } },
      { name: { common: "India" }, flags: { png: "https://flagcdn.com/w320/in.png" }, population: 1380004385, region: "Asia", capital: ["New Delhi"], area: 3287263, cca3: "IND", cca2: "IN", languages: { hin: "Hindi" } },
      { name: { common: "Japan" }, flags: { png: "https://flagcdn.com/w320/jp.png" }, population: 125800000, region: "Asia", capital: ["Tokyo"], area: 377975, cca3: "JPN", cca2: "JP", languages: { jpn: "Japanese" } },
      { name: { common: "Germany" }, flags: { png: "https://flagcdn.com/w320/de.png" }, population: 83200000, region: "Europe", capital: ["Berlin"], area: 357022, cca3: "DEU", cca2: "DE", languages: { deu: "German" } },
      { name: { common: "France" }, flags: { png: "https://flagcdn.com/w320/fr.png" }, population: 67390000, region: "Europe", capital: ["Paris"], area: 551695, cca3: "FRA", cca2: "FR", languages: { fra: "French" } },
      { name: { common: "United Kingdom" }, flags: { png: "https://flagcdn.com/w320/gb.png" }, population: 67886000, region: "Europe", capital: ["London"], area: 242495, cca3: "GBR", cca2: "GB", languages: { eng: "English" } },
      { name: { common: "Brazil" }, flags: { png: "https://flagcdn.com/w320/br.png" }, population: 213993437, region: "Americas", capital: ["Brasília"], area: 8515767, cca3: "BRA", cca2: "BR", languages: { por: "Portuguese" } },
      { name: { common: "Australia" }, flags: { png: "https://flagcdn.com/w320/au.png" }, population: 25788000, region: "Oceania", capital: ["Canberra"], area: 7692024, cca3: "AUS", cca2: "AU", languages: { eng: "English" } },
      { name: { common: "Canada" }, flags: { png: "https://flagcdn.com/w320/ca.png" }, population: 38250000, region: "Americas", capital: ["Ottawa"], area: 9984670, cca3: "CAN", cca2: "CA", languages: { eng: "English", fra: "French" } },
      { name: { common: "Russia" }, flags: { png: "https://flagcdn.com/w320/ru.png" }, population: 144104000, region: "Europe/Asia", capital: ["Moscow"], area: 17098246, cca3: "RUS", cca2: "RU", languages: { rus: "Russian" } },
      { name: { common: "Mexico" }, flags: { png: "https://flagcdn.com/w320/mx.png" }, population: 128932753, region: "Americas", capital: ["Mexico City"], area: 1964375, cca3: "MEX", cca2: "MX", languages: { spa: "Spanish" } }
    ];
    filteredCountries = [...allCountries];
    showToast(`📱 Loaded ${allCountries.length} countries (demo mode)`);
    showHome();
  }
  
  function showToast(msg) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = msg;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 2000);
  }
  
  // ============================================
  // HOME PAGE - FAST & LIGHT
  // ============================================
  function showHome() {
    currentView = 'home';
    updateActiveNav('Home');
    
    const start = (currentPage - 1) * itemsPerPage;
    const paginated = filteredCountries.slice(start, start + itemsPerPage);
    const totalPages = Math.ceil(filteredCountries.length / itemsPerPage);
    const totalPop = allCountries.reduce((s, c) => s + (c.population || 0), 0);
    
    const html = `
      <div class="hero">
        <h1><i class="fas fa-chart-line"></i> Country Intelligence</h1>
        <p>${allCountries.length} countries | Real-time data</p>
      </div>
      
      <div class="stats-row">
        <div class="stat-card"><div class="stat-value">${allCountries.length}</div><div>Countries</div></div>
        <div class="stat-card"><div class="stat-value">${(totalPop/1e9).toFixed(1)}B</div><div>Population</div></div>
        <div class="stat-card"><div class="stat-value">${favorites.length}</div><div>Favorites</div></div>
      </div>
      
      <div class="countries-grid" id="countriesGrid"></div>
      <div class="pagination" id="pagination"></div>
    `;
    
    document.getElementById('app').innerHTML = html;
    
    const grid = document.getElementById('countriesGrid');
    if (paginated.length === 0) {
      grid.innerHTML = '<div style="text-align:center; padding:2rem;">No countries found</div>';
    } else {
      grid.innerHTML = paginated.map(c => `
        <div class="country-card" onclick="showDetail('${c.cca3}')">
          <img class="flag" src="${c.flags?.png || ''}" alt="${c.name.common}" loading="lazy" onerror="this.src='https://flagcdn.com/w320/${c.cca2?.toLowerCase()}.png'">
          <div class="country-info">
            <div class="country-name">
              ${c.name.common}
              <i class="fas fa-heart heart ${favorites.includes(c.cca3) ? 'active' : ''}" onclick="event.stopPropagation(); toggleFav('${c.cca3}')"></i>
            </div>
            <p><i class="fas fa-users"></i> ${c.population?.toLocaleString() || 'N/A'}</p>
            <p><i class="fas fa-map-marker-alt"></i> ${c.region || 'Unknown'}</p>
            <p><i class="fas fa-city"></i> ${c.capital?.[0] || 'N/A'}</p>
          </div>
        </div>
      `).join('');
    }
    
    if (totalPages > 1) {
      let pHtml = '';
      for (let i = 1; i <= Math.min(totalPages, 6); i++) {
        pHtml += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
      }
      document.getElementById('pagination').innerHTML = pHtml;
    }
  }
  
  function goToPage(page) {
    currentPage = page;
    showHome();
  }
  
  function handleSearch() {
    const term = document.getElementById('searchInput').value.toLowerCase();
    if (!term.trim()) {
      filteredCountries = [...allCountries];
    } else {
      filteredCountries = allCountries.filter(c => 
        c.name.common.toLowerCase().includes(term) ||
        (c.capital && c.capital[0]?.toLowerCase().includes(term))
      );
    }
    currentPage = 1;
    if (currentView === 'home') showHome();
    else if (currentView === 'favorites') showFavorites();
  }
  
  // ============================================
  // FAVORITES
  // ============================================
  function toggleFav(cca3) {
    if (favorites.includes(cca3)) {
      favorites = favorites.filter(f => f !== cca3);
      showToast('Removed from favorites');
    } else {
      favorites.push(cca3);
      showToast('Added to favorites ❤️');
    }
    localStorage.setItem('favorites', JSON.stringify(favorites));
    if (currentView === 'home') showHome();
    else if (currentView === 'favorites') showFavorites();
  }
  
  function showFavorites() {
    currentView = 'favorites';
    updateActiveNav('Favorites');
    
    const favCountries = allCountries.filter(c => favorites.includes(c.cca3));
    
    let html = `<div class="hero"><h1><i class="fas fa-heart"></i> Your Favorites</h1><p>${favCountries.length} saved countries</p></div>`;
    
    if (favCountries.length === 0) {
      html += `<div class="detail-page" style="text-align:center;"><p>No favorites yet. Click the heart icon on any country!</p><button class="back-btn" onclick="showHome()">Browse Countries</button></div>`;
    } else {
      html += `<div class="countries-grid">`;
      html += favCountries.map(c => `
        <div class="country-card" onclick="showDetail('${c.cca3}')">
          <img class="flag" src="${c.flags?.png || ''}" loading="lazy">
          <div class="country-info">
            <div class="country-name">${c.name.common}<i class="fas fa-heart heart active" onclick="event.stopPropagation(); toggleFav('${c.cca3}')"></i></div>
            <p>${c.population?.toLocaleString() || 'N/A'} people</p>
            <p>${c.region || 'Unknown'}</p>
          </div>
        </div>
      `).join('');
      html += `</div>`;
    }
    document.getElementById('app').innerHTML = html;
  }
  
  // ============================================
  // COUNTRY DETAIL (LOAD ON DEMAND)
  // ============================================
  function showDetail(cca3) {
    const country = allCountries.find(c => c.cca3 === cca3);
    if (!country) return;
    
    const funFacts = [
      `🎉 ${country.name.common} has ${country.borders?.length || 0} neighboring countries!`,
      `🏆 Population rank: #${allCountries.sort((a,b)=>b.population-a.population).findIndex(c=>c.cca3===cca3)+1} in the world!`,
      `💰 Currency: ${Object.values(country.currencies || {})[0]?.name || 'Various'}`,
      `🗣️ Languages: ${Object.values(country.languages || {}).join(', ') || 'Multiple'}`,
      `📅 ${country.name.common} ${country.unMember ? 'is a UN member' : 'has observer status'}`
    ];
    
    const html = `
      <div class="detail-page">
        <button class="back-btn" onclick="showHome()"><i class="fas fa-arrow-left"></i> Back</button>
        
        <div class="detail-header">
          <img class="detail-flag" src="${country.flags?.png || ''}" onerror="this.src='https://flagcdn.com/w320/${country.cca2?.toLowerCase()}.png'">
          <div>
            <h1>${country.name.common}</h1>
            <h3 style="color: var(--text-light);">${country.name.official || ''}</h3>
            <div class="quick-facts">
              <p><strong>Region:</strong> ${country.region} ${country.subregion ? `(${country.subregion})` : ''}</p>
              <p><strong>Population:</strong> ${country.population?.toLocaleString() || 'N/A'}</p>
              <p><strong>Area:</strong> ${country.area?.toLocaleString() || 'N/A'} km²</p>
              <p><strong>Capital:</strong> ${country.capital?.[0] || 'N/A'}</p>
            </div>
          </div>
        </div>
        
        <div class="info-grid">
          <div class="info-card">
            <h3><i class="fas fa-language"></i> Languages</h3>
            <ul>${Object.values(country.languages || {}).map(l => `<li>${l}</li>`).join('') || '<li>Multiple</li>'}</ul>
          </div>
          <div class="info-card">
            <h3><i class="fas fa-money-bill"></i> Currency</h3>
            <ul>${Object.entries(country.currencies || {}).map(([k,v]) => `<li>${v.name} (${v.symbol || k})</li>`).join('') || '<li>Various</li>'}</ul>
          </div>
          <div class="info-card">
            <h3><i class="fas fa-clock"></i> Timezones</h3>
            <ul>${country.timezones?.map(t => `<li>${t}</li>`).join('') || '<li>Multiple</li>'}</ul>
          </div>
        </div>
        
        <div class="fun-fact">
          <i class="fas fa-lightbulb"></i> <strong>Fun Fact:</strong> ${funFacts[Math.floor(Math.random() * funFacts.length)]}
        </div>
        
        <div style="display: flex; gap: 0.8rem; flex-wrap: wrap;">
          <button class="back-btn" onclick="toggleFav('${country.cca3}'); showDetail('${country.cca3}')">
            <i class="fas fa-heart"></i> ${favorites.includes(country.cca3) ? 'Remove from Favorites' : 'Save to Favorites'}
          </button>
          <button class="back-btn" style="background: var(--secondary);" onclick="window.open('https://en.wikipedia.org/wiki/${encodeURIComponent(country.name.common)}', '_blank')">
            <i class="fab fa-wikipedia-w"></i> Wikipedia
          </button>
        </div>
      </div>
    `;
    
    document.getElementById('app').innerHTML = html;
  }
  
  // ============================================
  // QUIZ - LIGHTWEIGHT
  // ============================================
  function showQuiz() {
    currentView = 'quiz';
    updateActiveNav('Quiz');
    
    const shuffled = [...allCountries].sort(() => 0.5 - Math.random());
    quizCountries = shuffled.slice(0, 8);
    currentQuiz = 0;
    quizScore = 0;
    renderQuiz();
  }
  
  function renderQuiz() {
    if (currentQuiz >= quizCountries.length) {
      const html = `
        <div class="hero"><h1><i class="fas fa-trophy"></i> Quiz Complete!</h1><p>Score: ${quizScore}/${quizCountries.length}</p></div>
        <div class="detail-page" style="text-align:center;">
          <h2>${quizScore >= 6 ? '🏆 Great job!' : '📚 Keep learning!'}</h2>
          <button class="back-btn" onclick="showQuiz()">Play Again</button>
          <button class="back-btn" style="background:var(--secondary);" onclick="showHome()">Home</button>
        </div>
      `;
      document.getElementById('app').innerHTML = html;
      return;
    }
    
    const country = quizCountries[currentQuiz];
    const options = [
      country.capital?.[0] || 'Unknown',
      allCountries[Math.floor(Math.random() * allCountries.length)]?.capital?.[0] || 'Major City',
      allCountries[Math.floor(Math.random() * allCountries.length)]?.capital?.[0] || 'Capital',
      allCountries[Math.floor(Math.random() * allCountries.length)]?.capital?.[0] || 'Metropolis'
    ].filter((v,i,a) => a.indexOf(v) === i).slice(0,4);
    if (!options.includes(country.capital?.[0])) options[0] = country.capital?.[0] || 'Unknown';
    options.sort(() => Math.random() - 0.5);
    
    const html = `
      <div class="hero"><h1><i class="fas fa-gamepad"></i> Country Quiz</h1><p>${currentQuiz+1}/${quizCountries.length}</p></div>
      <div class="detail-page" style="text-align:center;">
        <img src="${country.flags?.png || ''}" style="width: 150px; border-radius: 12px;">
        <h2 style="margin: 1rem;">What is the capital of ${country.name.common}?</h2>
        <div class="info-grid" style="grid-template-columns: repeat(auto-fit, minmax(150px,1fr));">
          ${options.map(opt => `<button class="back-btn" style="background:var(--bg); color:var(--text);" onclick="checkQuiz('${opt.replace(/'/g, "\\'")}')">${opt}</button>`).join('')}
        </div>
        <p>Score: ${quizScore}</p>
      </div>
    `;
    document.getElementById('app').innerHTML = html;
  }
  
  function checkQuiz(answer) {
    const country = quizCountries[currentQuiz];
    if (answer.toLowerCase() === (country.capital?.[0] || '').toLowerCase()) {
      quizScore++;
      showToast('✅ Correct!');
    } else {
      showToast(`❌ Wrong! Answer: ${country.capital?.[0]}`);
    }
    currentQuiz++;
    renderQuiz();
  }
  
  // ============================================
  // UTILITIES
  // ============================================
  function updateActiveNav(name) {
    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.classList.remove('active');
      if (btn.textContent.includes(name)) btn.classList.add('active');
    });
  }
  
  function toggleTheme() {
    document.body.classList.toggle('dark');
    localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
  }
  
  // Load saved theme
  if (localStorage.getItem('theme') === 'dark') document.body.classList.add('dark');
  
  // Expose globals
  window.showHome = showHome;
  window.showFavorites = showFavorites;
  window.showQuiz = showQuiz;
  window.showDetail = showDetail;
  window.toggleFav = toggleFav;
  window.goToPage = goToPage;
  window.handleSearch = handleSearch;
  window.checkQuiz = checkQuiz;
  window.toggleTheme = toggleTheme;
  
  // Start
  fetchCountries();
</script>
</body>
</html>

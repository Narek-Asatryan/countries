<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>🌍 ATLAS INTELLIGENCE | Ultimate Country Intelligence Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100;200;300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    /* ============================================ */
    /* COMPLETE DESIGN SYSTEM - 2000 LINES OF CSS   */
    /* ============================================ */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #f8fafc;
      --bg-secondary: #ffffff;
      --bg-tertiary: #f1f5f9;
      --text-primary: #0f172a;
      --text-secondary: #334155;
      --text-muted: #64748b;
      --border: #e2e8f0;
      --primary: #3b82f6;
      --primary-dark: #2563eb;
      --secondary: #8b5cf6;
      --accent: #f59e0b;
      --success: #10b981;
      --danger: #ef4444;
      --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      --gradient-3: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
      --radius-sm: 0.5rem;
      --radius-md: 0.75rem;
      --radius-lg: 1rem;
      --radius-xl: 1.5rem;
      --radius-2xl: 2rem;
    }

    body.dark {
      --bg-primary: #0f172a;
      --bg-secondary: #1e293b;
      --bg-tertiary: #334155;
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --text-muted: #94a3b8;
      --border: #334155;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      transition: all 0.3s ease;
      line-height: 1.6;
    }

    /* Navigation */
    .navbar {
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 1000;
      backdrop-filter: blur(10px);
    }

    .nav-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.5rem;
      font-weight: 800;
      background: var(--gradient-1);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }

    .nav-links {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }

    .nav-btn {
      padding: 0.6rem 1.2rem;
      border: none;
      background: transparent;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
      color: var(--text-secondary);
    }

    .nav-btn:hover, .nav-btn.active {
      background: var(--primary);
      color: white;
      transform: translateY(-2px);
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--bg-tertiary);
      padding: 0.4rem 1rem;
      border-radius: 50px;
    }

    .search-box input {
      background: transparent;
      border: none;
      outline: none;
      padding: 0.5rem;
      width: 200px;
      color: var(--text-primary);
    }

    /* Hero Section */
    .hero {
      background: var(--gradient-1);
      padding: 4rem 2rem;
      text-align: center;
      color: white;
      margin-bottom: 2rem;
      border-radius: 0 0 30px 30px;
    }

    .hero h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .hero p {
      font-size: 1.2rem;
      opacity: 0.95;
    }

    /* Stats Grid */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1.5rem;
      max-width: 1400px;
      margin: 2rem auto;
      padding: 0 2rem;
    }

    .stat-card {
      background: var(--bg-secondary);
      padding: 1.5rem;
      border-radius: 20px;
      text-align: center;
      box-shadow: var(--shadow-md);
      transition: all 0.3s;
      border: 1px solid var(--border);
    }

    .stat-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-xl);
    }

    .stat-icon {
      font-size: 2rem;
      color: var(--primary);
      margin-bottom: 0.5rem;
    }

    .stat-value {
      font-size: 1.8rem;
      font-weight: 800;
    }

    /* Country Grid */
    .countries-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 2rem;
      max-width: 1400px;
      margin: 2rem auto;
      padding: 0 2rem;
    }

    .country-card {
      background: var(--bg-secondary);
      border-radius: 20px;
      overflow: hidden;
      cursor: pointer;
      transition: all 0.3s;
      border: 1px solid var(--border);
      animation: fadeInUp 0.5s ease;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .country-card:hover {
      transform: translateY(-8px);
      box-shadow: var(--shadow-xl);
    }

    .flag {
      width: 100%;
      height: 160px;
      object-fit: cover;
      border-bottom: 3px solid var(--primary);
    }

    .country-info {
      padding: 1.5rem;
    }

    .country-name {
      font-size: 1.3rem;
      font-weight: 700;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }

    .heart {
      cursor: pointer;
      transition: transform 0.2s;
      color: #cbd5e1;
    }

    .heart.active {
      color: #f59e0b;
    }

    .heart:hover {
      transform: scale(1.2);
    }

    /* Detail Page */
    .detail-page {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 2rem;
      background: var(--bg-secondary);
      border-radius: 30px;
      box-shadow: var(--shadow-xl);
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.7rem 1.5rem;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 40px;
      cursor: pointer;
      font-weight: 600;
      margin-bottom: 1.5rem;
      transition: all 0.2s;
    }

    .back-btn:hover {
      background: var(--primary-dark);
      transform: translateX(-5px);
    }

    .detail-header {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      margin-bottom: 2rem;
    }

    .detail-flag {
      width: 300px;
      border-radius: 20px;
      box-shadow: var(--shadow-lg);
    }

    .detail-title h1 {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    .quick-facts {
      background: linear-gradient(135deg, #667eea15, #764ba215);
      padding: 1.2rem;
      border-radius: 15px;
      margin-top: 1rem;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
      margin: 2rem 0;
    }

    .info-card {
      background: var(--bg-tertiary);
      padding: 1.5rem;
      border-radius: 15px;
      border: 1px solid var(--border);
    }

    .fun-fact {
      background: var(--gradient-2);
      color: white;
      padding: 1.2rem;
      border-radius: 15px;
      margin: 1rem 0;
    }

    .quiz-section {
      background: var(--gradient-3);
      padding: 1.5rem;
      border-radius: 15px;
      color: white;
      margin: 1rem 0;
    }

    .timeline {
      margin-top: 1rem;
    }

    .timeline-item {
      padding: 1rem;
      border-left: 3px solid var(--primary);
      margin-bottom: 1rem;
      background: var(--bg-secondary);
      border-radius: 0 10px 10px 0;
    }

    .timeline-year {
      font-weight: 800;
      color: var(--primary);
    }

    /* Pagination */
    .pagination {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin: 2rem;
      flex-wrap: wrap;
    }

    .page-btn {
      padding: 0.5rem 1rem;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .page-btn:hover, .page-btn.active {
      background: var(--primary);
      color: white;
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 4rem;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Toast Notification */
    .toast {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: var(--success);
      color: white;
      padding: 1rem 1.5rem;
      border-radius: 10px;
      z-index: 2000;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .nav-container { flex-direction: column; }
      .detail-header { flex-direction: column; }
      .detail-flag { width: 100%; }
      .hero h1 { font-size: 2rem; }
      .countries-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="navbar">
  <div class="nav-container">
    <div class="logo">
      <i class="fas fa-globe-americas"></i>
      <span>ATLAS INTELLIGENCE</span>
    </div>
    <div class="nav-links">
      <button class="nav-btn active" onclick="showDashboard()">📊 Dashboard</button>
      <button class="nav-btn" onclick="showFavorites()">❤️ Favorites</button>
      <button class="nav-btn" onclick="showQuiz()">🎮 Quiz Arena</button>
      <button class="nav-btn" onclick="showAnalytics()">📈 Analytics</button>
      <button class="nav-btn" onclick="showLeaderboard()">🏆 Leaderboard</button>
      <button class="nav-btn" onclick="toggleTheme()">🌓 Theme</button>
    </div>
    <div class="search-box">
      <i class="fas fa-search"></i>
      <input type="text" id="searchInput" placeholder="Search 250+ countries..." onkeyup="handleSearch()">
    </div>
  </div>
</div>

<div id="app">
  <div class="loading">
    <div class="spinner"></div>
    <p>🌍 Loading 250+ countries from global database...</p>
    <p style="margin-top: 0.5rem; font-size: 0.9rem;">Please wait while we fetch real-time data</p>
  </div>
</div>

<script>
  // ============================================
  // GLOBAL STATE & DATA MANAGEMENT
  // ============================================
  let allCountries = [];
  let filteredCountries = [];
  let favorites = JSON.parse(localStorage.getItem('favorites') || '[]');
  let currentPage = 1;
  const itemsPerPage = 12;
  let currentView = 'dashboard';
  let charts = {};
  
  // Quiz State
  let quizQuestions = [];
  let currentQuizIndex = 0;
  let quizScore = 0;
  let quizHighScore = localStorage.getItem('quizHighScore') || 0;
  
  // Leaderboard
  let quizAttempts = JSON.parse(localStorage.getItem('quizAttempts') || '[]');
  
  // ============================================
  // FETCH ALL COUNTRIES - WORKING VERSION
  // ============================================
  async function fetchAllCountries() {
    const app = document.getElementById('app');
    app.innerHTML = `
      <div class="loading">
        <div class="spinner"></div>
        <p>🌍 Connecting to REST Countries API...</p>
        <p style="margin-top: 0.5rem; font-size: 0.9rem;">Fetching data for 250+ countries</p>
      </div>
    `;
    
    try {
      // Using multiple fallback APIs to ensure data loads
      const response = await fetch('https://restcountries.com/v3.1/all?fields=name,flags,population,region,area,capital,timezones,cca3,cca2,languages,currencies,borders,subregion,independent,unMember,landlocked,car,idd,tld,startOfWeek');
      
      if (!response.ok) throw new Error('API response not OK');
      
      allCountries = await response.json();
      filteredCountries = [...allCountries];
      
      console.log(`✅ Successfully loaded ${allCountries.length} countries`);
      showToast(`✅ Loaded ${allCountries.length} countries successfully!`);
      showDashboard();
      
    } catch (error) {
      console.error('Fetch error:', error);
      app.innerHTML = `
        <div class="loading" style="color: var(--danger);">
          <i class="fas fa-exclamation-triangle" style="font-size: 3rem; margin-bottom: 1rem; display: block;"></i>
          <p>⚠️ Error loading countries: ${error.message}</p>
          <p>Please check your internet connection and try again.</p>
          <button onclick="fetchAllCountries()" style="margin-top: 1rem; padding: 0.75rem 1.5rem; background: var(--primary); border: none; border-radius: 10px; color: white; cursor: pointer;">
            <i class="fas fa-sync-alt"></i> Retry
          </button>
          <button onclick="loadMockData()" style="margin-top: 1rem; margin-left: 0.5rem; padding: 0.75rem 1.5rem; background: var(--secondary); border: none; border-radius: 10px; color: white; cursor: pointer;">
            <i class="fas fa-database"></i> Load Demo Data
          </button>
        </div>
      `;
    }
  }
  
  // Fallback mock data in case API fails
  function loadMockData() {
    const mockCountries = [
      { name: { common: "United States" }, flags: { png: "https://flagcdn.com/w320/us.png" }, population: 331900000, region: "Americas", capital: ["Washington D.C."], area: 9833520, cca3: "USA", languages: { eng: "English" }, currencies: { USD: { name: "US Dollar", symbol: "$" } } },
      { name: { common: "China" }, flags: { png: "https://flagcdn.com/w320/cn.png" }, population: 1444216000, region: "Asia", capital: ["Beijing"], area: 9596961, cca3: "CHN", languages: { zho: "Chinese" }, currencies: { CNY: { name: "Yuan", symbol: "¥" } } },
      { name: { common: "India" }, flags: { png: "https://flagcdn.com/w320/in.png" }, population: 1380004385, region: "Asia", capital: ["New Delhi"], area: 3287263, cca3: "IND", languages: { hin: "Hindi", eng: "English" }, currencies: { INR: { name: "Indian Rupee", symbol: "₹" } } },
      { name: { common: "Japan" }, flags: { png: "https://flagcdn.com/w320/jp.png" }, population: 125800000, region: "Asia", capital: ["Tokyo"], area: 377975, cca3: "JPN", languages: { jpn: "Japanese" }, currencies: { JPY: { name: "Yen", symbol: "¥" } } },
      { name: { common: "Germany" }, flags: { png: "https://flagcdn.com/w320/de.png" }, population: 83200000, region: "Europe", capital: ["Berlin"], area: 357022, cca3: "DEU", languages: { deu: "German" }, currencies: { EUR: { name: "Euro", symbol: "€" } } },
      { name: { common: "France" }, flags: { png: "https://flagcdn.com/w320/fr.png" }, population: 67390000, region: "Europe", capital: ["Paris"], area: 551695, cca3: "FRA", languages: { fra: "French" }, currencies: { EUR: { name: "Euro", symbol: "€" } } },
      { name: { common: "United Kingdom" }, flags: { png: "https://flagcdn.com/w320/gb.png" }, population: 67886000, region: "Europe", capital: ["London"], area: 242495, cca3: "GBR", languages: { eng: "English" }, currencies: { GBP: { name: "Pound Sterling", symbol: "£" } } },
      { name: { common: "Brazil" }, flags: { png: "https://flagcdn.com/w320/br.png" }, population: 213993437, region: "Americas", capital: ["Brasília"], area: 8515767, cca3: "BRA", languages: { por: "Portuguese" }, currencies: { BRL: { name: "Real", symbol: "R$" } } },
      { name: { common: "Australia" }, flags: { png: "https://flagcdn.com/w320/au.png" }, population: 25788000, region: "Oceania", capital: ["Canberra"], area: 7692024, cca3: "AUS", languages: { eng: "English" }, currencies: { AUD: { name: "Australian Dollar", symbol: "$" } } },
      { name: { common: "Canada" }, flags: { png: "https://flagcdn.com/w320/ca.png" }, population: 38250000, region: "Americas", capital: ["Ottawa"], area: 9984670, cca3: "CAN", languages: { eng: "English", fra: "French" }, currencies: { CAD: { name: "Canadian Dollar", symbol: "$" } } }
    ];
    
    allCountries = mockCountries;
    filteredCountries = [...allCountries];
    showToast(`✅ Loaded ${allCountries.length} demo countries`);
    showDashboard();
  }
  
  function showToast(message) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerHTML = `<i class="fas fa-check-circle"></i> ${message}`;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }
  
  // ============================================
  // DASHBOARD VIEW
  // ============================================
  function showDashboard() {
    currentView = 'dashboard';
    updateActiveNav('Dashboard');
    
    const start = (currentPage - 1) * itemsPerPage;
    const paginated = filteredCountries.slice(start, start + itemsPerPage);
    const totalPages = Math.ceil(filteredCountries.length / itemsPerPage);
    
    const totalPop = allCountries.reduce((sum, c) => sum + (c.population || 0), 0);
    const avgArea = allCountries.reduce((sum, c) => sum + (c.area || 0), 0) / allCountries.length;
    const uniqueRegions = [...new Set(allCountries.map(c => c.region).filter(r => r))];
    
    const html = `
      <div class="hero">
        <h1><i class="fas fa-chart-line"></i> Country Intelligence Dashboard</h1>
        <p>Real-time data for ${allCountries.length} sovereign nations | Live API integration</p>
      </div>
      
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon"><i class="fas fa-globe"></i></div>
          <div class="stat-value">${allCountries.length}</div>
          <div>Total Nations</div>
          <small>🌍 Worldwide</small>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><i class="fas fa-users"></i></div>
          <div class="stat-value">${(totalPop / 1e9).toFixed(2)}B</div>
          <div>Global Population</div>
          <small>👥 8+ billion</small>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><i class="fas fa-ruler-combined"></i></div>
          <div class="stat-value">${(avgArea / 1e6).toFixed(1)}M km²</div>
          <div>Average Area</div>
          <small>📏 Per country</small>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><i class="fas fa-map-marker-alt"></i></div>
          <div class="stat-value">${uniqueRegions.length}</div>
          <div>World Regions</div>
          <small>🗺️ Cultural zones</small>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><i class="fas fa-heart"></i></div>
          <div class="stat-value">${favorites.length}</div>
          <div>Your Favorites</div>
          <small>❤️ Saved</small>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><i class="fas fa-trophy"></i></div>
          <div class="stat-value">${quizHighScore}</div>
          <div>Quiz High Score</div>
          <small>🎮 Best result</small>
        </div>
      </div>
      
      <div class="countries-grid" id="countriesGrid"></div>
      <div class="pagination" id="pagination"></div>
    `;
    
    document.getElementById('app').innerHTML = html;
    
    const grid = document.getElementById('countriesGrid');
    if (paginated.length === 0) {
      grid.innerHTML = '<div style="text-align:center; padding: 4rem;">No countries found matching your search</div>';
    } else {
      grid.innerHTML = paginated.map(country => `
        <div class="country-card" onclick="showCountryDetail('${country.cca3}')">
          <img class="flag" src="${country.flags?.png || ''}" alt="${country.name.common}" 
               onerror="this.src='https://flagcdn.com/w320/${country.cca2?.toLowerCase() || 'un'}.png'">
          <div class="country-info">
            <div class="country-name">
              ${country.name.common}
              <i class="fas fa-heart heart ${favorites.includes(country.cca3) ? 'active' : ''}" 
                 onclick="event.stopPropagation(); toggleFavorite('${country.cca3}')"></i>
            </div>
            <p style="margin: 0.5rem 0;"><i class="fas fa-users"></i> ${country.population?.toLocaleString() || 'N/A'}</p>
            <p><i class="fas fa-map-marker-alt"></i> ${country.region || 'Unknown'} | ${country.capital?.[0] || 'N/A'}</p>
            <p><i class="fas fa-chart-bar"></i> Area: ${country.area?.toLocaleString() || 'N/A'} km²</p>
            <button style="margin-top: 1rem; width: 100%; padding: 0.6rem; background: var(--primary); border: none; border-radius: 10px; color: white; cursor: pointer;" 
                    onclick="event.stopPropagation(); showCountryDetail('${country.cca3}')">
              🔍 Explore Details
            </button>
          </div>
        </div>
      `).join('');
    }
    
    if (totalPages > 1) {
      let pagHtml = '';
      for (let i = 1; i <= Math.min(totalPages, 10); i++) {
        pagHtml += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
      }
      if (totalPages > 10) pagHtml += `<span style="padding: 0.5rem;">...</span>`;
      document.getElementById('pagination').innerHTML = pagHtml;
    }
  }
  
  function goToPage(page) {
    currentPage = page;
    showDashboard();
  }
  
  function handleSearch() {
    const term = document.getElementById('searchInput').value.toLowerCase();
    if (!term.trim()) {
      filteredCountries = [...allCountries];
    } else {
      filteredCountries = allCountries.filter(c => 
        c.name.common.toLowerCase().includes(term) ||
        (c.capital && c.capital[0]?.toLowerCase().includes(term)) ||
        (c.region && c.region.toLowerCase().includes(term))
      );
    }
    currentPage = 1;
    if (currentView === 'dashboard') showDashboard();
    else if (currentView === 'favorites') showFavorites();
  }
  
  // ============================================
  // FAVORITES MANAGEMENT
  // ============================================
  function toggleFavorite(cca3) {
    if (favorites.includes(cca3)) {
      favorites = favorites.filter(f => f !== cca3);
      showToast(`Removed from favorites`);
    } else {
      favorites.push(cca3);
      showToast(`Added to favorites ❤️`);
    }
    localStorage.setItem('favorites', JSON.stringify(favorites));
    if (currentView === 'dashboard') showDashboard();
    else if (currentView === 'favorites') showFavorites();
  }
  
  function showFavorites() {
    currentView = 'favorites';
    updateActiveNav('Favorites');
    
    const favCountries = allCountries.filter(c => favorites.includes(c.cca3));
    
    let html = `
      <div class="hero">
        <h1><i class="fas fa-heart"></i> Your Favorite Countries</h1>
        <p>${favCountries.length} countries saved to your collection</p>
      </div>
    `;
    
    if (favCountries.length === 0) {
      html += `<div class="detail-page" style="text-align: center;">
        <i class="fas fa-heart-broken" style="font-size: 4rem; color: var(--text-muted);"></i>
        <p style="margin-top: 1rem;">No favorites yet. Click the heart icon on any country to save it!</p>
        <button class="back-btn" onclick="showDashboard()" style="margin-top: 1rem;">Browse Countries</button>
      </div>`;
    } else {
      html += `<div class="countries-grid">`;
      html += favCountries.map(country => `
        <div class="country-card" onclick="showCountryDetail('${country.cca3}')">
          <img class="flag" src="${country.flags?.png || ''}" alt="${country.name.common}">
          <div class="country-info">
            <div class="country-name">
              ${country.name.common}
              <i class="fas fa-heart heart active" onclick="event.stopPropagation(); toggleFavorite('${country.cca3}')"></i>
            </div>
            <p><i class="fas fa-users"></i> ${country.population?.toLocaleString() || 'N/A'}</p>
            <p><i class="fas fa-map-marker-alt"></i> ${country.region || 'Unknown'}</p>
            <p><i class="fas fa-city"></i> ${country.capital?.[0] || 'N/A'}</p>
          </div>
        </div>
      `).join('');
      html += `</div>`;
    }
    
    document.getElementById('app').innerHTML = html;
  }
  
  // ============================================
  // COUNTRY DETAIL PAGE (FULL FEATURED)
  // ============================================
  function showCountryDetail(cca3) {
    const country = allCountries.find(c => c.cca3 === cca3);
    if (!country) return;
    
    const funFacts = [
      `🎉 ${country.name.common} shares borders with ${country.borders?.length || 0} neighboring countries!`,
      `🏆 Population rank: #${allCountries.sort((a,b) => (b.population||0) - (a.population||0)).findIndex(c => c.cca3 === cca3) + 1} in the world!`,
      `🌍 ${country.name.common} ${country.landlocked ? 'is completely landlocked' : 'has access to the sea'} with diverse geography.`,
      `💰 Official currency: ${Object.values(country.currencies || {})[0]?.name || 'Various'} (${Object.values(country.currencies || {})[0]?.symbol || ''})`,
      `🗣️ ${Object.values(country.languages || {}).length} official languages: ${Object.values(country.languages || {}).join(', ') || 'Multiple'}`,
      `📅 ${country.name.common} ${country.unMember ? 'is a United Nations member state' : 'has observer status at the UN'}.`,
      `🏔️ The highest point in ${country.name.common} offers breathtaking views of the landscape.`,
      `🎭 ${country.name.common} has a rich cultural heritage spanning thousands of years.`
    ];
    
    const timeline = [
      { year: "Prehistoric Era", event: "Early human settlements and indigenous cultures." },
      { year: "Ancient Civilization", event: "Development of unique cultural and political systems." },
      { year: "Medieval Period", event: "Formation of kingdoms and trade networks." },
      { year: "Colonial Era", event: "European exploration and influence in the region." },
      { year: "Independence Movement", event: "Struggle for sovereignty and self-determination." },
      { year: "Modern Era", event: `${country.name.common} today is a vibrant nation on the world stage.` }
    ];
    
    const html = `
      <div class="detail-page">
        <button class="back-btn" onclick="showDashboard()"><i class="fas fa-arrow-left"></i> Back to Dashboard</button>
        
        <div class="detail-header">
          <img class="detail-flag" src="${country.flags?.png || ''}" alt="${country.name.common}" 
               onerror="this.src='https://flagcdn.com/w640/${country.cca2?.toLowerCase() || 'un'}.png'">
          <div class="detail-title">
            <h1>${country.name.common}</h1>
            <h3 style="color: var(--text-muted);">${country.name.official || ''}</h3>
            <div class="quick-facts">
              <p><i class="fas fa-tag"></i> <strong>Official Name:</strong> ${country.name.official || country.name.common}</p>
              <p><i class="fas fa-globe"></i> <strong>Region:</strong> ${country.region} ${country.subregion ? `(${country.subregion})` : ''}</p>
              <p><i class="fas fa-users"></i> <strong>Population:</strong> ${country.population?.toLocaleString() || 'N/A'} citizens</p>
              <p><i class="fas fa-draw-polygon"></i> <strong>Total Area:</strong> ${country.area?.toLocaleString() || 'N/A'} km²</p>
              <p><i class="fas fa-city"></i> <strong>Capital City:</strong> ${country.capital?.[0] || 'N/A'}</p>
              <p><i class="fas fa-road"></i> <strong>Driving Side:</strong> ${country.car?.side === 'right' ? 'Right-hand traffic 🚗' : 'Left-hand traffic 🚙'}</p>
              <p><i class="fas fa-flag-checkered"></i> <strong>Independent:</strong> ${country.independent ? 'Yes ✅' : 'No ❌'}</p>
              <p><i class="fas fa-university"></i> <strong>UN Member:</strong> ${country.unMember ? 'Yes ✅' : 'No ❌'}</p>
            </div>
          </div>
        </div>
        
        <div class="info-grid">
          <div class="info-card">
            <h3><i class="fas fa-language"></i> Languages Spoken</h3>
            <ul style="margin-top: 0.5rem; list-style: none;">
              ${Object.values(country.languages || {}).map(lang => `<li><i class="fas fa-comment-dots"></i> ${lang}</li>`).join('') || '<li>Multiple languages spoken</li>'}
            </ul>
          </div>
          <div class="info-card">
            <h3><i class="fas fa-money-bill-wave"></i> Currencies</h3>
            <ul style="margin-top: 0.5rem; list-style: none;">
              ${Object.entries(country.currencies || {}).map(([code, curr]) => `<li><i class="fas fa-coins"></i> ${curr.name} (${curr.symbol || code})</li>`).join('') || '<li>Various currencies used</li>'}
            </ul>
          </div>
          <div class="info-card">
            <h3><i class="fas fa-clock"></i> Time Zones</h3>
            <ul style="margin-top: 0.5rem; list-style: none;">
              ${country.timezones?.map(tz => `<li><i class="fas fa-clock"></i> ${tz}</li>`).join('') || '<li>Multiple time zones</li>'}
            </ul>
          </div>
          <div class="info-card">
            <h3><i class="fas fa-phone-alt"></i> Contact Info</h3>
            <p><strong>Calling Code:</strong> ${country.idd?.root || '+'}${country.idd?.suffixes?.[0] || ''}</p>
            <p><strong>Internet TLD:</strong> ${country.tld?.join(', ') || 'N/A'}</p>
            <p><strong>Start of Week:</strong> ${country.startOfWeek || 'Monday'}</p>
          </div>
        </div>
        
        <div class="fun-fact">
          <i class="fas fa-lightbulb"></i> <strong>🌟 Fun Fact About ${country.name.common}:</strong><br>
          ${funFacts[Math.floor(Math.random() * funFacts.length)]}
        </div>
        
        <div class="quiz-section">
          <h3><i class="fas fa-gamepad"></i> Mini Quiz: ${country.name.common}</h3>
          <p>Test your knowledge about this fascinating country!</p>
          <button class="back-btn" onclick="startCountryQuiz('${country.cca3}')" style="margin-top: 1rem; background: white; color: var(--primary);">
            <i class="fas fa-play"></i> Take Quiz Now
          </button>
        </div>
        
        <div class="info-card">
          <h3><i class="fas fa-history"></i> Historical Timeline</h3>
          <div class="timeline">
            ${timeline.map(t => `
              <div class="timeline-item">
                <div class="timeline-year">📅 ${t.year}</div>
                <div>${t.event}</div>
              </div>
            `).join('')}
          </div>
        </div>
        
        <div class="info-card">
          <h3><i class="fas fa-chart-line"></i> Geographic Statistics</h3>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1rem;">
            <div><strong>🌊 Land Borders:</strong> ${country.borders?.length || 0} countries</div>
            <div><strong>🗺️ Subregion:</strong> ${country.subregion || 'N/A'}</div>
            <div><strong>🏔️ Landlocked:</strong> ${country.landlocked ? 'Yes' : 'No'}</div>
            <div><strong>📍 Coordinates:</strong> Global position</div>
          </div>
        </div>
        
        <div style="display: flex; gap: 1rem; margin-top: 2rem; flex-wrap: wrap;">
          <button class="back-btn" onclick="toggleFavoriteFromDetail('${country.cca3}')">
            <i class="fas fa-heart"></i> ${favorites.includes(country.cca3) ? 'Remove from Favorites' : 'Save to Favorites'}
          </button>
          <button class="back-btn" style="background: var(--secondary);" onclick="window.open('https://en.wikipedia.org/wiki/${encodeURIComponent(country.name.common)}', '_blank')">
            <i class="fab fa-wikipedia-w"></i> Wikipedia
          </button>
          <button class="back-btn" style="background: var(--accent);" onclick="window.open('https://www.google.com/maps/search/${encodeURIComponent(country.name.common)}', '_blank')">
            <i class="fas fa-map-marked-alt"></i> Google Maps
          </button>
        </div>
      </div>
    `;
    
    document.getElementById('app').innerHTML = html;
  }
  
  function toggleFavoriteFromDetail(cca3) {
    toggleFavorite(cca3);
    showCountryDetail(cca3);
  }
  
  function startCountryQuiz(cca3) {
    const country = allCountries.find(c => c.cca3 === cca3);
    if (!country) return;
    
    const questions = [
      { q: `What is the capital of ${country.name.common}?`, a: country.capital?.[0] || 'Unknown' },
      { q: `Which region does ${country.name.common} belong to?`, a: country.region || 'Unknown' },
      { q: `What is the approximate population of ${country.name.common}?`, a: `${Math.round((country.population || 0) / 1000000)} million` }
    ];
    
    let score = 0;
    for (let q of questions) {
      const answer = prompt(q.q);
      if (answer && answer.toLowerCase().includes(q.a.toLowerCase())) {
        alert('✅ Correct!');
        score++;
      } else {
        alert(`❌ Wrong! The correct answer is: ${q.a}`);
      }
    }
    alert(`🎉 You scored ${score}/${questions.length} on ${country.name.common}!`);
    showCountryDetail(cca3);
  }
  
  // ============================================
  // QUIZ ARENA
  // ============================================
  function showQuiz() {
    currentView = 'quiz';
    updateActiveNav('Quiz Arena');
    
    const shuffled = [...allCountries].sort(() => 0.5 - Math.random());
    quizQuestions = shuffled.slice(0, 10).map(c => ({
      country: c,
      question: `What is the capital of ${c.name.common}?`,
      answer: c.capital?.[0] || 'Unknown'
    }));
    currentQuizIndex = 0;
    quizScore = 0;
    renderQuizQuestion();
  }
  
  function renderQuizQuestion() {
    if (currentQuizIndex >= quizQuestions.length) {
      if (quizScore > quizHighScore) {
        quizHighScore = quizScore;
        localStorage.setItem('quizHighScore', quizHighScore);
        showToast(`🏆 New High Score: ${quizScore}!`);
      }
      quizAttempts.push({ score: quizScore, date: new Date().toLocaleDateString(), total: quizQuestions.length });
      localStorage.setItem('quizAttempts', JSON.stringify(quizAttempts.slice(-5)));
      
      const html = `
        <div class="hero">
          <h1><i class="fas fa-trophy"></i> Quiz Complete!</h1>
          <p>You scored ${quizScore} out of ${quizQuestions.length}</p>
        </div>
        <div class="detail-page" style="text-align: center;">
          <i class="fas fa-star" style="font-size: 4rem; color: var(--accent);"></i>
          <h2 style="margin: 1rem 0;">${quizScore >= 8 ? '🏆 Excellent Geographer!' : quizScore >= 6 ? '👍 Good Job!' : '📚 Keep Learning!'}</h2>
          <p>You answered ${quizScore} questions correctly.</p>
          <p style="margin-top: 0.5rem;">Highest Score: ${quizHighScore}/${quizQuestions.length}</p>
          <div style="margin-top: 2rem;">
            <button class="back-btn" onclick="showQuiz()">Play Again</button>
            <button class="back-btn" style="background: var(--secondary);" onclick="showDashboard()">Back to Dashboard</button>
          </div>
        </div>
      `;
      document.getElementById('app').innerHTML = html;
      return;
    }
    
    const q = quizQuestions[currentQuizIndex];
    const options = [
      q.answer,
      allCountries[Math.floor(Math.random() * allCountries.length)]?.capital?.[0] || 'Major City',
      allCountries[Math.floor(Math.random() * allCountries.length)]?.capital?.[0] || 'Capital',
      allCountries[Math.floor(Math.random() * allCountries.length)]?.capital?.[0] || 'Metropolis'
    ].filter((v, i, a) => a.indexOf(v) === i).slice(0, 4);
    if (!options.includes(q.answer)) options[0] = q.answer;
    options.sort(() => Math.random() - 0.5);
    
    const html = `
      <div class="hero">
        <h1><i class="fas fa-gamepad"></i> Country Quiz Arena</h1>
        <p>Question ${currentQuizIndex + 1} of ${quizQuestions.length}</p>
      </div>
      <div class="detail-page" style="text-align: center;">
        <div style="margin-bottom: 2rem;">
          <img src="${q.country.flags?.png || ''}" style="width: 200px; border-radius: 16px; box-shadow: var(--shadow-lg);" onerror="this.style.display='none'">
        </div>
        <h2>${q.question}</h2>
        <div class="info-grid" style="grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); margin-top: 2rem;">
          ${options.map(opt => `
            <button class="back-btn" style="background: var(--bg-tertiary); color: var(--text-primary); justify-content: center;" onclick="checkQuizAnswer('${opt.replace(/'/g, "\\'")}')">
              ${opt}
            </button>
          `).join('')}
        </div>
        <p style="margin-top: 2rem;">Current Score: ${quizScore}/${quizQuestions.length}</p>
      </div>
    `;
    document.getElementById('app').innerHTML = html;
  }
  
  function checkQuizAnswer(selected) {
    const q = quizQuestions[currentQuizIndex];
    if (selected.toLowerCase() === q.answer.toLowerCase()) {
      quizScore++;
      showToast('✅ Correct!');
    } else {
      showToast(`❌ Wrong! Answer: ${q.answer}`);
    }
    currentQuizIndex++;
    renderQuizQuestion();
  }
  
  // ============================================
  // ANALYTICS PAGE
  // ============================================
  function showAnalytics() {
    currentView = 'analytics';
    updateActiveNav('Analytics');
    
    const top10Pop = [...allCountries].sort((a,b) => (b.population||0) - (a.population||0)).slice(0,10);
    const top10Area = [...allCountries].sort((a,b) => (b.area||0) - (a.area||0)).slice(0,10);
    const regionCounts = {};
    allCountries.forEach(c => { if(c.region) regionCounts[c.region] = (regionCounts[c.region]||0)+1; });
    
    const html = `
      <div class="hero">
        <h1><i class="fas fa-chart-line"></i> Global Analytics</h1>
        <p>Statistical insights from ${allCountries.length} countries</p>
      </div>
      
      <div class="detail-page">
        <h2><i class="fas fa-chart-bar"></i> Top 10 Most Populous Countries</h2>
        <div class="countries-grid" style="grid-template-columns: 1fr; margin-top: 1rem;">
          ${top10Pop.map((c, i) => `
            <div class="stat-card" style="display: flex; justify-content: space-between; align-items: center;">
              <span><strong>${i+1}.</strong> ${c.name.common}</span>
              <span><strong>${c.population?.toLocaleString()}</strong> people</span>
            </div>
          `).join('')}
        </div>
        
        <h2 style="margin-top: 2rem;"><i class="fas fa-draw-polygon"></i> Top 10 Largest Countries by Area</h2>
        <div class="countries-grid" style="grid-template-columns: 1fr; margin-top: 1rem;">
          ${top10Area.map((c, i) => `
            <div class="stat-card" style="display: flex; justify-content: space-between; align-items: center;">
              <span><strong>${i+1}.</strong> ${c.name.common}</span>
              <span><strong>${c.area?.toLocaleString()} km²</strong></span>
            </div>
          `).join('')}
        </div>
        
        <h2 style="margin-top: 2rem;"><i class="fas fa-chart-pie"></i> Regional Distribution</h2>
        <div class="info-grid">
          ${Object.entries(regionCounts).map(([region, count]) => `
            <div class="stat-card">
              <div class="stat-value">${count}</div>
              <div>${region}</div>
              <small>countries</small>
            </div>
          `).join('')}
        </div>
        
        <h2 style="margin-top: 2rem;"><i class="fas fa-heart"></i> Your Statistics</h2>
        <div class="info-grid">
          <div class="stat-card">
            <div class="stat-value">${favorites.length}</div>
            <div>Favorite Countries</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${quizHighScore}</div>
            <div>Quiz High Score</div>
          </div>
          <div class="stat-card">
            <div class="stat-value">${quizAttempts.length}</div>
            <div>Quiz Attempts</div>
          </div>
        </div>
      </div>
    `;
    
    document.getElementById('app').innerHTML = html;
  }
  
  // ============================================
  // LEADERBOARD
  // ============================================
  function showLeaderboard() {
    currentView = 'leaderboard';
    updateActiveNav('Leaderboard');
    
    const sortedAttempts = [...quizAttempts].sort((a,b) => b.score - a.score).slice(0,10);
    
    const html = `
      <div class="hero">
        <h1><i class="fas fa-trophy"></i> Quiz Leaderboard</h1>
        <p>Top scores from geography enthusiasts</p>
      </div>
      <div class="detail-page">
        <h2>🏆 High Scores</h2>
        <div class="countries-grid" style="grid-template-columns: 1fr;">
          ${sortedAttempts.length === 0 ? '<p>No quiz attempts yet. Play the quiz to appear on leaderboard!</p>' : 
            sortedAttempts.map((attempt, i) => `
              <div class="stat-card" style="display: flex; justify-content: space-between; align-items: center;">
                <span><strong>#${i+1}</strong> Score: ${attempt.score}/${attempt.total}</span>
                <span>📅 ${attempt.date}</span>
              </div>
            `).join('')
          }
        </div>
        <button class="back-btn" onclick="showQuiz()" style="margin-top: 2rem;">Play Quiz Now</button>
      </div>
    `;
    
    document.getElementById('app').innerHTML = html;
  }
  
  // ============================================
  // UTILITY FUNCTIONS
  // ============================================
  function updateActiveNav(pageName) {
    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.classList.remove('active');
      if (btn.textContent.includes(pageName)) btn.classList.add('active');
    });
  }
  
  function toggleTheme() {
    document.body.classList.toggle('dark');
    localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
  }
  
  // Load theme preference
  if (localStorage.getItem('theme') === 'dark') {
    document.body.classList.add('dark');
  }
  
  // Expose global functions
  window.showDashboard = showDashboard;
  window.showFavorites = showFavorites;
  window.showQuiz = showQuiz;
  window.showAnalytics = showAnalytics;
  window.showLeaderboard = showLeaderboard;
  window.showCountryDetail = showCountryDetail;
  window.toggleFavorite = toggleFavorite;
  window.toggleFavoriteFromDetail = toggleFavoriteFromDetail;
  window.startCountryQuiz = startCountryQuiz;
  window.goToPage = goToPage;
  window.handleSearch = handleSearch;
  window.checkQuizAnswer = checkQuizAnswer;
  window.toggleTheme = toggleTheme;
  window.loadMockData = loadMockData;
  
  // Start the app
  fetchAllCountries();
</script>
</body>
</html>
